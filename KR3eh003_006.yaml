body:
  text: 卷六心痛統論方論心痛有九種曰飲曰食曰風曰冷曰熱曰蟲曰悸曰疰曰去來悸者動也心虛則動而痛也疰者住也惡風所著也去來者作止不常亦邪氣也但疰為陰而去來為陽耳心主諸陽又心主血是以因邪而陽氣鬱伏過於熱者痛陽氣不及邪氣勝之者亦痛血因邪泣在絡而不行者痛血因邪勝而虛者亦痛五臟六腑任督支脈皆絡於心是以各臟腑經脈挾其淫氣自支脈上乘於心皆能作痛然必有各臟腑病形與之相應經云心痛引少腹上下無定處溲便難者取足厥陰心痛腹脹嗇然大便不利取足太陰心痛短氣不足以息取手太陰心痛引背不得息刺足少陰不已刺手少陽此之謂也胃居中焦稟中和之氣為水穀之海三陽之總司凡飲食寒熱氣血蟲邪惡氣亦如心痛有不一之因也惟肝木之相乘者尤甚其症胃脘當心而痛上支兩脅膈咽不通飲食不下病名食痹食痹者食已心下痛吐出乃已是也其腎水上逆者次之腎水上逆者寒厥入胃也胃者土氣也主乎痞故胃病者或滿或脹或食不下或嘔吐吞酸或大便難或瀉利面色浮而黃者皆是胃之本病也其有六淫五邪相乘於胃者大率與前所列心痛之形狀相類但其間必與胃本病參雜而見之也憂思忿怒之氣素蓄於中發則上衝旁擊時復下注若三焦無所阻滯任其遊行則不能作痛雖痛亦微若有濕痰死血阻滯其氣而不得條達兩相搏擊則痛甚矣余家有治心胃痛丸方白胡椒枳殼白檀香紅花五靈脂去砂廣木香各為末於六月六日修合水泛為丸每用七丸噙化少頃痛即止余因名之曰靈香丸此條宜注胃脘痛中鶴年識藥共六味五味各一兩五靈用五兩豫憶昔年合藥時配分兩倣佛若此熱厥心痛金鈴子散保命金鈴子延胡索各一兩上為末每服三錢酒調下痛止與枳朮丸左金丸川黃連六兩鹽水炒吳茱萸去閉口鹽水浸一伏時一兩上為末水泛為丸或粥糊丸每服三十丸開水送下機要云熱厥心痛者身熱足寒痛甚則煩躁而吐其脈浮大而洪當灸太溪崑崙謂表裡俱瀉之是為熱病汗不出引熱下行表汗通身而出者愈也灸畢服金鈴子散則愈痛止服枳朮丸去其餘邪也丹溪云心膈痛曾服香燥熱藥復作復結轉深轉痼宜山梔炒黑二兩香附鹽水浸炒一兩川芎一兩黃芩黃連並酒炒木香檳榔各二錢五分赤曲番降香各五錢芒硝二錢為末生薑汁童子小便各半盞調二錢痛時服心寒痛大建中湯蜀椒二合炒去汗乾薑四兩人參二兩以水四升煮取二升去滓內膠飴一升微火煎取一升半分溫再服如一炊頃可飲粥二升後更服當一日食糜粥溫復之扶陽益胃湯附子炮去皮臍二錢乾薑炮一錢半草豆蔻益智仁官桂白芍甘草人參各一錢吳茱萸陳皮白朮各五錢上銼如麻豆大都作一服水二盞薑三片棗二枚同煎至一盞去滓溫服食前羅謙甫治漕運使崔君長男云卿年二十五體本豐肥奉養膏粱時時有熱證友人勸進寒涼藥食寒物至元庚辰秋髮瘧醫以砒霜等藥治之新汲水下禁食熱物瘧病未除反添吐瀉脾胃復傷中氣愈虛腹痛腸鳴時復胃脘當心而痛不任其苦屢醫未效至冬不瘥延至四月勞役煩惱過度前症大作請余治之診得脈弦細而微手足稍冷面色青黃不澤情思不樂惡人煩擾飲食減少微飽則心下痞悶嘔吐酸水每發作冷汗時出氣促不安須人額相抵而坐少時易之豫思內經中氣不足溲便為之變腸為之苦鳴下氣不足則乃為痿厥心悗又曰寒氣客於腸胃之間則卒然而痛得熱則已非甘辛大熱之劑則不能愈遂制此方經曰寒淫於內治以辛熱佐以苦溫附子乾薑大辛熱溫中散寒故以為君草豆蔻益智仁辛苦溫治客寒犯胃為佐脾不足者以甘補之炙甘草甘溫白朮陳皮苦溫補脾養氣水挾木勢亦來侮土故作急痛桂辛熱以退寒水芍藥味酸以瀉木來剋土吳茱萸苦熱瀉厥氣上逆於胸中為使三服大勢去痛減半至秋先灸中脘三七壯以助胃氣次灸氣海百餘壯生髮元氣滋榮百脈以還少丹服之喜飲食添肌肉皮膚潤澤明年春灸三里二七壯乃胃之合穴亦助胃氣引氣下行又以芳香助脾服育氣湯加白檀香平治之戒以懲忿窒欲慎言語節飲食一年而平復金匱治心痛徹背寒冷者方赤石脂乾薑蜀椒各四分附子炮二分烏頭炮一分上為末蜜丸梧子大先食服一丸日三不住稍增之余嘗治一香山人心痛問之則服藥已一月矣向左臥則右痛向右臥則左痛仰臥則痛在前偃臥則痛在背坐立則痛在上無一刻少安余曰此中虛與以小建中湯重用飴糖炙甘草四劑而安鶴年心虛痛良方妙香散治心氣不足時時㽱痛按之則止虛煩少睡夜多盜汗常服補益氣血養心止痛黃耆薑汁炙山藥茯神去皮木茯苓去皮遠志去心炒各一兩人參桔梗甘草炙各半兩木香煨二錢半辰砂三錢另研麝香一錢另研上為細末每服二錢不拘時按此方宜去茯苓麝香蓋心氣已虛惟宜收養有木香之通不宜更益麝香之散有茯神之淡不必加以茯苓之滲也昔人云按之痛止者為虛宜以酸收之勿食辛散之劑又云病久氣虛血損及素作勞羸弱之人患心痛者皆虛痛也有服大補之劑而愈者不可不知氣刺心痛氣針丸治久積風壅心胸築痛兩脅心胸有似針刺六脈沉伏按之手不可近此藥屢試神驗常服疏滯氣止刺痛木香檳榔青皮陳皮大黃各四兩牽牛取頭末半斤半生半熟蜜丸梧子大每服三十丸薑湯送下食前量虛實加減新定烏附丸治氣刺攻痛但忍氣即發者天台烏藥二兩白豆蔻五錢沉香五錢茯苓一兩香附四兩甘草一兩上為細末煉蜜丸彈子大每服一丸食後淡生薑湯化下一粒金丹治氣痛鴉片二錢半阿魏一錢木香沉香各五分牛黃二分半上將沉香木香牛黃為末以鴉片阿魏放碗內滴水溶化和蜜為丸緑豆大金箔為衣每一粒熱氣痛涼水下冷氣痛滾水下神保丸治諸氣疰痛心腸腹脅腎氣皆治全蠍七個巴豆十粒去皮為霜木香胡椒各二錢半硃砂二錢半內一半為衣上為末蒸餅和丸麻子大硃砂為衣每五七丸薑湯溫酒任下血瘀心痛拈痛丸奇效下同五靈脂去淨砂子蓬莪朮煨木香當歸各等分蜜丸梧子大每服二十丸食前橘皮湯送下手拈散延胡索五靈脂草果沒藥各等分上為細末每服三錢熱酒調下無時經驗失笑散五靈脂淨好者蒲黃等分上為末每服二錢用黃醋一杓熬成膏再入水一盞煎至七分熱服丹溪云死血作痛脈必澀作時飲湯水下或作厄壯人用桃仁承氣湯下之弱人用失笑散和之或以歸尾川芎牡丹皮蘇木紅花延胡索桂心桃仁泥赤曲番降香之屬煎成童便酒韭汁大劑飲之蛔咬心痛蕪荑散治大人小兒蛔咬心痛經云蟲貫心則殺人欲驗之大痛不可忍或吐青黃緑水涎沫或吐蟲出發有休止此是蛔咬心痛也宜速療之蕪荑雷丸各半兩乾漆捶碎炒令煙盡一兩上為細末每服三錢溫水七分盞調和服不拘時甚者不過三服小兒每服半錢烏梅丸治臟寒蛔蟲動作上入膈中煩悶嘔吐時作時止得食即嘔常自吐涎有此症候謂之蛔厥此藥主之烏梅三百個黃柏炙細辛去苗肉桂附子炮去皮臍人參各六兩乾薑炮十兩當歸蜀椒去目及閉口者微炒出汗各四兩黃連十六兩上異搗篩合治之以醋浸烏梅一宿去核蒸之五斗米下飯熟搗成泥和藥令相得內臼中加煉蜜杵二千下丸如梧子大每十五丸溫米飲食前下化蟲丸治寸白蟲黃丹半兩炒錫灰一兩羅定粉二兩上同研極細末每服一錢先燒豬肉五文吃了後以生油一口許調藥服至晚取下婦人有胎不可服胃脘痛痰積胃脘痛丹溪白螺殼丸白螺殼火煅滑石蒼朮山梔子紅曲炒香附童便浸南星炮製各一兩青皮枳殼麩炒黃木香半夏砂仁各半兩桃仁炒去皮尖三十粒上為末春加川芎夏加黃連秋加吳茱萸用生薑汁浸蒸餅為丸緑豆大每服五十丸海蛤丸丹溪治痰飲心痛海蛤燒灰研極細過數日火毒散用之栝蔞仁帶穰同研上以海蛤粉入栝蔞內乾溼得所為丸每服五十丸加味二陳湯治痰飲食積胃脘作痛或脹或痞陳皮半夏茯苓炙草枳實川連滑石木通山楂乾葛此中焦濕痰蘊熱痞滯不通以二陳加連枳山楂清滌中宮妙在乾葛升引清氣滑石木通蠲除濁氣清升濁降痛脹自除肝乘胃痛新定吳茱萸湯治胃脘痛不能食食則嘔其脈弦人參一錢吳茱萸三分炮淡川連六分茯苓二錢半夏一錢半宣州木瓜七分上作一服水薑煎腎逆胃痛新定桂苓湯桂一錢茯苓三錢人參一錢甘草五分芍藥一錢生薑五分一作一服水煎空心服按古法有生韭汁和五苓散為丸空心茴香湯下蓋亦取泄水氣益土氣之意愚謂白朮之滯不如人參之益胃韭汁之辛不如生薑之散逆且豬澤亦過傷腎氣不如芍藥之攝水下行也腹痛寒冷腹痛腹痛屬寒冷者多是口食寒物鼻吸冷氣脈澀氣阻則為疼痛其症四肢逆冷唇口變青其脈沉或緊經云寒氣客於脈中則脈寒脈寒則縮綣縮綣則脈絀急絀急則外引小絡故卒然而痛得炅則痛立止或吐清水所謂寒氣客於腸胃厥逆上出故痛而嘔也宜溫散或溫利之本事溫脾湯厚朴乾薑甘草桂心附子各二兩大黃四錢上㕮咀各一兩水二盅煎六分頓服治痼冷在腸胃泄瀉腹痛宜先取去然後調治不可畏虛以養病也溫脾丸外臺大黃麥芽乾薑各三兩厚朴炙當歸附子炮甘草炙桂心人參枳實炙各一兩蜜丸如梧子大十五丸日三增至二十丸按溫脾丸大黃多而用蜜丸少服急法緩用也溫脾湯大黃少而作湯服且不用參歸緩法急用也總之病非實熱法不可下而痼冷在臟不下則病不去故權宜於緩急之間如此若其中無積滯者則但宜溫之而已不必下也或挾虛者則兼補之外臺附子湯附子炮甘草炙各二兩宿薑一兩倉米半升半夏制四兩白朮三兩大棗二十枚水一斗煮三升去滓分三服治虛冷腹痛佳外臺建中湯治氣血虛寒不能榮養心脾其痛連綿不已而亦無急暴之勢按之則痛反緩或按之便痛重按卻不甚痛此正是虛證經所謂虛者聶闢氣不足按之則氣足以溫之故快然而不痛是也黃耆白芍各三兩甘草炙桂心各二兩生薑六兩半夏五兩大棗十二枚飴糖十兩上以水八升煮取三升分三服治當臍痛便溺不利怯寒脈虛者方熟地三錢肉桂五分白芍一錢半桂枝五分當歸茯苓各一錢水煎服治臍下冷撮痛陰內冷如冰延胡苦楝湯方熟地二錢川楝延胡各五分附子肉桂各七分炙甘草一錢上都作一服水四盞煎至一盞去滓稍熱服空心食前溫中湯治戊土已衰不能運化又加客寒聚為滿痛散以辛熱佐以苦甘以淡泄之氣溫胃和痛自止矣厚朴薑製一兩橘皮去白一兩乾薑七錢甘草炙草豆蔻茯苓去皮木香各五錢上為粗末每服五錢水二盞薑三片煎一盞去粗溫服食前局方神保丸全蠍巴豆各十個取霜木香胡椒各二錢五分上為末入巴豆研勻湯化蒸餅丸如麻子大硃砂為衣每服五七丸此藥大能宣通臟腑治諸積氣為痛熱痛熱痛者二便閉赤喜冷惡熱經云熱留於小腸腸中痛疸熱焦渴則堅幹不得出故痛而閉不通也宜寒宜下勿遽補也肘後療卒腹痛方掘土作小坑以水滿中攪取汁飲之瘥統旨清中湯黃連山梔炒各二錢陳皮茯苓各一錢半半夏一錢薑湯炮七次草豆蔻仁捶研甘草炙各七分水二盅薑三片煎八分食前服冷熱痛冷熱痛者經所謂寒氣客於經脈之中與炅氣相搏則脈滿滿則痛而不可按也寒氣稽留熱氣從上則脈充大而血氣亂故痛甚不可按也治之宜兼寒熱而調之一方草豆蔻七分炒山梔二錢上二味為末以薑汁調粥丸服之苦楝丸治奔豚小腹痛上三味酒二升煮盡為度焙乾細末之每藥末一兩入延胡索半兩全蠍一十八個炒丁香一十八粒別為末和勻酒糊丸梧子大溫酒下五十丸空心服風痛風痛者邪風內淫腸胃與正氣相搏而痛也其症惡風脈弦腹中奔響急痛仲景所謂陽脈澀陰脈弦法當腹中急痛先與小建中湯不瘥者與小柴胡湯是也小柴胡湯柴胡黃芩半夏甘草炙人參乾薑大棗水煎服按此方宜照仲景加減法腹痛者去黃芩加芍藥和劑抽刀散川白薑五兩銼入巴豆肉一錢一字同炒至豆黑去豆良薑五兩入斑蝥二十五個同炒至蝥黑去蝥石菖蒲五兩半不炒糯米六兩一錢炒黃上為末每服二錢空心溫酒調下仁齋直指云有一田夫醉飽之餘露星取快一枕天明自此脾疼攻刺百藥罔效淹淹數載後遇至人授以抽刀散數服頓愈則知風露之根入在脾胃良薑菖蒲為能散其邪巴蝥借氣為能伐其根觀此可以通一畢萬矣然而痛不復作養脾之劑獨不可繼是而調理之乎療病如濯衣必去其垢汙而後可以加漿飾醫者意也請借是以為喻食積痛食積痛者經所謂飲食自倍腸胃乃傷也其症噁心惡食吞酸噯腐其脈多沉實當分三焦而治在上吐之在中消之在下下之吐之方燒鹽半升溫湯五六升和服探吐吳鶴皋云凡腹痛連脅膈手足冷脈沉伏者多是飲食痰飲填塞至陰抑遏少陽上升之氣不得敷暢兩實相搏令人自痛肢冷脈伏皆陽氣閉藏之象也經曰木鬱達之故用吐法咸能軟堅故用燒鹽消之方取其餘類燒作末酒服方寸匕如食肉即以肉燒作末然必得如所食者燒作末乃效鶴年又治雜食瘀實不消心腹堅痛方白鹽一升以水三升煎服吐下即定下之方川大黃乾薑巴豆去皮心研壓去油等分蜜丸如小豆大溫水下一丸實者加一丸未知服三丸腹中鳴轉下行便愈此治寒飲食過傷心腹卒痛如錐刺之狀若傷濕熱之物不得化而悶亂便閉者宜厚朴三物湯或枳實導滯丸良厚朴三物湯厚朴二兩炙去皮枳實二枚大者炙大黃四兩水二斗煮枳實厚朴二味至五升下大黃煮取二升溫服一升以利為度死血痛死血痛者多從鬱怒及飽食後急走得之其痛必有定處其脈必芤澀微則和之甚則下之桃仁承氣湯桃仁五十粒去皮尖桂枝二兩去皮大黃四兩芒硝二兩甘草炙二兩上五味以水七升煮取二升半去滓內芒硝更上火微沸下火先食溫服五合日三服當微利虛者加地黃蜜丸以緩除之一方婦人油頭髮燒如灰細研篩過溫酒調下二錢元豐中丞相王郇公小腹痛國醫治之百藥不止服此即愈腰痛風虛腰痛風虛腰痛者腎虛而風冷乘之也其尺脈虛浮而痛多抽掣或拘急且酸而上連脊背不時速治喜流入腳膝為偏枯冷痹緩弱之疾獨活寄生湯獨活三兩細辛牛膝桑寄生秦艽茯苓白芍人參熟地黃防風杜仲川芎當歸各二兩桂心甘草每服五錢水煎空心服甘豆湯直指治腎虛內蓄風熱腰痛或大小便不通生甘草二錢黑大豆二合加生薑七片水煎服治腎臟風攻注腳膝痛連珠甘遂一兩木鱉子一個雄一個雌去殼上為末豶豬腰子二個破開藥末一錢摻勻濕紙裹數重慢火煨熟放溫五更初細嚼米飲下如積多則利多少則少也宜軟飯將息若患一腳卻看左右如左腳用左邊腰子右用右邊者藥末止一錢壬子年在毗陵有馬姓人鬻酒久不見因詢其親云宿患腎臟風今一足發腫如瓠自腰以下巨細通為一律痛不可忍臥欲轉側必兩人挾持方可動或者欲以鈹刀決之豫曰未可豫有藥當合以贈如上法服之辰巳間下膿如水晶者數升即時痛止腫退一月拄拐而行豫再以赤烏散充塗貼其膝方愈後十年過毗陵率其子列拜以謝云向年腳疾至今不復作雖積年腎臟風並已失去今健步自若矣經云邪之所湊其氣必虛留而不去其病則實若不決而去之而欲以補藥攻疾非徒無效而已也余讀本事方有取乎此故備録如上濕冷腰痛濕冷腰痛者坐臥濕冷久久得之金匱所謂腎著是也其症痛而冷重遇陰或久坐則甚腎著湯主之腎著湯生附湯附子生一分蒼朮炒杜仲薑汁炒各半兩生乾薑白朮茯苓牛膝酒浸焙厚朴制甘草炙各二兩上銼每三錢薑四片棗二枚食前服牽牛丸治冷濕流注腰疼不可屈伸黑牽牛延胡索微炒補骨脂三味另研另搗另炒取末各二兩上煨蒜研膏丸如桐子大每服五十丸食前蔥酒鹽湯任下楊氏家藏方子和禹功散治水氣流注腰痛黑牽牛四兩茴香炒一兩上為末薑汁調一二錢服濕熱腰痛脾有濕熱傳之於腎得之醇酒厚味內傷中氣濕熱蘊積流注腎經令人沉重疼痛遇天陰或久坐而發其脈緩者是也東垣蒼朮湯蒼朮五錢去濕止痛柴胡三錢行經防風一錢半去風勝濕黃柏一錢半除熱止痛水二盅煎至一盅空心食前丹溪治濕熱腰腿痛方龜板酒炙二兩蒼朮黃柏酒炒蒼耳威靈仙酒浸一兩側柏半兩上為末酒糊為丸每用黑豆汁煎四物湯加陳皮甘草生薑煎湯下一方有白芍知母腎虛腰痛腎虛腰痛者精氣不足足少陰氣衰也足少陰者腎之精也其脈貫脊屬腎抵腰中精氣不足則經脈虛而痛其症形羸氣少行立不支而臥息少可無甚大痛而悠悠戚戚屢發不已經云腰者腎之腑轉搖不能腎將憊矣此之謂也丹溪云腎虛者其脈大本事麋茸丸麋茸鹿茸亦可菟絲子制各一兩舶茴香五錢上為末以羊腎二對陳酒煮爛去膜研如泥和丸桐子大陰乾如羊腎少太乾以酒糊佐之每服三五十丸溫酒或鹽湯下青娥丸破故紙四兩炒香杜仲淨八兩薑汁炒胡桃肉十兩上為末酒糊丸梧子大每三五十丸空心溫酒送下蜜丸亦可百一補髓丹有鹿茸二兩沒藥一兩無比山藥丸赤石脂煅茯苓去皮木山茱萸去核巴戟去心牛膝酒浸熟乾地黃酒浸澤瀉各三兩菟絲酒浸杜仲去皮切薑汁炒山藥各三兩五味子六兩肉蓯蓉酒浸四兩蜜丸梧子大每服三十丸空心溫酒或鹽湯下余治一姓顧婦女患腎虛腰痛用豬腰二枚破開綱鹽水炒杜仲末縫好煮熟去藥任意服之而愈食積腰痛食積腰痛者食滯於脾而氣滯於腎也夫腎受脾之精而藏焉者也若食不消則所輸於腎者非精微之氣為陳腐之氣矣而腎受之亂氣傷精能無痛乎亦有醉飽入房太甚酒食之積乘虛流入少陰腰痛難以俯仰者疏瀹其源澄清其流此大法也或云四物合二陳加麥芽神麯杜仲黃柏官桂砂仁葛花桔梗之類神麯酒陳久神麯一塊燒通紅焠老酒去神麯通口吞青娥丸兩服頓愈青娥丸見前瘀血腰痛瘀血腰痛者閃挫及強立舉重得之蓋腰者一身之要屈伸俯仰無不由之若一有損傷則血脈凝澀經絡壅滯令人卒痛不能轉側其脈澀日輕夜重者是也茴香酒破故紙炒香茴香炒辣桂等分上為末每服二錢熱酒調食前故紙主腰痛主行血仁齋和劑復元通氣散治閃挫腰脅痛舶上茴香炒穿山甲蛤粉炒各二兩延胡索醋炒白牽牛炒甘草炙陳皮去白各一兩楠木香一兩半上為末每服一錢熱酒調下食前脅痛總論經云左右者陰陽之道路也又云肝生於左肺藏於右所以左屬肝肝藏血肝陽也血陰也乃外陽而內陰也右屬肺肺主氣氣陽也肺陰也乃外陰而內陽也由陰陽五臟氣血分屬是以左脅之痛多因留血右脅之痛悉是痰積豈可一概而言乎雖痰氣固亦有流注於左者然必與血相搏而痛不似右脅之痛無關於血也肝鬱脅痛肝鬱脅痛者悲哀惱怒郁傷肝氣兩脅骨疼痛筋脈拘急腰腳重滯者是也枳殼煮散枳殼四兩先煮細辛桔梗防風川芎各二兩葛根一兩半甘草一兩上為粗末每服四錢水一盞半薑棗同煎至七分去滓空心食前溫服悲哀煩惱肝氣致郁枳殼能通三焦之氣故以為君肝欲散故細辛川芎桔梗之辛以散之肝苦急故用甘草之甘以緩之其用防葛者悲則氣斂借風藥以張之也戴云脅痛身體帶微熱者本事枳殼煮散良若只是脅痛別無他症其痛在左為肝經受邪宜川芎枳殼甘草其痛在右為肝移病於肺宜片薑黃枳殼桂心甘草此二方出嚴氏濟生續集柴胡疏肝散柴胡陳皮醋炒各二錢川芎芍藥枳殼香附各一錢半炙草五分水煎食前服調肝散治鬱怒傷肝發為腰痛半夏制三分辣桂宣木瓜當歸川芎牛膝北細辛各二分石菖蒲酸棗仁去皮炒甘草炙各一分上銼細每服三錢薑五片棗二枚煎服仁齋直指良方香橘湯治七情所傷中脘不快腹脅脹滿香附橘紅半夏薑製各三錢炙草一錢上作一服水二盅生薑五片紅棗二枚煎至一盅食遠服肝虛脅痛肝虛者肝陰虛也陰虛則脈絀急肝之脈貫隔布脅肋陰虛血燥則經脈失養而痛其症脅下筋急不得太息目昏不明爪枯色青遇勞則甚或忍飢即發者是也滑氏補肝散酸棗仁炒四錢熟地一錢白朮炒一錢當歸山茱萸山藥川芎木瓜各一錢半獨活五味各三分上為末每服五錢水煎服肝體陰而用陽此以甘酸補肝體以辛味補肝用加獨活者假風藥以張其氣也一方有人參黃耆牛膝石斛柏子仁桃仁無山藥獨活五味補肝湯乾地黃三錢白芍一錢半當歸陳皮各一錢川芎七分甘草五分上六味都作一服水煎此亦甘酸辛兼補體用之法一方阿膠為丸梧子大每服二錢空心白滾湯下一方雞子黃一枚調吞日二服以上二方皆甘酸補肝體之法腎虛胸脅痛房勞過度腎氣虛弱羸怯之人胸脅之間多有隱隱微痛此腎虛不能納氣氣虛不能生血之故氣與血猶水也盛則流暢少則壅滯故氣血不虛則不滯既虛則鮮有不滯者所以作痛宜用熟地破故紙之類補腎阿膠芎歸之類和血若作尋常脅痛治即殆矣戴云曾有一人脅痛連膈進諸藥味並大便導之其痛殊甚後用辛熱補劑下黑錫丹方愈此乃腎肝虛冷作痛愈疏而愈虛耳肝火脅痛肝火盛而脅痛者肝氣實也其人氣收善怒經云肝病者兩脅下痛引少腹善怒又云肝氣實則怒是也其脈當弦急數實其口當苦酸其痛必甚或煩熱或渴或二便熱澀不通龍薈丸方丹溪云治肝火脅痛要藥龍膽草當歸並酒洗梔子黃連黃柏黃芩各一兩大黃酒浸青黛蘆薈各五錢木香二錢半麝香五分蜜丸小豆大薑湯下二三十丸元珠云一人性躁夏月受熱忽左脅間痛皮膚紅如碗大發水疱瘡三五點脈弦數醫作肝經鬱火治之用黃連青皮香附川芎柴胡之類進一劑痛益甚且增熱皮紅大如盤水泡瘡又加至三十餘粒醫以水調白鬱金末敷於前劑加青黛龍膽進之夜痛益甚脅中如鉤摘之狀次早視之紅已及半身矣立泡又增至百數後詢黃古潭乃以大栝蔞一枚連皮搗爛加粉草二錢紅花五分藥進而痛止蓋前藥苦寒益資其燥栝蔞之為物柔而潤滑於郁不逆甘緩潤下故奏效捷也汙血脅痛汙血脅痛者凡跌僕損傷汙血必歸脅下故也其症晝輕夜重或午後發熱脈短澀或搏其人喘逆經云肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆是也東垣復元活血湯柴胡半兩栝蔞根當歸各三錢紅花甘草穿山甲炮各二錢大黃酒浸一錢半桃仁去皮尖研如泥五十枚上除桃仁外銼如麻豆大每服半兩水盞半酒半盞同煎至七分去渣大溫服之以利為度針經云有所墮墜惡血留內若有所大怒氣上而不下積於脅下則傷肝肝膽之經俱行於脅下經屬厥陰少陽宜以柴胡為君以當歸和血脈又痛者急也甘草緩其急亦能生新為臣穿山甲栝蔞根桃仁紅花破血潤血為佐大黃酒製以蕩滌敗血為使氣味和合氣血有所歸痛自定矣芍藥散治婦人脅痛白芍藥延胡索肉桂各一兩香附二兩醋一升鹽半兩同煮乾上為細末每服二錢不拘時白湯下息積內經曰病脅下滿氣逆二三歲不已病名曰息積夫消息者陰陽之更事也今氣聚於脅下息而不消積而不散故滿逆而為病然氣不在胃故不妨於食特害於氣而已治宜導引服藥藥不可獨治善導引能行積氣藥力亦藉導引而行故也聖濟同下推氣散治右脅痛脹滿不食片薑黃枳殼桂心各五錢炙草二錢上為細末每服二錢薑棗湯調下食遠服赤茯苓湯治息積脅下氣逆滿悶赤茯苓桂心陳皮炒半兩高良薑一兩大腹皮五錢吳茱萸三分甘草一分水煎三錢空心溫服日二白朮丸白朮陳土炒枳實麩炒桂心各一兩半人參陳皮去白炒甘草蜜炙桔梗炒各一兩為末蜜丸梧子大空心酒下三十丸日二胸痛附生地黃五斤絞取汁微火煎三沸投白蜜一升再煎取三升每服半升日三四肢腫經云結陽者腫四肢河間云四肢者諸陽之本也陽結故不得行於陰陽脈不行故留結而為腫也犀角湯犀角屑元參連翹柴胡各半兩麥門冬芒硝各一兩升麻木通各三錢沉香射干去毛甘草炙各一分上為末每服三錢水一盞同煎至八分食前去渣溫服余曾治手十指獨腫大者與此藥愈有傷寒後手足腫而赤者與此亦愈但去柴胡沉香芒硝不用加枳殼一味蓋柴胡散氣沉香行氣皆所以通留結之陽然升柴不必並行而沉香之溫燥不如枳殼之和利也芒硝瀉陽明之陽以其人便溏故去之耳顫振顫振手足動搖不能自主乃肝之病風之象而脾受之也肝應木木主風風為陽陽主動脾應土土主四肢四肢受氣於脾者也土氣不足而木氣鼓之故振之動搖所謂風淫末疾者是也按手足為諸陽之本陽氣不足則四肢不能自主而肝風得以侮之肝應木熱生風陰血衰則熱而風生焉故犯此症者高年氣血兩虛之人往往有之治之極難奏功腳氣之源內經曰暑勝則地熱風勝則地動濕勝則地泥寒勝則地裂寒暑風濕之氣雖本乎天而皆入乎地而人之足履之所以往往受其毒也始從足起漸及小腹甚乃上攻心胸若不急治遂至殺人況五臟經絡脾與肝腎皆從足指上走腹中故腳氣之候或嘔吐惡食或腹痛不利或二便閉塞不通或胸中怔悸不欲見明或精神昏憒錯語善忘或頭疼壯熱或身體冷痛時覺轉筋或少腹不仁或髀腿頑痹或百節攣急或緩縱不隨症狀不一以其自腳得之故均謂之腳氣而又有乾溼之異乾腳氣之狀血脈痞澀皮膚麻痹脛細痠疼食減體瘦臟腑祕滯上衝煩悶濕腳氣之狀腳先腫滿或下注生瘡浸淫滋水或上攻心腹咳嗽喘急面浮膝腫見食嘔吐為病不同蓋陰陽體臟所分其為風毒濕氣則一要當隨其病症所在而治之腳氣痹攣腳氣痹攣者寒氣多也寒則筋急熱則縱寒則脈閉熱則流寒搏於筋脈則攣痹不能轉移艱於步履甚則不可屈伸也肉蓯蓉丸蓯蓉牛膝天麻黃耆首烏木瓜各十兩酒五斤浸一日曬入後藥狗脊續斷萆薢各三兩共末用木瓜三枚剜空入青鹽一兩閉口飯上蒸研成膏入上件和丸如干加酒糊丸梧子大鹽湯酒任下三十丸石南丸腳氣攣痹去風濕活血絡益元氣石南白朮牛膝同上酒浸天麻防風枸杞黃耆二兩鹿茸桂枝一兩五錢共為末用木瓜一枚去皮瓤蒸爛搗膏入糊丸梧子大酒下三五十丸楊氏家藏方治寒濕腳氣腿膝疼痛行步乏力胡蘆巴酒浸一宿焙破故紙炒香各四兩為末以木瓜切頂去瓤安藥在內令滿用頂合住簽之爛蒸搗丸梧子大每服七十丸空心溫酒下腳氣腳膝腫痛腳膝腫痛者風寒溫氣客於氣血不能宣通則壅滯為腫凝澀為痛人之氣血得溫則行遇寒則止故也又邪氣初中但在於下而未及乎上所謂傷於濕者下先受之也疏導其下固護其中法斯善矣防己湯防己豬苓郁李仁檳榔木通枳殼紫蘇五錢赤茯苓炙草一兩薑水煎四錢一方有白朮經驗加味二妙丸治兩腳濕痹疼痛或如火燎從足跗熱起漸至腰胯或麻痹痿軟皆是濕熱為病此藥主之蒼朮四兩米泔浸黃柏二兩酒浸曬乾川牛膝一兩去蘆防己當歸尾川萆薢龜板酥炙各一兩上為細末酒煮麵極熟糊丸如梧子大每一百丸空心薑鹽湯下檳榔散治風毒腳氣腫痛橘葉杉木節各一握上用童子尿一盞醇酒半盞煎六分濾清乘熱調檳榔末二錢仁齋腳氣少腹不仁金匱云腳氣上入少腹不仁腎氣丸主之蓋濕淫之氣自下侵上腎虛陽弱不能御之則漸入少腹而痹著不仁矣腎氣丸理腎之氣者也腎氣得理邪氣自下而不仁者仁矣腎氣丸熟地黃八兩萸肉山藥各四兩茯苓澤瀉丹皮各三兩附子制肉桂各一兩上八味末之煉蜜為丸梧子大每服三錢空心淡鹽湯下三因吳萸丸治腳氣入腹腹中不仁喘急欲死吳茱萸湯洗七次木瓜去瓤切片日乾等分上為末酒糊丸梧子大每服五十丸至百丸酒飲任下或以木瓜蒸爛研膏為丸尤妙腳氣上氣腳氣上氣者風毒濕氣循經上入於肺故也肺主氣而司呼吸邪氣入之則氣道奔迫升降不順故令上氣喘滿甚者不得偃臥也桑白皮湯桑白皮炙二兩陳皮一兩葶藶苦者炒研一兩杏仁去皮尖一兩共為末水煎薑棗湯入末三錢再沸溫服當利一二行腫氣下卻瘥三五日服一次一方無杏仁活人桑白皮散桑白皮郁李仁各一兩赤苓二兩木香防己各一兩半紫蘇子木通檳榔青皮各七錢半每服三錢薑三片水煎腳氣衝心腳氣衝心之候令人心胸煩悶嘔吐氣急甚者脈絶不出欲死也蓋風濕毒氣初從足起久而不治則上衝心胃之分最為急候下氣除濕泄毒不可緩也吳茱萸湯吳茱萸半兩木瓜一兩檳榔二兩雞心者佳水煎五錢入竹葉一把以快利為度一法㕮咀每服八錢水一中盞半生薑五片煎至一盞去滓溫服無時蘇長史茱萸湯吳萸六升木瓜二枚水一斗三升煮取三升分三服如人行十里久進一服或吐或汗或利或大熱悶即瘥木香湯青木香生黑豆皮二兩大黃炒紫雪一兩水煎五錢入紫雪三錢分二服頃再服當下燥糞杉木節湯杉木節橘葉一升大腹七枚連皮童便三升同煮取一升半分二服如一服得快利即止唐柳宗元患腳氣夜半痞絶左脅有塊如大石且死困塞不知人三日矣家人皆號哭榮陽鄭洵美傳此方服之半日頃氣通立愈犀角散治腳氣衝心煩喘悶亂頭痛口乾坐臥不得犀角屑枳殼去瓤麩炒沉香各七錢半紫蘇梗葉檳榔麥冬去心赤苓去皮各一兩木香防風各半兩石膏研細二兩上㕮咀每服八錢水一中盞半煎至一大盞去渣入淡竹瀝一合更煎一二沸溫服不拘時腳氣腫滿漸成水狀腳氣腫滿漸成水狀者邪氣上攻脾腎也夫脾土氣也腎水氣也腳氣者清濕之疾其氣最易感於脾腎同氣相求之義也脾受邪則濕氣不行腎受邪則水氣不化水濕二氣內外合邪積而成滿閉而成脹也赤苓湯赤茯苓防己桑白皮陳皮一兩半旋覆五錢杏仁麻黃去根節白朮紫蘇一兩水煮黑豆汁盅半煎藥五錢薑半分腳氣瘥後復發腳氣瘥後邪氣未盡正氣未復或觸惱怒或感風濕則其疾復發與前症往往相似然與前法輒不應要在隨時令審氣體而治之四斤丸乾溼腳氣瘥後常服令永不發牛膝木瓜肉蓯蓉天麻各一斤酒五升浸一日曬乾為末用浸酒熬膏丸梧子大酒下三十丸痹症統論內經謂風寒濕三氣雜至合為痹其風氣勝者為行痹寒氣勝者為痛痹濕氣勝者為著痹行痹者行而不定世稱謂走注疼痛是也痛痹者疼痛苦楚世稱謂痛風是也著痹者著而不移世稱謂麻木不仁是也夫痹者閉也五臟六腑之正氣為邪所閉則痹而不仁也內經論痹又有骨筋脈肌皮五痹大率風寒濕所謂三痹之病又以所遇之時所客之處而命其名非此行痹痛痹著痹之外又別有骨痹筋痹脈痹肌痹皮痹也風寒濕三氣襲人經絡入於骨則重而不舉入於脈則血凝不流入於筋則屈而不伸入於肉則不仁入於皮則寒久不已則入五臟煩滿喘嘔者肺也上氣嗌乾厥脹者心也多飲數溲夜臥則驚者肝也尻以代踵脊以代頭者腎也四肢懈惰發咳嘔沫者脾也大抵顯臟症則難治矣行痹行痹者風氣勝也風之氣善行而數變故其症上下左右無所留止隨期所至血氣不通而為痹也治雖通行血氣宜多以治風之劑又壽夭剛柔篇云病在陽者名曰風病在陰者名曰痹陰陽俱病名曰風痹風痹云者以陽邪而入於陰之謂也故雖驅散風邪又必兼以行血之劑又有血痹者以血虛而風中之亦陽邪入陰所致也蓋即風痹之症而自風言之則為風痹就血言之則為血痹耳若其他風病而未入於陰者則固不得謂之痹症矣四妙散治行痹走注疼痛威靈仙酒浸焙乾五錢羯羊角灰三錢蒼耳子一錢半白芥子一錢炒細末每服一錢匕薑湯下如意通聖散治行痹走注疼痛當歸陳皮麻黃炙草川芎御米殼丁香等分上用慢火同炒令黃色每服三錢水煎服按麻黃之猛而得粟殼之澀則內行經絡不復外發皮毛故得治痹痛之疾芎歸所以行血陳皮丁香所以行氣氣血以行邪氣以去炙草則和藥緩急之用耳慢火同炒者欲令氣味和合使不相鶩而相就也丹溪治痹走注疼痛方蒼朮黃柏各酒炒二錢酒威靈仙白芥子羚羊角灰各一錢生薑一片水煎服摩風膏萆麻子一兩去皮研草烏頭半兩生用乳香一錢另研以豬脂煉去滓成膏入藥攪勻以手心摩娑如火之熱卻以藥塗摩攻注之處大妙痛痹痛痹者寒氣偏勝陽氣少陰氣多也夫宜通而塞則為痛痹之有痛以寒氣入經而稽遲泣而不行也治宜通引陽氣溫潤經絡血氣得溫而宣流則無壅閉矣河間云痹氣身寒如從水中出者氣血不行不必寒傷而作故治痛痹者雖宜溫散寒邪尤要宣流壅閉也沒藥散治遍身百節走注疼痛沒藥二兩另研虎骨四兩酥炙上為細末每服五錢酒下日三服一粒金丹草烏頭銼炒五靈脂各一兩地龍去皮炒木鱉子各半兩白膠香一兩另研當歸去蘆一兩麝香一錢另研上為細末糯米糊丸梧子大每服三丸溫酒下服藥後微汗為效原方有細墨乳香各半兩沒藥一兩八神丹有防風無當歸細墨麝香沒藥麵糊丸酒服十丸云汗出則群麻自散著痹著痹者濕氣勝也夫濕土氣也土性重緩營衛之氣與濕俱留則著而不移其症多汗而濡其病多著於下有挾寒挾熱在氣在血之異須審而治之經驗加味二妙丸方見腳氣腳膝腫痛治濕熱在下在血之劑兩足濕痹疼痛或如火燎從足跗熱起漸至腰胯或麻痹痿軟皆是濕熱為病此藥主之一方無萆薢有虎脛骨一兩又治婦人腳疼怕冷夜劇日輕生地白芍歸梢各五錢黃柏炒黃芩白朮蒼朮陳皮各三錢牛膝二錢甘草一錢上分四服水煎帶熱服按足三陰虛而濕熱襲之多為腳痛二朮二黃併除濕熱地芍歸膝益陰陳皮甘草和中陰氣益則熱易清中氣和則濕易除與加味二妙同一機軸除熱蠲痛湯濕痹氣分多者用此分而消之蒼朮米泔浸炒白朮羌活茯苓澤瀉陳皮各一錢甘草五分水煎入薑汁竹瀝各二三匙大羌活湯羌活升麻各一錢獨活七分蒼朮防風甘草威靈仙茯苓當歸澤瀉各五分上銼作一服水二盞煎至一盞溫服食前後各一服忌酒面生冷硬物羅謙甫云真定張大素嗜酒五月間病手指節腫痛屈伸不利膝臏亦然心下痞悶身體沉重不欲食食即欲吐面色痿黃精神短少至六月間求豫治之診其脈沉而緩緩者脾也難經云俞主體重節痛俞者脾之所主四肢者脾之所屬蓋其人素嗜酒加之時助濕氣大勝流於四肢故為腫痛內經云諸濕腫滿皆屬脾土仲景云濕流關節肢體煩疼此之謂也內經云濕淫於內治以苦溫以苦發之以淡滲之又云風勝濕羌活獨活苦溫透關節而勝濕故以為君升麻苦平威靈仙蒼朮防風苦辛溫發之者也故以為臣血壅而不流則痛當歸辛溫以散之甘草甘溫益氣澤瀉鹹平茯苓甘平導濕而利小便以淡滲之使氣味相合上下分散其濕也熱痹熱痹者閉熱於內也內經論痹有云其熱者陽氣多陰氣少病氣勝陽遭陰故為痹熱所謂陽遭陰者腑臟經絡先有蓄熱而復遇風寒濕氣客之熱為寒鬱氣不得通久之寒亦化熱則𤸷痹熻然而悶也升麻湯升麻射干甘草芎藭各二兩麥冬葳蕤生薑各三兩赤小豆炒三合人參二兩每服四錢入生地黃汁半合青竹葉十五片水煎溫服無時河間升麻湯治熱痹肌肉熱極體上如鼠走唇口反縱皮色變升麻三兩茯苓人參防風犀角羚羊角羌活各一兩官桂三錢上為末每服四錢水二盞薑二片竹瀝半酒杯同煎至一盞溫服無時千金犀角湯治熱毒流入四肢歷節腫痛方見風症腸痹腸痹者內經所謂數飲而出不得中氣喘爭時發飧泄是也夫大腸者傳導之腑小腸者受盛之官皆水穀氣味出入之要路也今風寒濕三氣痹之邪氣獨留正氣遂閉由是水道不通糟粕不化則雖多飲而不得溲便中氣喘滿而時發飧泄也吳茱萸散治腸痹寒濕內搏腹痛氣急大便飧泄吳茱萸湯炮焙乾乾薑泡甘草炙肉豆蔻煨各五錢砂仁神麯白朮各一兩厚朴薑汁炒陳皮去白焙良薑各二兩上為末每服一錢食前米飲下胞痹胞痹者內經云少腹膀胱按之內痛若沃以湯澀於小便上為清涕是也膀胱藏津液而稟氣化邪氣痹之水氣不行則蓄而生熱積而成實故按之內痛若沃以湯而澀於小便也足太陽之脈其直行者從巔入絡腦邪氣不得下通於胞者必反而上逆於腦腦氣下灌出於鼻竅則為清涕也腎瀝湯治胞痹小腹急痛小便赤澀麥冬五加皮犀角鎊各一錢杜仲桔便赤芍木通各一錢半桑螵蛸一個上水盞半入羊腎一隻去脂膜切細竹瀝少許同煎一盞去滓空心頓服日再服一方有桑皮無螵蛸按腸痹胞痹同為內痹而胞痹為腎虛熱壅膀胱腸痹為風寒濕著於脾胃腎瀝湯用清涼以化熱壅吳茱萸散用辛辣以開邪痹也腎著湯治胞痹小便不通臂痹臂痹者臂痛連及筋骨上支肩胛舉動難支由血弱而風中之也十味銼散附子黃耆當歸白芍各一錢川芎防風白朮茯苓肉桂各七分熟地酒浸焙乾二錢上水一盅薑三片棗二枚食後臨臥服本事方服桑枝法桑枝一小升細切炒香以水三大升煎服二升一日服盡無時圖經云桑枝平不冷不熱可以常服療體中風癢乾燥腳氣四肢拘攣上氣眼暈肺氣嗽消食利小便久服輕身聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑枝煎不服出抱朴子政和間豫嘗病二臂痛服諸藥不效依此作數劑臂痛尋愈治風寒濕痹四肢麻木不仁烏頭粥法川烏頭生末四錢用香熟白米作粥半碗慢火同熬令稀薄不要稠下薑汁一茶匙許蜜三大匙攪勻空心啜之為佳如若中濕更入薏苡米二錢增米作一中碗服許氏云此粥大治手足麻木不遂腫痛不能舉者左氏風淫末疾謂四肢為末也脾主四肢風邪客於肝則淫脾脾為肝克故疾在末此以穀氣引風濕之藥徑入脾經故四肢得安此湯劑極有力豫嘗以此方授人服者良驗攣症攣皆屬肝經云肝主身之筋膜故也有熱經云肝氣熱則筋膜乾筋膜乾則筋急而攣是也有寒經云寒多則筋攣骨痛又云寒則筋急是也有濕熱經云濕熱不攘大筋軟短小筋弛長軟短為拘馳長為痿是也有虛經云脈弗榮則筋急屈伸不利仲景云血虛則筋急是也治案楊吉老治歙丞張德操內筋攣腳不得屈伸逾年動則令人抱楊吉老云此筋病宜服下三方一年而愈治筋極養血地黃丸春夏服之熟地蔓荊各一分山萸黑狗脊炙地膚子白朮乾漆蠐螬炒天雄車前子各三分萆薢山藥澤瀉牛膝上為細末煉蜜為丸如梧子大每服五十丸溫酒下空心治筋痹肢節冷痛羚羊角湯秋服之羚羊角肉桂附子獨活各一兩三錢半白芍防風川芎各一兩上為粗末每服五錢水一盞半生薑同煎至八分取清汁服日可二三服治寒冷濕痹留於筋脈攣急不能轉側烏頭湯方冬服之大烏頭細辛川椒甘草秦艽附子官桂白芍各七分乾薑茯苓防風當歸各一兩獨活一兩三錢五分上為粗末每服三錢水一盞半棗一枚同煎至八分去滓空心食前服
