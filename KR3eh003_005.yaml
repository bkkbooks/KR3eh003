body:
  text: 卷五頭痛統論頭象天六腑清陽之氣五臟精華之血皆會於此然天氣所發六淫之邪人氣所變五賊之逆皆能相害或蔽復其清明或瘀塞其經絡因與真氣相薄而為痛也因風而痛者抽掣惡風有汗而痛因暑熱而痛者或有汗或無汗則皆惡熱而痛因濕而痛者痛而頭重遇天陰尤甚因痰飲而痛者亦頭昏重而痛憒憒欲吐因寒而痛者惡寒而脈絀急氣虛而痛者遇勞則痛甚其脈大血虛而痛者善驚惕其脈芤東垣治頭痛大率皆以酒芩酒連酒柏加風劑如清空膏安神散清上瀉火湯之類但雜用羌防升柴藁蔓等藥殊欠紀律學者師其意可也元珠茶調散簡要可用治頭風久痛須加芎歸紅花少許非獨治風兼和血止痛也細茶最能清上風熱久痛以之作引彌佳東垣謙甫常用之許學士荊芥散獨用荊芥治風煅石膏治熱何等簡要東垣清空膏諸方蓋師其意而擴充之風痰頭痛多兼嘔逆眩暈若用風藥其痰愈逆其痛益甚和劑玉壺丸乃是的藥東垣變為白朮半夏天麻湯則兼氣虛而言之耳腎厥頭痛肝厥頭痛本事方論之最詳玉真丸硫黃半夏溫降之力彌大石膏硝石寒下之能甚長夫陰氣上逆其來最暴治以純陽必多格櫃故須膏硝為之佐使令其相入而不覺其相傾耳黑錫丹亦見此意茸珠丹有二方一用硃砂鹿茸二味為丸蓋亦補虛墜浮之意一用硃砂同草烏瞿麥黃藥子火煅獨取硃砂為末作丸此不特硃砂經火有毒即草烏之辛散瞿麥黃藥子之苦降並已成灰吹去不用而顧需其相濟詎可得耶搐鼻諸方本事獨用辛溫東垣河間並用辛涼夫久畜之風多化為熱而閉郁之氣非溫不通隨病斟酌從少從多則賢者之責也頭痛餅子有用五倍子全蠍土狗各七個醋和作餅者用南星川芎等分同連須蔥白搗爛作餅者有用蓖麻子乳香者有用大黃芒硝同井底泥搗貼者然外治之藥無論邪之寒熱並宜辛溫開達徒用苦寒鬱閉益甚苟非熱極不可輕用頭痛之因非止一端有風有寒有濕有熱有兼氣兼氣者如火與濕合內經所謂少陽司天之政二之氣其熱鬱於上頭痛嘔吐昏憒是也有火勝水復者內經所云歲金不及炎火乃行復則陰厥且格陽反上行頭腦戶痛延及腦頂發熱是也有胃實者經所謂頭痛耳鳴九竅不利腸胃之所生是也有腎厥者經所謂頭痛巔疾下虛上實過在足少陰巨陽甚則入腎是也有心熱者經所謂心煩頭痛病在膈中過在手巨陽少陰是也有痰飲者其病在脾東垣所謂太陰痰厥頭痛眼黑嘔吐悶亂亦濕勝也有內風者風從火化其病在肝不特厥陰之脈與督脈上會於巔蓋即肝臟沖逆之氣亦能上至巔頂也又有真氣不守厥而上行天門真痛上引泥丸名真頭痛多不可治古方云與黑錫丹灸百會穴猛進參附烏沉或有可生然天柱折者亦難為力矣風頭痛風頭痛者風氣客於諸陽諸陽之脈皆上於頭風氣隨經上入或偏或正或入腦中稽而不行與真氣相擊則痛經云風氣循風府而上則為腦風是也其挾寒挾熱則隨症審而治之經驗治頭痛風熱痛不可忍者方元珠名茶調散小川芎一兩香白芷五錢細芽茶三錢片黃芩二兩酒拌炒再拌再炒如是三次不可令焦荊芥穗四錢薄荷葉三錢上細末每服二三錢茶清調下一方有菊花防風殭蠶石膏散石膏二兩炭火燒研細末川芎一兩炙甘草半兩上為末每服一錢蔥白好茶同煎湯調下食後日二服一方決明子作枕去頭風明目佳本事白附散治風寒客於頭中疼痛牽引兩目遂至失明白附子一兩麻黃川烏南星各半兩全蠍五個乾薑硃砂麝香各二錢半上為細末酒調一匙服略睡少時效三五七散治風寒入腦頭痛惡寒目眩防風二兩茱萸炮姜茯苓各一兩五錢細辛炮附子各七錢五分上為細末每服二錢溫酒調下局方芎辛湯治風寒濕在腦頭痛眩暈嘔吐川芎三錢細辛白朮各一錢半甘草一錢上銼作一帖入生薑五片芽茶少許水煎服濟生東垣云高巔之上惟風可到故味之薄者自地昇天者也所以頭痛皆用風藥治之然患痛人血必不活而風藥最能燥血故有愈治而愈甚者此其要尤在養血不可不審也熱厥頭痛熱厥頭痛者胃熱氣盛不能下行也其證頭中熱痛雖嚴寒猶喜風寒微來暖處或見煙火則痛復作其脈數或大者是也小清空膏片芩細切酒拌勻曬乾為末茶清調下治熱厥頭痛方大黃酒炒三次為末茶清調服熱氣在頭以風藥引之則熱彌盛而痛益甚大黃苦寒瀉熱得酒則能上行瀉腦熱昔人所謂鳥巢高巔射而去之是也茶性清上故諸頭痛藥中多加用之新定生地三錢知母酒炒黃芩酒炒各一錢薄荷黑山梔甘菊甘草荊芥各五分紅花三分上作一服水煎食遠服便閉加酒炒大黃一錢五分此方治頭痛煩熱喜見風寒稍近煙火則痛復作或便閉不通者往往取效古法動作輒頭重痛熱氣潮者屬胃丹溪云頭痛如破酒炒大黃半兩茶清煎服濕熱頭痛濕熱頭痛者濕與熱合交蒸互郁其氣上行與清陽之氣相搏則作痛也東垣云諸濕熱頭痛清空膏主之又云濕熱在頭而頭痛者必用苦吐之或用搐鼻藥清空膏療風濕熱頭痛上壅損目及腦痛年深不止羌活防風各一兩柴胡七錢川芎五錢炙草一兩半黃連一兩炒黃芩三兩一半酒製一半炒上為細末每服二錢入茶少許湯調如膏抹在口內少用白湯送下臨臥搐鼻散青黛石膏芒硝鬱金薄荷牙皂上為末搐鼻東垣白芷散有白芷無牙皂青黛又頭重如山者濕氣在頭也用紅豆散紅豆十粒麻黃瓜蒂各五分連翹羌活各三錢燒上為末搐鼻透頂散本事細辛表白者三莖瓜蒂七個丁香三粒糯米七粒冰片麝香各一黑豆大上為極細末每一大豆許患人隨左右搐之良久出涎一升許則安此藥性味視前搐鼻散稍溫也當隨證審而用之子和神芎丸治濕熱壅滯頭目赤腫疼痛大小便閉澀大黃黃芩各二兩牽牛生滑石各四兩黃連薄荷葉川芎各半兩上為末滴水為丸梧子大每服五十丸食後溫水送下寒濕頭痛一門鶴年補集頭痛由於濕熱上壅者頗多然亦有因寒濕者金匱所云頭痛鼻塞而煩其脈大自能飲食腹中和無病病在頭中寒濕故鼻塞納藥鼻中則愈愚以為本事透頂散正治寒濕頭痛之劑否則丁香細辛治濕熱頭痛無乃以火救火歟痰厥頭痛痰厥頭痛者病從脾而之胃也夫脾主為胃行其津液者也脾病則胃中津液不得宣行積而為痰隨陽明之經上攻頭腦而作痛也其證頭重悶亂眩暈不休兀兀欲吐者是也半夏白朮天麻湯治太陰痰厥頭痛眼黑頭旋噁心煩亂肢冷身重半夏陳皮去白麥芽各七錢半神麯白朮五錢炒黃耆炙蒼朮米泔浸天麻茯苓人參澤瀉各五錢半黃柏二分酒洗乾薑三分稍熱服食前一方加生薑一片外臺云頭痛非冷非風此膈有痰也濃煎茶啜一二升探吐之吐已復吐候苦汁出乃止不損人待渴自止妙茶調散子和瓜蒂好茶二味等分為末每二錢齏汁調空心服之取吐半夏茯苓湯治熱痰嘔逆頭痛半夏二錢赤苓一錢陳皮去白甘草各五分黃芩五分生薑三片煎作一服頭痛連眼痛此風痰上攻用雨前茶川芎白芷防風天台烏藥細辛當歸為末湯調服防風飲子療風痰氣發即頭旋嘔吐不食防風人參橘皮各二兩白朮茯苓各三兩生薑四兩上銼碎以水六升煮取三升去滓分溫四服一日服盡忌醋桃李雀肉蒜面直指方云二陳湯加荊芥治頭風兼治痰壅酒壅又云頭風證眉稜耳角俱痛投以風藥不效投以痰藥收功眼目赤腫羞明而痛與之涼劑弗瘳與之痰劑獲愈也玉壺丸治風痰吐逆頭痛目眩胸膈煩滿飲食不下及咳嗽痰盛嘔吐涎沫南星生半夏各一兩生天麻半兩頭白麵三兩上為細末滴水為丸梧子大每服三十丸用水一大盞先煎令沸下藥五七沸候藥浮即熟漉出放溫別用生薑湯下不計時一方有白朮五錢雄黃水飛三錢半東垣壯歲病頭痛每發時兩頰盡黃眩暈目不欲開懶於言語身體沉重兀兀欲吐數日方退潔古老人曰此厥陰太陰合而為病名曰風痰以局方玉壺丸加雄黃白朮治之芎辛導痰湯治痰厥頭痛川芎細辛南星陳皮去白茯苓各一錢半半夏二錢枳實甘草各一錢上作一服水二盅姜七片煎至一盅食後服此導痰湯加川芎細辛為引使上行也方殊簡要腎虛頭痛腎虛頭痛者腎陰不足虛陽無附而上攻素問所謂頭痛巔疾下虛上實過在足少陰巨陽許學士謂之腎厥頭痛是也玉真丸治腎氣不足氣逆上行頭痛不可忍謂之腎厥其脈舉之則弦按之則堅硫黃二兩石膏煅通赤研半夏硝石各一兩研上為細末研勻生薑汁和丸桐子大陰乾每服二十丸薑湯或米飲下更灸關元百壯良虛寒者去石膏加鍾乳粉一兩黑錫丹局方治脾元久冷上實下虛胸中痰飲或上攻頭目及奔豚上氣兩脅膨脹五種水氣腳氣上攻或卒暴中風痰潮上膈並陰陽氣不升降等症沉香附子胡盧巴肉桂各半兩茴香破故紙肉豆蔻金鈴子木香各一兩黑錫硫黃與黑錫結砂子各二兩上為末同研酒煮麵糊為丸如梧子大陰乾以布袋擦令光瑩每服四十丸空心姜鹽湯送下一方有陽起石半兩巴戟一兩肝厥頭痛肝厥頭痛者肝火厥逆上攻頭腦也其痛必在巔頂以肝之脈與督脈會於巔故也雖太陽之脈亦上額交巔然太陽頭痛必惡風寒而厥陰頭痛必多眩暈或厥逆抽掣也龍薈龍方見厥聾加甘菊羚羊角氣實便堅者用之虛者宜生地羚羊角甘菊麥冬之類滋之清之使肝柔則厥自已抑青丸黃連一味吳茱萸湯浸一宿為末粥丸瀉青丸當歸去蘆焙龍膽草川芎梔子川大黃煨羌活防風去蘆各等分上為末煉蜜丸雞豆大每服一丸竹葉湯同砂糖溫水化下食積頭痛食積頭痛者食氣上攻胃氣不清也子和云邪在胃而頭痛者必下之其證必兼痞膈咽酸噫敗卵臭或飽食則痛甚其脈右手滑盛者是也館職張學士嗜酒散誕忽頭痛發熱醫作傷寒治之愈甚孫兆脈之右手脈甚數左手脈平和曰此疾非傷寒學士好酒啖食所傷也遂用食藥五七丸經食久膈漸寬痛遂減再進利膈藥遂獲安紅丸子方見飲食門治中湯即理中湯加青皮陳皮等分血虛頭痛血虛頭痛者血虛脈空自魚尾上攻頭痛者是也產後多有此證魚尾眉尖後近髮際是魚尾在眉梢後陷中即絲竹空穴是也川芎當歸湯川芎當歸等分為細末每服二錢水煎溫服一方川芎半兩為末每服二錢臘茶調下甚效一方當歸一兩酒一升煮取六合飲至醉效一方四物湯加甘菊薄荷新定生地二錢當歸一錢蔓荊五分黃芩一錢酒炒白芍一錢酒炒炙草三分甘菊七分川芎五分氣虛頭痛氣虛頭痛者清陽氣虛不能上升也其脈必弦微其證必倦怠氣短惡風寒不能食羅太無雲參謀柏仲實年六十餘二月間患頭痛不可忍邀往視之其人云近在燕京患頭昏悶微痛醫作傷寒治之汗出後痛轉加復汗解痛益甚遂歸每召醫用藥雷同到今痛甚不得安臥惡風寒而不喜食飲診其脈弦微而細氣短而促懶言語內經曰春氣者病在頭今年高氣弱清氣不能上升頭面故昏悶此病本無表邪因發汗數四清陽之氣愈虧不能上榮亦不能外固所以頭苦痛而惡風寒不喜飲食氣弱而短宜升陽補氣頭痛自愈黃耆一錢半人參一錢白朮當歸白芍各五分陳皮炙草升麻柴胡蔓荊各三分川芎細辛各二分上㕮咀作一服水煎食後溫服減半再服愈新定人參黃耆白朮各一錢甘草五分當歸陳皮各七分升麻二分蔓荊細茶各八分白芍一錢上作一服水煎偏頭痛偏頭痛者由風邪客於陽經其經偏虛者邪氣湊於一邊痛連額角久而不已故謂之偏頭痛也王荊公患偏頭痛裕陵傳禁中秘方用生萊菔汁一蜆殼仰臥注鼻中左痛注右右痛注左或兩鼻皆注亦可數十年患皆一注而愈一婦人患偏頭痛一邊鼻塞不聞香臭常流清涕或作臭氣一陣遍治頭痛藥皆不效一醫教服芎犀丸不十數服忽然嚏突出一鋌稠膿其疾遂愈芎犀丸此方兼祛風清熱之長而得參膠等安定氣血雖虛人亦可用之安內攘外並行不悖也川芎硃砂水飛內一兩為衣石膏龍腦各四兩人參茯苓炙草細辛各二兩生犀角梔子各一兩阿膠炒一兩半麥冬三兩去心上為細末蜜丸彈子大每服一丸食後細嚼茶酒任下節齋云久病頭風略感風寒便發寒熱頭須重綿厚帕包裹者此屬本熱而標寒世人不識悉用辛溫散之輕時得效誤認為寒殊不知其本有鬱熱毛竅常疏故風易入外寒束其內熱閉逆而為痛辛熱之藥雖能開通閉逆散其表之寒邪然以熱濟熱病本益深惡寒愈甚矣惟當瀉火涼血而佐以辛溫散表之劑以從法治之則病可愈而根可除也雷頭風雷頭風者頭痛而起核塊或頭中如雷之鳴蓋為邪風所客風動則有聲也亦有因痰熱者蓋痰生熱熱生風也其法輕則散之甚則吐之下之新定消風散熱方薄荷七分連翹黃芩黑山梔犀角荊芥牛蒡子各一錢桔梗甘草各五分上作一服水煎二仙散子和云雷頭風每用此藥吐之次用神芎丸下之一名茶調散瓜蒂好茶等分上為末每二錢齏汁調空心服之取吐神芎丸方見濕熱頭痛門治痰火上升壅於氣道兼乎風火頭中痛而有聲輕如蟬鳴重如雷響半夏一兩牙皂薑汁煮大黃酒浸透濕紙包煨再浸再煨三次二兩天蟲連翹橘紅桔梗天麻各五錢片芩七錢酒炒薄荷葉三錢香白芷青礞石粉草各一錢上為末水浸蒸餅丸如綠豆大食後臨臥茶吞二錢以痰利為度然後用清痰降火煎藥調理大頭痛大頭痛者頭痛而腫大如斗乃天行疫癘病也普濟消毒飲子黃芩酒炒川連各一兩酒炒薄荷一錢橘紅二錢元參二錢甘草二錢生連翹一錢鼠黏子一錢板藍根一錢馬勃一錢天蟲炒七分升麻七分柴胡桔梗各二錢上共為細末用湯調時時服或拌蜜丸噙化或加防風薄荷川芎當歸㕮咀如麻豆大每服五錢水煎去渣熱服之食後時時服之如大便硬加酒煨大黃一錢或二錢以利之腫熱甚者宜砭刺之一方無薄荷有人參三錢東垣監濟源稅時長夏多疫癘病初覺憎寒體重次傳頭面腫盛目不能開上氣喘急咽喉不利舌乾口燥欲云大頭天行親戚不相訪問傳染多死張縣丞亦患此醫以承氣湯加藍根下之稍緩翌日其病如故下之又緩莫能愈漸至危篤東垣診之謂曰夫身半以上天之氣也身半以下地之氣也此邪客於心肺之間上攻頭目而腫痛反以承氣下之瀉胃中之實熱是誅伐無過也夫安知適其病所為故哉遂處方用黃連黃芩味苦寒瀉心肺間熱以為君元參咸微寒甘草甘寒瀉火補氣以為臣連翹鼠黏子薄荷苦辛平板藍根味甘寒馬勃白殭蠶味苦平散腫消毒定喘以為佐升麻柴胡苦平行少陽陽明二經使氣得升桔梗味苦辛溫為舟楫不令下行服之良愈乃施其方全活甚眾名普濟消毒飲子項背痛本事方云一親患項筋痛連及背胛不可轉服諸風藥皆不效余嘗憶及千金有腎氣攻背椒附丸予強與之兩服頓瘥自後與人皆有驗蓋腎氣自腰夾脊上至漕谿然後入泥丸宮漕谿一穴非精於搬運者不能透今逆行至此不得通用椒以引歸經則安矣椒附丸大附一枚六錢以上者炮去皮臍末之上每末二大錢好川椒二十粒用白麵填滿水一盞半生薑七片同煎至七分去椒入鹽通口空心服回頭散治頭項強急筋痛或銼枕轉項不得者烏藥順氣散加羌活獨活木瓜順氣散烏藥橘紅各二錢麻黃川芎白芷桔梗枳殼各一錢炒天蟲炒炮姜炙草五分加薑蔥煎臂痛臂痛有痰有虛有氣血凝滯各隨症治之指迷茯苓丸治中腕留伏痰飲臂痛難舉手足不得轉移此治痰之第一方也半夏二兩茯苓一兩枳殼去穰麩炒半兩風化朴硝二錢五分上為末薑汁麵糊丸如梧子大每服三十丸薑湯下十味銼散方見痹症門治中風血虛臂痛舉動難支眩暈雞峰云夫風眩之病起於心氣不足胸中蓄熱而實故有頭風面熱之所為也痰熱相感而動風風與心火相亂則悶瞀故謂之風眩悶瞀也又云頭風目眩者由血氣虛風邪入腦而牽引目系故也五臟六腑之精皆上注於目血氣與脈並上為目系屬於腦後出於項中血脈若虛則為風邪所傷入腦則轉而目系急故成眩也診其脈洪大而長者風眩也按眩暈雖為風病而有內外之分雞峰所謂痰熱相感而動風者風自內生者也血氣虛風邪入腦者風從外入者也內風多從熱化引之則彌盛外風多從虛入清之則轉加二者不可不辨也素問云頭痛巔疾下虛上實過在足少陰巨陽甚則入腎徇蒙招尤目瞑耳聾下實上虛過在足少陽厥陰甚則入肝下虛者腎虛也故腎虛則頭痛上虛者肝虛也故肝虛則頭暈徇蒙者如以物蒙其首招搖不定目瞑耳聾皆暈之狀也高鼓峰云腎陰不足三陽之焰震耀於當前中土虛衰下逆之光上薄於巔頂陰虛而眩者目中時見火光土虛而眩者必兼噁心嘔吐也按中土虛衰不能下蔽真陽則上乘清道所謂上入之光也然亦有中虛肝氣動而暈者如土薄則木搖也大抵眩暈多從肝出故有肝虛頭暈腎虛頭痛之說雖亦有肝病頭痛者要未有眩暈而不兼肝者也聖濟總錄云風頭旋者以氣虛怯所稟不充陽氣不能上至於腦風邪易入與氣相鼓致頭旋而暈也亦有胸膈之上痰水結聚復犯大寒陰氣逆上風痰相聚而結上衝於頭亦令頭旋治當用人參丸祛痰丸之類者也風虛眩暈之方守中丸治風虛頭眩腦轉目系急忽然倒僕人參白朮甘菊枸杞子山藥各二兩白茯苓十兩去皮麥冬三兩生地黃二十斤絞去汁上為細末先用生地黃汁於銀器內入酥三兩白蜜三兩同煎逐旋掠取汁上金花令盡得五升許於銀器內拌炒前七味藥漸漸令乾入白蜜同搗數千杵丸如梧子大每服五十丸空心溫酒送下服百日後五臟充滿肌膚滑澤此藥須擇四季旺相日或甲子日修合亦名五芝地仙金髓丸防風飲子本事治風眩頭暈川芎散山萸肉一兩山藥人參甘菊花小川芎茯神各半兩上為細末每服二錢酒調下不拘時日三服肝厥頭暈之方本事鉤藤散鉤藤陳皮半夏麥冬茯苓茯神人參甘菊防風各半兩甘草一分石膏一兩上為粗末每服四錢水一盞半姜七片煎七分去渣溫服下虛眩暈之方沉香磁石丸治上盛下虛頭目眩暈耳鳴耳聾沉香青鹽並別研蔓荊甘菊各五錢巴戟胡盧巴山藥炒川椒去目炒磁石火煅醋淬細研水飛山萸肉陽起石火煅研附子各一兩炮上為細末用酒煮米和丸梧子大每服五十丸加至七十丸空心鹽湯下熱風頭眩之方羚羊角湯治熱毒風上衝頭目旋暈耳內虛鳴羚羊角二兩菊花三兩防風藁本元參黃芩杏仁去皮尖石菖蒲炙甘草各一兩每服五錢水煎食後溫服一方有羌活前胡耳病統論耳者腎之竅而膽與胃之脈所過之處也故其病亦有數種有氣厥而聾者有腎虛而聾者有風火壅閉腫痛或鳴或聾者有熱氣乘虛隨脈入耳而為膿耳者有耳出津液結核塞耳而為耵耳者又有左聾右聾左右俱聾之異左聾者有所忿怒過極則動少陽膽火故從左起以龍薈丸主之右聾者多因色欲過度致動少陰相火故從右起以六味地黃丸主之左右俱聾因醇酒厚味無節則動陽明胃火故從中起以通聖散滾痰丸主之統三者而論之忿怒致耳聾者為尤多也風聾風聾者經氣虛而風乘之正氣不通風邪內鼓則耳中引痛牽及頭腦甚者聾閉不通也魚腦膏治風聾日久生鯉魚腦二兩當歸細辛附子去皮臍白芷菖蒲各三兩共為末以魚腦置銀器中入藥在內微火煮候香去滓入瓷盒中候凝取如棗核大綿裹塞耳中一方以竹筒盛鯉魚腦炊飲處蒸之令烊置耳中一方以鯉魚膽汁滴入耳中久聾方蓖麻子二十一粒去油遠志乳香磁石煅各二錢皂角半挺煨去肉生地龍中者一條全蠍二個焙上為細末入臘搗丸拄入耳犀角飲子治風與熱合上壅耳內痛腫聾閉犀角木通石菖蒲甘菊花元參赤芍赤小豆各二錢甘草一錢炙水二盅生薑五片煎一盅不拘時服若風熱壅盛便秘心煩者宜防風通聖散亦有胃中痰火壅熱生風上攻清道因而耳鳴築築然氣閉而不通鼻寒不利口不知味痰多膈熱不清脈滑數大或弦內經所謂頭痛耳鳴九竅不利腸胃之所生也宜半夏曲橘紅甘菊茯苓甘草知母酒芩麻黃石膏桔梗桑皮之屬鼠黏子湯治風熱壅盛耳內生腫如櫻桃極痛連翹黃芩酒炒牛蒡子炒元參桔梗梔子炒生甘草龍膽草炒板藍根上銼水煎食後服隨飲酒一二盞厥聾厥聾者經脈氣厥耳聾也巢氏云臟腑氣逆名之為厥厥氣相搏入於耳之脈則令聾手少陽之脈動而氣厥者其候耳內煇煇焞焞也手太陽厥而耳聾者其候聾而耳內氣滿然厥聾之候大都肝膽氣逆所致其症必起於卒暴之間蓋肝膽並善逆而其氣多暴也以龍薈丸瀉肝膽降逆氣中有辛香並能通竅也龍薈丸當歸焙龍膽草酒洗山梔炒黃連黃柏黃芩各一兩大黃蘆薈青黛各半兩木香二錢半麝香五分另研煉蜜丸桐子大薑湯下二三十丸便不堅者去大黃一方無黃連黃柏有青皮柴胡膽星秘傳降氣湯加石菖蒲治氣壅耳聾大有神效方見氣門腎虛耳聾腎藏精而氣通於耳腎虛精少其氣不通於上則耳聾不聰經云精脫者耳聾是也其候頰顴色黑瘦悴力疲昏昏憒憒因勞則甚亦謂之勞聾肉蓯蓉丸肉蓯蓉酒浸一宿切焙附子去皮臍山茱萸炒桂心巴戟天去心石斛去根干熟地焙澤瀉菟絲子酒浸一宿別研人參白茯苓蛇床子炒牡丹皮當歸酒浸菖蒲米泔浸一宿炙草黃耆遠志芍藥防風各一兩羊腎一對去筋膜炙蜜丸梧子大每服二十丸食後溫酒下漸加至三十丸日三一方有乾薑細辛酒糊丸亦得益腎散治腎虛耳聾磁石制巴戟川椒各一兩沉香石菖蒲各半兩上為細末每服二錢用豬腎一具細切和以蔥白少許鹽並藥濕紙十重裹煨令香熟空心嚼以酒送下一方有附子無沉香菖蒲大安腎丸加磁石羌活石菖蒲良丸見喘門憶有戈雨亭令郎十餘歲痘後耳漸重聽日甚一日幾與聾無異業師薛一瓢診之云此必痘涉腎經幸而收功者所以告乏日甚一日為之圖惟於六味丸方中加入鹽水炒紫衣核桃肉三兩鹽水炒杜仲三兩石菖蒲二兩蜜丸開水下服一料而愈鶴年膿耳耵耳直指云熱氣乘虛隨脈入耳聚熱不散膿汁時出謂之膿耳治宜蔓荊子散外用石膏明礬黃丹真蚌粉龍骨麝香等分為末綿纏竹拭耳糝之又耳間有津液輕則不能為害風熱搏之津液結𩊅成核塞耳令人暴聾謂之耵耳治宜四物加羌活柴芩連翹元參等分外用生豬脂地龍釜底墨等分細研以蔥汁和捏如棗核薄綿裹入耳令潤即挑出蔓荊子散蔓荊子赤芍生地甘菊桑皮赤茯苓升麻麥冬木通炙草各一錢水二盞姜三片紅棗二枚煎一盞食後服黃龍散治膿耳枯白礬龍骨研黃丹胭脂各一錢燒麝香少許上為末以綿杖子搌去耳中膿水以藥摻入少許日日用之勿令風入鼻鼻淵鼻塞經曰膽移熱於腦則為辛頞鼻淵鼻淵者濁涕下不止也王注曰膽液不澄則為濁涕不已如水泉者故曰鼻淵此為足太陽與陽明脈俱盛也可與防風通聖散加黃連薄荷夫足太陽主表之風寒足陽明主裡之熱云太陽陽明俱盛者謂表邪與裡熱搏結久之寒亦化熱鬱伏於腦頞而不解也腦漏有老人腎經虛寒使然者用八味及暖腎之劑而愈元珠鼻塞不聞香臭或但遇寒月便塞或略感風寒亦塞不時舉發者世俗皆以為肺寒而用解表辛溫通利之藥不效殊不知此是肺經多有火邪郁甚則喜見熱而惡風寒故遇寒便塞偶感便發治法清金降火為主而佐以通利之劑若如常鼻塞不聞香臭者只作肺熱治之瀉火消痰或丸藥噙化或末藥輕調緩服久服無不效若平素原無鼻塞之病一時偶感風寒而致鼻塞聲重或流清涕者只作風寒治之防風通聖散元珠去硝黃其滑石石膏減半多加辛夷花先用三五帖再用此為丸每七十丸早晚白湯送下雄黃丸治鼻齆雄黃五分枯礬一錢瓜蒂二錢麝香少許上為丸取如豆大搐鼻亦治息肉蒼耳散治鼻流濁涕不止名曰鼻淵辛夷仁五錢蒼耳子一錢半白芷一兩薄荷一錢上為末蔥茶湯調下二錢治鼻中肉贅臭不可近痛不可搖者方以白礬末加硇砂少許吹其上頃之化水而消與勝濕湯瀉白散二帖此厚味擁濕熱蒸於肺門如雨霽之地突生芝菌也鉛紅散治肺風鼻赤生㾴舶上硫黃白礬灰各半兩上為末入黃丹少許染與病人面色相同每上半錢津液塗之洗漱罷及臨臥再上兼服升麻湯下瀉青丸除其本也舌舌脹舌出臨安民有因病傷寒而舌出過寸無能治者但以筆管通粥飲入口每日坐於門一道人見之咨嗟曰吾能療此頃刻間耳奈藥不可得何會中貴人罷直歸下馬觀病者問所須乃梅花片腦也笑曰此不難即遣僕馳取道人屑為末摻舌上隨手而縮凡用五錢醫說又方舌脹出口以蓖麻子油蘸紙作捻燒煙燻之治腫滿如豬胞方釜下墨末以酢和厚敷舌上下脫去更敷須臾即消或先決去血汁竟敷之彌佳千金方名百草霜散一方釜下黑和鹽等分醋調塗余小兒師魯幼時忽患舌脹余以煅過皂礬取紅色者少許研末搽舌上少頃便瘥口口瘡口舌生瘡其候有二一者心胃有熱氣衝上焦熏發口舌其症口臭作渴發熱飲冷是也外臺含煎主之一者胃虛食少腎水之氣逆而承之則為寒中脾胃虛衰之火被迫上炎作為口瘡其症飲食少思大便不實或手足逆冷肚腹作痛經曰歲金不及炎火乃行復則寒雨暴至厥陰乃格陽反上行民病口瘡是也宜附子理中湯參朮甘草補其中乾薑附子散其寒使土溫則火自斂也外臺含煎升麻大青射干各三兩苦竹葉梔子黃柏各一升蜜八合生地汁生元參汁各五合乾者二兩薔薇根白皮五兩上以水六升煎服二升去滓入生地蜜等同煎如飴細細含之瘥止外臺云薔薇根角蒿為口瘡之神藥黃連膏聖濟黃連三兩豬脂一斤白蜜四兩羊髓研二兩上以慢火煎豬脂取油去滓入黃連又煎令黑色下羊髓令化以綿濾去滓入蜜更煎成膏瓷合盛每含一棗大日三五度咽津不妨附子理中湯生薑煎生薑汁一盞白蜜三兩同煎十沸瓷瓶盛時時以熱水調一匙含咽之按聖濟論口瘡有實有虛實則清之虛則溫之最為明晰然二者之外又有腎虛火動一症而腎虛之候又有二端一者腎臟陰虛陽無所附而遊行於上者宜六味之屬壯水戀火一者腎臟內寒陽氣不安其宅而飛越於上者宜七味八味之屬溫臟斂陽也雖有元臟陰火上攻口舌之說乃用巴戟白芷良薑等味殊去妥協惟附子蜜炙含差咽為可耳集簡方治口舌生瘡溺桶垽七分枯礬三分二味研習敷之有涎拭去之數次即愈齒齒痛牙齒者骨之所終髓之所養也又手足陽明之支脈入於齒故骨髓之氣不足與夫陽明之脈虛風冷乘之而痛者謂之風痛蟲居齒根侵蝕不已傳受余齒而痛者謂之蟲痛若足少陰脈虛不能榮養於骨因呼吸風寒或飲嗽寒水而痛者謂之腎虛齒風痛風痛者齒齦多腫或赤得風則痛愈甚蟲痛者齒齦有竅甚則搖動宣露虛痛者悠悠慼慼無甚大痛而亦久而不已也亦有腎虛陰火上衝作痛者其候手足冷腰膝軟痛氣上衝頭面熱色赤頸筋粗大舌不大赤齦不甚腫七味湯加骨碎補牛膝治之一服如神去風之劑皂莢湯皂莢一挺去皮子炒令黃色露蜂房一枚鹽一分三味掣銼分為三帖每帖以漿水煎熱漱冷吐當歸連翹飲當歸川芎連翹生地防風荊芥白芷羌活黃芩黑山梔枳殼甘草細辛水煎服東垣蠍梢散麻黃一錢白芷羌活防風藁本柴胡升麻各五分當歸六分蠍梢少許生地一錢半細辛三分草豆蔻一錢羊脛骨灰二錢上為細末先用溫水漱口淨後搽之其痛立止一方有熟地黃連吳茱萸補腎去風之劑地黃丸治腎臟虛食冷熱齒皆痛生地黃一兩白茯苓防風獨活枸杞子山藥各半兩六味搗羅為末煉蜜丸梧子大每空心煎棗湯下十丸至十五丸聖濟張文仲療齒根欲脫方生地黃搗以棉裹貼齒根常含之甚妙地骨皮湯地骨皮生乾地黃各一兩細辛半兩戎鹽一分每用五錢水煎三五沸熱漱冷吐為瘥為度地黃湯生地黃二兩獨活一兩每用五錢以酒一盞浸一宿煎十餘沸熱漱冷吐以瘥為度殺蟲之劑白礬散治齲齒根腫出膿汁白礬燒灰熊膽各一分蟾酥雄黃麝香各半分上為散每用半錢敷牙根一方有干蛤蟆半分牛膝散治風齲疼痛解骨槽風毒痛牛膝一兩燒灰每以少許末著齒間含之又方郁李根一握水一盞煎至六分熱含之吐蟲長六分黑頭又方大醋一升煮枸杞根白皮一升取半升含之蟲立出肘後補腎之劑地黃丸人參山萸各四兩生地五斤取汁白蜜一升枸杞根三兩白茯苓二兩酥少許上將參苓杞萸為末以好酒一斗煎至三升去滓入地黃汁酥蜜同煎至可丸即丸如小豆大每服二十丸溫酒送下日三服漸加至五服八味丸安腎丸咽喉咽者咽也喉者候也咽接三脘以通胃故以之咽物喉通五臟以系肺故以之候氣氣候谷咽皎然明白千金謂喉嚨主通利水穀之道咽門主通臟腑津液神氣誤也喉以納氣故曰喉主天氣咽以納食故曰咽主地氣一陰一陽結謂之喉痹一陰謂心主一陽為三焦二脈並絡於喉氣熱內結故為喉痹喉風喉痹皆由膈間素有痰涎或因七情不節而作火動痰上壅塞咽喉所以內外腫痛水漿不入言語不出可謂危且急矣兩寸之脈浮洪而溢者喉痹也脈微而伏者死熱結咽喉腫繞於外且麻且癢腫而大者名纏喉風纏喉風之症先兩日胸膈氣緊出氣短促忽然咽喉腫痛手足厥冷氣閉不通頃刻不治纏喉風多屬痰水其咽喉內外皆腫者是也喉痹之症宜速用針法吐法以救之若懸雍垂則不可刺破刺則殺人懸雍者生於上齶音聲之關也臟腑伏熱上衝咽喉則懸雍腫長下垂也乳蛾俗名也古方通謂之喉痹以一邊腫者為單蛾兩邊腫者為雙蛾然雙蛾易治單蛾則難治嗌痛者咽門不能納穀與唾而地氣閉塞也喉痹咽痛者咽喉俱病天地之氣並閉塞也蓋病喉痹者必兼咽痛病咽痛者不必兼喉痹也凡咽喉痹不可純用涼藥目前取效上熱未除中寒復起毒氣乘虛入腹胸前高腫上喘下泄手足厥冷爪甲青紫七日後全不食口如魚口者死客熱咽痛客熱咽痛者凡風邪客喉間氣鬱成熱故為痛也統旨云有初得病發熱而咽喉自痛者此得之感冒後頓厚衣被或用辛熱即臥遂成上壅或有壅熱而欲取寒涼為外邪所襲者俱宜甘桔湯甘以除熱辛以散結也喉痹咽痛一鄉皆相似者屬於天行運氣之邪勿用酸寒之藥點之下之郁其邪於內不得出也清咽利膈散薄荷防風元參甘草各五分桔梗連翹各一錢大黃酒炒芒硝牛蒡荊芥各七分片芩酒炒梔子各五分上作一帖水煎溫服食後醫鑑甘桔湯甘草二兩炒桔梗一兩米泔浸每服五錢水一盅半煎服錢氏加阿膠海藏加牛蒡子竹茹太無加荊芥生薑丹溪云咽痛必用荊芥陰虛火炎必用元參必用方加荊芥薄荷元參防風黃芩各一兩聖濟總錄云一切咽喉痛紫雪為要藥絳雪散治咽喉熱痛腫塞寒水石半兩煅紅硼砂牙硝硃砂各研一錢龍腦半錢上為細末每一字摻入口咽津千金烏扇散生烏扇十兩升麻三兩羚羊角通草芍藥各二兩薔薇根切一升生地切五升豬脂二斤生艾葉六銖上㕮咀綿裹苦酒一升淹浸一宿內豬脂中微火煎取苦酒盡膏不鳴為度去滓薄綿裹膏似大杏仁大內喉中細細吞之碧雪治積熱口舌生瘡心煩喉閉芒硝青黛寒水石石膏煅各飛研朴硝硝石馬牙硝各等分甘草煎湯二升入諸藥再煎用柳枝不住攪令溶方入青黛和勻傾入砂盆內冷即成霜研末每用少許以津含化如喉閉以竹管吹入喉中牛蒡子湯牛蒡子二錢元參犀角升麻黃芩木通桔梗甘草各一錢水煎食後服此辛涼解散之劑聖濟射干丸方射干一兩香豉一合杏仁去皮尖炒芍藥犀角各二兩升麻一兩炙草半兩蜜丸小彈子大每一丸含化咽津日三五服元參散元參一兩升麻射干大黃各五錢酒浸甘草二錢半炙每服五錢水煎時時含咽客寒咽痛針經云寒氣客於會厭卒然如啞此寒氣與痰涎凝結咽喉之間宜以甘辛溫藥治之切忌寒涼邪郁不解則疾成矣千金母姜酒母薑汁一升酥牛骨髓各一升桂心秦椒各一兩防風一兩半芎藭獨活各一兩六銖上為末內薑汁中煎取相淹濡下酥髓等合調微火三上三下煎平旦溫清酒一升下膏二合即細細吞之日三夜一半夏桂甘湯治冷症無陽咽痛喉閉辣桂甘草炙半夏制上件等分銼每服三錢水一大盞煎半盞細細呷之活人伏氣之病謂非時暴寒中人伏於少陰之經始先不覺旬日乃發先發咽痛次必下利古方謂之腎傷寒宜用半夏桂甘湯咽痛失音咽痛失音者風熱痰涎壅閉咽門也亦有陰虛肺損者蓋肺象金而出聲音金破則不鳴金實亦不鳴辨之之法實者壅遏不出虛者聲嘶破也宣明訶子湯訶子四個半生半熟桔梗一兩半炙半生甘草二寸半炙半生上為細末每服二錢用童子小便一盞水一盞煎五六沸溫服甚者不過三服即愈海藏發聲散治咽喉痛語聲不出栝蔞一個白殭蠶去頭炒半兩甘草炙二錢上為細末每服三錢溫酒或生薑自然汁調下用五分綿裹噙化咽津亦得日兩三服寶鑑有桔梗七錢半炒為末每一錢入朴硝一錢匕和勻口含咽津咽喉妨悶咽喉如有物妨悶者肺胃壅滯痰氣相搏結於喉間金匱所謂咽中如有炙臠千金所謂咽中貼貼狀如炙臠吞不下吐不出者是也其症婦人多郁者恆患之聖惠方云憂愁思慮氣逆痰結皆生是疾也醫學正論喉乾燥痛四物加桔梗荊芥黃柏知母煎服立已咽喉乾枯常如毛刺吞嚥有礙者風燥也宜荊防敗毒散加薄荷黃芩倍桔梗入生薑煎服厚朴湯厚朴薑汁炙赤苓紫蘇葉各一兩半夏薑製一兩半每服三錢入生薑三片同煎食後溫服杏仁煎杏仁去皮尖雙仁炒桑根白皮貝母各一兩半酥半兩生薑汁二合生地汁二合半大棗六十枚紫菀二分甘草炙桔梗炒五味子地骨皮赤茯苓去皮各一兩人參三分共十四味研杏仁以水五升濾取汁將草藥細銼同煎至二升以綿濾去滓續下酥及地黃汁慢火煎成膏每食後含一匙細細嚥津按喉間痰氣結聚成核久而不散則生燥澀厚朴湯用辛味以破之也杏仁煎假潤藥以通之也發聲散治咽痛生瘡妨悶黃栝蔞大者一枚桔梗七錢半白殭蠶五錢炒甘草二錢炒上為末每取少許乾摻如咽腫紅紫色加朴硝一錢如喉中有小白頭瘡入白礬末五分通嗌散治喉痛生瘡聲啞白硼砂二錢孩兒茶青黛滑石寒水石各一錢蒲黃馬牙硝枯白礬各六分黃連黃柏各五分片腦二分上為細末煉化白砂糖和丸芡實大臥時舌壓一丸自化入喉神效一人但飲食若別有一咽喉斜過膈下經達左脅而作痞悶以手按之則漉漉有聲以控涎丹十粒服之少時痞處熱作一聲轉瀉下痰飲二升再食正下而達胃矣喉痹諸法喉痹者咽喉腫塞痹痛水漿不得入是也由脾肺不利蘊積熱毒而復遇暴寒折之熱為寒閉氣不得通結於喉間其症發熱惡寒喘塞脹悶不急治殺人針刺出血搐鼻吐痰皆急法也文潞公喉腫咽痛喉科治之三日愈甚上召孫兆治之孫曰疾得相公書判筆一管去筆頭沾水點藥入喉便愈孫隨便刺相公昏僕不省人事左右皆驚愕流汗孫乃笑曰非我不能救相公須臾嘔出膿血升余旬日乃平復如故予嘗治一男子喉痹於太谿穴刺出黑血半盞而愈由是言之喉痹以惡血不散故也凡治此疾暴者必先發散發散不愈次取痰取痰不愈次取汙血也婁全善綱目火鬱則發之即發散之意也血出多則愈有針瘡者薑汁調熟水時時呷之治急喉痛於大指外邊指甲根齊針之不問男左女右只用人家常使針針之令出血即效如大段危急兩手大指多針之甚妙夷堅志挑背法於暗室中用紅紙條點火照背上隱隱有紅點用針挑破喉痹將死者破盡即蘇元公章少卿述聞德府士人攜僕入京其一患喉閉脹滿氣喘塞不通命在須臾詢諸郡人云惟馬行街山水李家可看治即與之往李駭曰此症甚危猶幸來此不然死耳乃於笥中取一紙捻用火點著半煙起吹滅之令僕張口刺於喉間俄吐出紫血半合即時氣寬能言及啖粥摻藥敷之立愈士人甚神其術後還鄉里村落一醫偶傳得此法云咽喉病發於六腑者如引手可探及刺破瘀血即已若發於五臟則受毒牢深手法藥力難到惟用紙捻為第一然不言所以用之之意後有人拾得其殘者蓋預以巴豆油塗紙故施火即著藉其毒氣徑赴病處以破其毒也牙關緊閉者以煙燻入鼻中即時口鼻涎流牙關自開醫說周密齊東野語云密過南浦有老醫授治喉痹垂死方用真鴨嘴膽礬為末醋調灌之大吐膠痰數升即瘥臨汀一老兵妻苦此絕水粒三日矣如法用之即瘥屢用無不效驗神方也濟生方用膽礬二錢半白殭蠶炒五錢研每以少許吹之吐涎各二聖散孫兆治潘元從急喉痹以藥半錢吹入喉中少頃吐出膿血立愈潘謝曰非明公不能救贈金百兩願求其方孫曰豬牙皂白礬黃連等分瓦上焙為末耳既授方不受所贈解毒雄黃丸雄黃鬱金各一分巴豆去皮油十四粒細末醋糊丸綠豆大茶清下七丸吐出頑痰立蘇水漿不得入口者醋磨灌喉取吐未吐再服丹溪云薑汁殭蠶末治咽痛喉痹神效喉痹吹藥白礬末一錢同巴豆一粒同炒去巴豆取礬研細末吹之即吐濁痰名碧雲散再入輕粉麝香少許名粉香散吹乳蛾即開玉鎖匙焰硝七錢半硼砂二錢半白殭蠶一錢二分半龍腦一字為末以竹管吹五分入喉中神效直指搐鼻透關散雄黃研豬牙皂莢蜜炙去皮藜蘆各一分上為末每用一匙分彈入兩鼻中關透即瘥凡人患喉閉及纏喉風用藥開得咽喉可通湯水急吸薄粥半碗或一碗壓下餘熱不爾即病再來不可不知也咽喉既可身熱頭痛不止此感外邪看脈氣及大小便有表症則發散有里症則微下之皆愈愈後虛喘而身不熱者必是服涼藥過多而下虛也當服鎮重溫藥一服如黑錫正元之類以粥壓之冰梅丸治喉風腫痛如神天南星三十個大半夏白礬白鹽防風朴硝各四兩桔梗二兩甘草一兩大梅實揀七分熟者一百個先將硝鹽水浸一伏時然後將各藥研碎入水拌勻方將梅實置於水淹過三指為度浸七日取出曬乾又入水中浸透曬乾俟藥水干為度方將梅子入磁罐封密如霜衣白愈佳用時綿裹噙口中徐徐咽汁下痰出即愈時行喉痛宜用普濟消毒飲子神效散治喉痹語聲不出豬牙皂角和霜梅為末噙之急喉痹其聲鼾者有如痰在喉響此為肺絕之候宜用人參膏救之用竹瀝薑汁放開頻頻服之如未得參膏獨參湯亦得早者十全七八次則十全四遲則十不全一也爛喉痧方筆友張瑞符傳西牛黃五釐冰片三釐真珠三分人指甲五釐男病用女女病用男象牙屑三分焙壁錢二十個焙土壁磚上者可用木板上者不可用青黛六分去灰腳淨共為極細末吹患處效筆友張瑞符湖州府人也予往來二十年矣其為人也敦厚和平年過五旬並未生育雖置妾亦終不得懷孕忽一日遇李相士即道喜云爾當生子矣李乃張之同鄉友也張錯愕曰我半生已來並未生育爾何得相戲若此李曰我昔年曾看爾相許爾無子今爾陰騭紋已滿面豈無子之相後果如其言予因問張曰爾一生如何為善張曰生平並未有善只有兩事亦人所當為者也一舍弟早亡所遺一子我撫養長大而舍弟所有主顧我已相與二十年矣舍侄既長我使之去彼不願我曰爾在我處我甚有益但爾不去終身只作店夥我所不忍今於爾筆同往各主顧家相致曰此即我舍弟某之子也今已長可仍用其筆況此子自幼在我店習業彼之筆即我之筆也又此方甚效我所不秘余亦無所為予曰只此可稱善矣有侄少孤撫之成立並使其能繼父業有急救之方而公之於世善莫大焉予得是方並述其始末云爾鶴年
