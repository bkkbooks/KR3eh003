body:
  text: 卷七咳嗽統論經言五臟六腑皆令人咳蓋有自外而入者風寒暑濕燥火是也有自內而發者七情飢飽勞傷是也風寒諸氣先自皮毛而入皮毛者肺之合皮毛受邪內從其所合則咳者自外而入者也七情飢飽內有所傷則邪上逆肺為氣出入之道故五臟之邪上觸於肺亦咳此自內而發者也然諸氣所感有不為嗽者病邪特甚徑傷臟腑不留於皮毛七情所傷亦有不為嗽者病邪尚淺上留本臟未即上攻所以傷寒以嗽為輕而雜病以嗽為重也咳嗽一症其因實多辨證不明妄投希效亦安賴有醫治哉當按昔賢所述如咳嗽有風寒有火有勞有痰有肺脹風寒者鼻塞聲重惡風寒是也宜發散行痰又有咳喘聲啞或咽痛遇冷則發者此謂寒包熱也解表則熱自除肺中有痰者遇冷亦發宜解表豁痰火鬱者咳多痰少面赤焦煩是也勞者盜汗出痰多唾紅作寒熱是也痰者咳動便有痰痰出咳止是也肺脹者動則喘滿氣急聲重是也丹溪以上數條合而觀之參之居養合之氣體雖有不中亦不遠亦治嗽最要分別肺之虛實痰之滑澀邪之冷熱及他臟有無侵凌之氣六腑有無積滯之物虛者人參黃耆之屬補之使氣充則臟自固實者葶藶杏仁之屬瀉之使邪去則肺自寧痰滑者南星半夏之屬燥其濕痰澀者栝蔞杏仁之屬潤其燥寒者乾薑細辛溫之熱者黃芩梔子清之氣侵者五味芍藥收其氣使不受邪也積滯者枳實栝蔞逐其客使無來犯也冷嗽冷嗽者身受寒氣口飲寒漿得之蓋肺主氣外合皮毛而其經內循胃口故外內得寒皆能傷之經云形寒飲冷外內合邪因而客之則為肺咳是也其症呼吸不利嘔吐冷沫胸中急痛惡寒聲嘶得溫則減得寒益甚仲景小青龍湯散外寒蠲內飲麻黃芍藥乾薑炙甘草細辛桂枝各三兩五味子半夏各升半上八味以水一斗先煮麻黃減二升去上沫內諸藥煮取三升去滓溫服一升此散寒蠲飲之神劑東垣云肺寒氣逆則宜五味子同乾薑治之有痰者以半夏為佐按金匱厚朴麻黃湯加厚朴石膏杏仁小麥減桂枝芍藥聖濟乾薑湯加紫菀杏仁減芍藥細辛半夏外臺羊肺湯加款冬紫菀白前食茱萸減麻黃芍藥半夏易簡杏仁湯加人參茯苓杏仁去麻黃其乾薑五味甘草則四方如一轍也蓋本一青龍而各有裁製耳加減麻黃湯麻黃去節一兩桂枝炙甘草各半兩陳皮半夏各七錢杏仁五十個去皮尖微妙另研上細銼每三錢紫蘇七葉生薑四片煎服三拗湯麻黃杏仁甘草炙各等分上㕮咀每服三錢生薑三片煎服微汗愈深師有細辛外臺加桂枝名小投杯湯和劑加蘇子茯苓桑皮名華蓋散聖濟飴糖煎飴糖乾薑炒一兩半豉炒二兩杏仁五十個去皮尖上分二劑煎去滓入飴糖乾薑末服按咳嗽經年不愈余無他症服藥無效者得三拗湯恆愈多用清涼屢發屢甚別無熱症者得飴糖煎遂瘥不可不知也局方於麻黃杏仁甘草中加阿膠貝母桑葉知母款冬半夏蓋雜清潤於辛溫之內凡陰虛邪伏者服之最宜名款冬花散熱嗽熱嗽有久暴之異暴者時熱傷肺也肺象金而惡熱得之則脈數氣促口渴胸膈不利咽喉腫痛子和云熱乘肺者急喘而嗽面赤潮熱手足寒乳子每多有之久者風寒不解久而化火肺受火邪氣從火化有升無降其候咳唾痰濁煩熱口渴或吐膿血甚者身熱不已則成肺勞六味竹葉石膏湯石膏煅淡竹葉桔梗薄荷葉木通甘草各一錢水煎服又治熱嗽諸藥不效者方人參石膏甘草半夏麥冬知母五味杏仁枇杷葉水煎服按五味子治嗽新病惟熱傷肺者宜之若風寒所客則斂而不去矣久病氣耗者非五味子不能收之然熱痰不除則留固彌堅矣紫菀丸衍義云一婦人患肺熱久嗽身如炙肌瘦將成肺勞以枇杷葉木通款冬花紫菀杏仁桑白皮各等分大黃減半各如常制治訖同為末煉蜜丸如櫻桃大食後夜臥各含化一丸未終劑而愈此瀉肺中積熱之劑人參清肺湯和劑治肺痿吐血年久勞嗽喘急坐臥不安人參炙甘草阿膠炒杏仁去皮尖桑皮知母粟殼去蒂蓋蜜炙烏梅去核地骨皮各等分每服三錢水盅半姜一片棗一枚食後溫服按此方治勞嗽最宜蓋以溫補虛損之陰以酸收散亡之陽也元霜膏治虛勞熱嗽咯血唾血神效烏梅汁梨汁柿霜白沙糖白蜜蘿蔔汁各四兩生薑汁一兩赤茯苓末八兩用乳汁浸曬九次款冬花紫菀並末各二兩上共入砂鍋成熬成膏丸如彈子大每一丸臨臥含化嚥下定肺丸款冬花紫菀知母貝母人參炙甘草桑白皮馬兜鈴御米殼五味子麥冬百部烏梅肉等分上為細末煉蜜丸櫻桃大噙化下一丸直指人參紫菀散治虛勞咳嗽人參五味子紫菀茸陳皮貝母紫蘇葉桑白皮炒各一兩白茯苓二兩杏仁甘草炙各七錢五分川芎半夏曲阿膠蛤粉炒五錢上㕮咀每服一兩水二盅姜七片烏梅一個煎一盅溫服鬱熱嗽鬱熱者由肺先有熱而寒復客之熱為寒鬱肺不得通則喘咳暴作其候惡寒時有熱口中乾咽中痛或失音不出是也宜辛以散寒涼以除熱或只用辛散使寒去則熱自解若遽以苦寒折之邪氣被抑遺禍不少本事利膈湯雞蘇葉荊芥桔梗牛蒡子甘草殭蠶元參各一兩上為末每服一錢沸湯點服日三方古庵云肺主皮毛人無病之時營衛周流內氣自皮膚腠理普達於外一或風寒外束則內氣不得外達便從中起所以火升痰上故咳嗽宜用辛溫或辛涼之劑以發散風寒則邪退正復嗽止也飲氣嗽飲氣嗽者其症喘咳上氣胸膈注悶難於偃臥許仁則云由所飲之物停澄在胸水氣上衝入肺便成咳嗽此而不治則為水氣醫餘亦云此症宜利水道化痰下氣不爾則成水深師白前湯白前二兩半夏紫菀各三兩大戟七合水一斗漬一宿煮取三升作分數服芫花散芫花乾薑白蜜等分上用前二味為末內蜜中攪令相和微火煎如糜服如棗核一枚日三夜一備急方用枳殼二兩炒水煮去滓內白糖一斤服如棗大葶藶大棗瀉肺湯葶藶不拘多少炒金黃上件細研丸如彈子大水三盞棗十枚煎一盞去棗入藥煎七分食後服孫兆治一人吐痰頃間已升余咳不已面色郁暗精神不快兆告曰肺中有痰胸膈不利當服仲景葶藶大棗湯一服訖已覺胸中快利略無痰唾矣外臺用葶藶杏仁各一升大棗六十枚合搗如膏加蜜作丸梧子大桑白皮飲下六七十丸以大便通利為度本事棗膏丸無杏仁有陳皮苦桔梗棗肉丸梧子大每服五七丸飲下許叔微云余常患停飲久漬肺經食已必嚏漸喘覺肺系急服此良驗蘇子降氣湯治年久肺氣咳嗽喘逆上盛下虛痰涎壅盛胸膈噎塞紫蘇子炒半夏制各錢半前胡甘草炙厚朴薑汁炒陳皮去白各一錢當歸一錢半沉香七分水二盅生薑三片煎至一盅不拘時服虛冷人加桂五分黃耆一錢一人痰嗽脅下痛以白芥子栝蔞桔梗連翹風化硝竹瀝薑汁加蜜丸噙化茶清下按痰飲有寒有熱凡咳而面赤胸腹脅常熱惟手足乍有涼時其脈洪者熱痰在胸膈也宜寒潤清膈之劑下之面白悲嚏脅急脹痛脈沉細弦遲者寒痰在胸膜宜以辛熱去之痰熱久嗽氣急胸滿知母杏仁蘿蔔子貝母各二錢生薑一斤水煎服玉液丸治熱痰壅盛咳嗽煩熱寒水石燒令赤出火毒水飛過三十兩半夏洗焙為末十兩白礬枯十兩細研上合研麵糊丸梧子大每服三十丸食後淡薑湯下治婦人形瘦有時夜熱痰嗽月經不調香附童便浸曬乾上栝蔞中青黛下上為末薑汁蜜調噙化豆大一丸食積咳嗽食積咳嗽者穀肉過多停凝不化轉為敗濁隨呼吸之氣而上溢入肺肺者清虛之腑不能容物則有咳而出之耳王節齋云因咳而有痰者咳為重主治在肺因痰而致咳者痰為重主治在脾但是食積成痰痰氣上升以致咳嗽只治其痰消其積而咳自止不必用肺藥以治嗽也栝蔞丸栝蔞仁半夏山楂神麯等分上為末以栝蔞瓤拌為丸竹瀝薑湯送下元珠云食積痰嗽非青黛栝蔞仁不除其人面色青黃不常或面上如蟹爪絡一黃一白者是也又方杏仁蘿蔔子各二兩為末粥丸服又方治食積痰嗽發熱二陳加瓜萎萊菔子山楂枳實神麯燥咳肺燥者肺虛液少而燥氣乘之也其狀咳甚而少涎沫咽喉干氣哽不利子和云燥乘肺者氣壅不利百節內痛皮膚乾燥大便秘澀涕睡稠黏潔古云咳而無痰者宜以辛甘潤其肺也延年天門冬煎生天門冬煎汁一升生地黃汁五升橘皮炙甘草人參二兩白蜜五合牛酥二合白糖五兩杏仁一升貝母紫菀通草三兩百部白前二兩生薑汁一合上以水六升煮貝母等取二升五合去滓入天門冬地黃汁煎減半內酥蜜薑汁等煎令可丸取如雞子黃大含咽之日四五次杏仁煎杏仁一升去皮尖白糖酥生薑汁一合蜜五合貝母八合別研蘇子一升研取汁上先搗杏仁如泥內後六味同煎如稠糖取如棗大含咽之日三又有一種肝燥礙肺者其症咳而無痰脅痛潮熱女子則月事不來此不當治肺而當治肝蓋本非肺病肝血燥則肝氣強而觸肺臟也滋之調之血液通行乾咳自愈千金豕膏丸發灰杏仁熬令黃色上二味等分研如脂以豬膏和酒服如桐子大三丸日三神良上清丸清聲潤肺止咳嗽爽氣定神白砂糖八兩薄荷葉四兩柿霜四兩硼砂寒水石烏梅肉各五錢片腦五分上為末甘草水熬成膏和丸芡實大每一丸噙化虛寒嗽虛寒嗽者其寒不從外入乃上中二焦陽氣不足而寒動於中也或初雖起於火熱因過服寒涼消克以致脾士受傷而肺益失養脈微氣少飲食不入者急宜溫養脾肺為主也加味理中湯人參白朮乾薑生甘草炙橘紅茯苓半夏細辛五味等分上㕮咀每服三錢薑棗煎食前服戴元禮云飲水一二口而暫止者熱嗽也呷熱湯而得停者寒嗽也治熱嗽以小柴胡加五味冷嗽以理中湯加五味皆已試之驗直指方理中丸加阿膠五味濟生紫菀湯治肺虛實嗽喘急無熱症者紫菀茸洗乾薑炮黃耆人參五味子鐘乳石杏仁麵炒去皮尖甘草炙各五錢上㕮咀每服四錢水一盞姜五片棗一枚煎服腎咳腎虛氣逆者腎之脈從腎上貫肝膈入肺中循喉嚨腎中陰火上炎入肺則咳腎中陰水隨經入肺亦咳內經云咳嗽煩冤者是腎氣之逆也又少陰所謂咳嘔上氣喘者陰氣在下陽氣在上諸陽氣浮無所依從故咳嘔上氣喘也水則濟生腎氣補而逐之火則六味都氣之屬引而下之又有一種少陰腎症水飲與裡寒合而作嗽腹痛下利者宜真武湯加減治之真武湯白茯苓白朮白芍各一兩熟附子半兩上銼散每二錢半加生乾薑細辛五味子各半錢姜三片食前煎服咳嗽失音咳而失音有新久虛實之異新者多實痰火閉郁所謂金實不鳴也久者多虛肺損氣脫所謂金破亦不鳴也實者逐邪蠲飲易治虛者補肺養氣難治亦有肺已虛損而風寒未盡或痰火閉塞者則攻補俱礙其治尤難也訶子飲治久嗽語聲不出訶子肉杏仁各一錢炒通草一錢半分二服每服水二盅姜三片煎一盅食遠溫服一方訶子四個有桔梗一兩半甘草二寸杏仁煎治嗽失音不出杏仁三兩研泥生薑汁蜜各一兩木通桑白皮貝母各一兩二錢紫菀五味各一兩水三升煎半升去滓入杏仁蜜薑汁再熬成稀膏食後臥噙化一匙又方皂角一握去皮弦子蘿蔔三個切片水一碗煎至半碗服之不過三服能使語出聲治盛寒失音不語咽喉癢痛桂心杏仁各一兩為末蜜丸櫻桃大綿裹咽津戴云有嗽而咽痛失音多進冷劑而聲愈不出者宜生薑汁調消風散少少進之或只一味薑汁亦得又云聲啞聲寒包其熱也宜細辛半夏生薑之屬辛以散之若痰熱壅於肺者金空則鳴必清肺中邪滯用清咽寧肺湯主之清咽寧肺湯桔梗二錢炒山梔黃芩桑皮甘草前胡知母貝母各一錢水二盅煎八分食後服和劑款冬花散治肺已虛而風寒未盡喘滿煩悶痰涎壅盛鼻塞流涕咽喉不利杏仁阿膠炒麻黃去根節半夏湯洗薑製款冬花桑葉知母貝母各一兩上㕮咀每服二錢水一盅姜三片水煎食前溫服準繩用炙甘草和半夏加一倍喘統論三因方云喘病肺實者肺必脹上氣咽中逆如欲嘔狀自汗肺虛者必咽乾無液少氣不足以息也王宇泰云喘而無汗煩躁脈浮大者汗之喘而有汗腹滿脈沉實者下之又云喘而自汗腹滿便秘氣口脈大於人迎下之無疑外此則不宜輕下也咳嗽氣急喉聲如鼾者為虛喉中如水雞聲者為實戴復庵云有痰喘有氣喘有胃虛喘有火炎上喘痰喘者凡喘便有痰聲氣喘者呼吸急促而無痰聲胃氣虛喘者抬肩擷肚喘而不休火炎上喘者乍進乍退得食則減食已復甚大概胃中有實火膈上有稠痰得食入咽墜下痰涎其喘即止稍久食已入胃反助其火痰再升上喘反大作俗不知此作胃虛治以燥熱之藥者以火濟火也痰實肺閉肺虛如器而不容物痰熱實之則氣不得宣呼吸壅滯喘急妨悶胸膈痞痛徹背者宜濟生栝蔞實丸此與水氣相似但水即飲也飲體稀而痰質稠飲多寒而痰多熱耳濟生栝蔞實丸栝蔞實研枳實去瓤麩炒桔梗半夏等分上為末薑汁打糊為丸如梧子大每服五七十丸食後淡薑湯下元戎葶藶大棗湯葶藶二兩炒紫色杵成丸以水三升大棗二十枚同煮取二升去滓內麻黃五味子各半兩取清令二日服一劑盡瘥外臺方葶藶杏仁二味杵末棗肉丸此又加麻黃五味其用彌廣矣水氣乘肺喘因水氣乘肺者經所謂不得臥臥則喘者是水氣喘而不客也古法心下有水氣上乘於肺得臥者以直指神秘湯主之若腎中水邪干肺者則濟生腎氣丸主之神秘湯人參陳皮桔梗紫蘇半夏桑皮檳榔各一錢炙甘草五分五味子十五粒上用水姜煎食遠溫服寒邪入肺喘因寒邪入肺者經曰邪在肺則病皮膚痛寒熱上氣喘咳動肩背因背受寒邪伏於肺中關竅不通呼吸不利右寸沉而緊亦有部俱伏者宜發散則身熱退而喘定小青龍三拗湯之屬若內兼火熱外顯煩躁者宜散而兼清麻杏甘石之屬小青龍湯麻黃桂枝芍藥細辛甘草各三兩乾薑三兩半夏五味子各半升上以水一升先煮麻黃去上沫內諸藥煮取三升強人服一升羸者減之三拗湯方見咳門令火爍金喘因夏月火爍肺金者上焦熱甚煩渴多汗肺主氣而屬金金畏火逼氣不得降而反上行從化於火也人參白虎湯人參石膏知母甘草粳米腎虛氣逆喘因腎虛氣吸不下者或因氣自小腹下起而上逆者但經微勞或飢時即發宜以六味補陰之屬壯水配火若足冷麵熱者須以八味安腎之屬導火歸元安腎丸肉桂去粗皮不見火川烏頭炮去皮臍各十六兩桃仁麩炒白蒺藜炒去刺巴戟去心山藥茯苓肉蓯蓉酒浸炙石斛去根炙萆薢白朮破故紙各四十八兩上為末煉蜜為丸梧子大每服三十丸鹽湯送下空心食前小安腎丸治腎虛冷憊陰火上升喘嗽齒痛腰痛香附子川烏頭川楝子以上各一斤用鹽四兩水四升同煮侯干切焙茴香十二兩熟地黃八兩川椒去目及閉口者炒出微汗四兩上六味為細末酒糊丸桐子大每服二十丸至三十丸空心臨臥鹽湯溫酒任下齁喘齁喘者積痰在肺遇冷即發喘鳴迫塞但坐不得臥外寒與內飲相搏宜小青龍湯主之若肺有積熱熱為寒束者宜越婢湯主之小青龍湯方見前越婢加半夏湯麻黃六兩石膏半斤生薑三兩甘草一兩半夏半升大棗五十枚上六味以水六升先煮麻黃去上沫內諸藥煮取三升分溫三服定喘湯白果二十一枚去殼切碎炒黃色麻黃半夏杏仁蘇子桑皮款冬花各二錢黃芩炒一錢半甘草一錢水三盅煎二盅分二服徐徐服無時一方無黃芩按仲景云咳而上氣此為肺脹其人喘目如脫狀越婢加半夏湯治之又肺脹咳而上氣煩躁而喘脈浮者心下有水小青龍湯加石膏湯主之丹溪云肺脹而咳者用訶子青黛杏仁佐以海石香附栝蔞半曲蜜丸噙化仲景之治乃傷寒法也邪從皮毛入肺則肺脹故治宜散邪之劑丹溪之治乃陰虛火動迫肺及濁痰瘀血凝結於內故治以收斂消瘀之劑然亦有引動腎間虛氣喘不得臥足冷如冰者非濟生腎氣不效丹溪治齁喘之症未發以扶正氣為主八味腎氣溫腎行水之謂也已發用攻邪氣為主越婢青龍泄肺蠲飲之謂也定喘丸治虛人痰多咳嗽胸滿氣逆行坐無時連年不已人參二錢半南星半夏各二錢苦葶藶五錢上為末生薑自然汁糊丸黍粒大每三五十丸生薑湯下亦可漸加血積肝傷喘因血積肝傷者經曰肝脈搏堅而長色不青當病墜若搏因血在脅下令人喘逆是也嘔吐統論仁齋直指云嘔吐出於胃氣之不和人所共知也然有胃寒有胃熱有痰水有宿食有膿血有氣攻又有所謂風邪干胃凡是數者可不究其所自來哉寒而嘔吐則喜熱惡寒四肢悽清法當以剛壯溫之熱而嘔吐則喜冷惡熱煩躁中干法當以清涼解之痰水症者吐沫怔忡先渴後嘔與之消痰逐水輩宿食症者胸腹脹滿醋悶吞酸與之消食去積輩腥氣燥氣熏炙噁心此膿血之聚經所謂嘔家有癰膿不須治膿儘自愈是也七情內郁關格不平此氣攻之症經所謂諸郁干胃則嘔吐是也若夫風邪入胃人多不審率用參術助之攔住寒邪於此猶關利害其或惡聞食臭湯水不下粥藥不納此則反胃之垂絕者也辨之不早其何以為對治乎雖然足陽明之經胃之絡脈也陽明之氣下行則順今逆而上行謹不可泄固也然嘔吐者每每大便秘結上下壅遏氣不流行盍思所以區畫而利導之他如汗後水藥不入口者遂嘔而脈弱小便複利身微熱而手足厥者虛寒之極也識者憂焉潔古論吐以氣積寒分屬上中下三焦大旨元從啟元子食不得入是有火食入反出是無火來至中焦吐則獨以積字該之夫中焦氣交之分主運行上下和調陰陽其病有虛有實有寒有熱其治亦不拘一法豈區區毒藥去積檳榔木香和氣所能盡其事哉東垣論吐以嘔吐噦分太陽陽明少陽以其經氣血多少而為聲物有無之別未見著實剛壯之劑吳茱萸湯治冷涎嘔吐吳茱萸沸湯炮洗三次焙乾生薑各一兩半人參三錢大棗五個上銼每服四錢水盞半食前服本事附子散治反胃嘔吐附子一枚極大者坐於磚上四面著火漸漸逼熱淬入生薑自然汁中再用火逼再淬約盡薑汁半碗焙乾末之每服二錢水一盞粟米少許同煎七分不過三服清涼之劑本事竹茹湯治胃熱嘔吐乾葛三兩甘草三錢半夏一兩薑汁半盞漿水一升煮耗半上為粗末每服五錢水二盞姜三片棗一枚竹茹一錢同煮至一盞去滓溫服許叔微云胃熱者手足心熱政和中一宗人病傷寒得汗身涼數日忽嘔吐藥與食俱不下醫者皆進丁香藿香滑石等藥下咽即吐予曰此正汗後餘熱留胃皖孫兆竹茹湯正相當耳急治藥與之即時愈龐老枇杷葉散枇杷葉刷淨毛人參各一錢茯苓半兩茅根二兩半夏一錢上細銼每服四錢水一盞半生薑七片慢火煎至七分去滓入檳榔末半錢和勻服之此方宜入行氣項下新定清中止嘔方半夏一錢茯苓二錢陳皮一錢竹茹一錢乾葛五分生薑五分蘆根五錢枇杷葉三片麥冬一錢白風米百粒消痰逐水之劑大半夏湯治痰症嘔吐半夏制二升人參三兩切上每四錢姜七片蜜少許熟煎服小半夏茯苓湯金匱云嘔家用半夏以去其水水去嘔止半夏一升生薑半斤茯苓四兩上三味以水七升煮取一升半分溫再服局方二陳湯治痰飲嘔惡頭眩心悸陳皮半夏制各三錢茯苓二錢炙甘草一錢水二盅姜三片食遠服東垣云辛藥生薑之類治嘔吐但治上焦氣壅表實之病若胃虛穀氣不行胸中痞塞而嘔吐者惟宜益胃推揚穀氣而已故服小半夏湯不愈者服大半夏湯立愈此仲景心法也本事神術丸治嘔吐清水亦治嘔酸方見痰飲門經云太陰之復嘔而密默唾吐清液治以苦熱是嘔水屬濕也或一味蒼朮制炒為丸服之丹溪云或問吞酸素問明以為熱東垣又以為寒何也曰吐酸與酸不同吐酸是吐出酸水如醋平時津液隨上升之氣鬱而成積成積既久濕中生熱故從木化遂作酸味非熱而何其有鬱積之久不能自湧而出伏於肺胃之間咯不得上咽不得下肌表得風寒則內熱愈郁而酸味刺心肌表溫暖腠理開發或得香熱湯丸津液得行亦可暫解非寒而何素問言熱者言其本也東垣言寒者言其末也但東垣不言外得風寒而作收氣立說欲瀉肺金之實又謂寒藥不可治酸而用安胃湯加二陳湯俱犯丁香且無治熱濕積鬱之法為未合經意予嘗論治吞酸用黃連茱萸各制炒隨時令迭為佐使蒼朮茯苓為輔湯浸蒸餅為小丸吞之仍教以糲食蔬果自養則病自愈消食去積之劑治中湯治食症嘔吐人參白朮乾薑炮甘草炙青皮橘皮等分上銼每服三錢棗一枚煎服積聚大便多者加大黃二棋子許二陳湯如縮砂丁香亦治宿食嘔吐潔古紫沉丸治中焦吐食由食積與寒氣相格故吐而疼砂仁半夏曲各三錢烏梅去核丁香檳榔各二錢沉香杏仁白朮木香各一錢陳皮五錢白豆蔻巴霜各五分上除巴霜另炒外為細末和勻醋糊為丸如黍米大每服五十丸食後薑湯下愈則止溫中法曲丸治食已心下痛陰陰然不可忍吐出乃已病名食痹法曲炒麥芽炒白茯苓陳皮去白厚朴枳實麩炒各一兩人參附子制炮姜炙草桔梗各五錢吳茱萸湯泡三錢上為細末煉蜜丸梧子大每服七八十丸食前熱水送下一方有當歸細辛行氣之劑加減七氣丸治氣鬱嘔吐半夏制二兩半人參辣桂厚朴制各一兩茯苓一兩半甘草炙半兩上銼散每三錢半姜七片棗一枚煎服加木香亦得去風和胃之劑藿香正氣散治風邪入胃嘔吐半夏曲川厚朴制各三兩藿香葉橘紅各一兩甘草炙七錢上銼散每三錢姜三片棗一枚食前煎服清胃丸治嘔吐脈弦頭痛柴胡一兩黃芩七錢半甘草炙人參各五錢半夏三錢青黛二錢半上細末每薑汁浸蒸餅丸桐子大每五十丸薑湯下理中安蛔之劑安蛔丸人參白朮乾薑甘草川椒烏梅導利之劑金匱大黃甘草湯治食已即吐大黃四兩甘草一兩水三升煮取一升分溫再服此上病療下之法夫陽明之氣順而下行者也若下焦不通其氣必反而上行是以食已即吐用大黃以通大便則氣復順而下行矣所謂濁氣自歸濁道也東垣通幽湯治幽門不通上衝吸門嘔吐噎塞氣不得上下治在幽門熟地生地各二錢紅花五分桃仁泥七粒當歸甘草升麻各五分大黃一錢上㕮咀都作一服水二大盞煎至一盞去滓熱服準繩云陰虛邪氣逆上窒塞嘔噦不足之病此地道不通也當用生地黃當歸桃仁紅花之類和血涼血潤血兼用甘草以補其氣微加大黃芒硝以通其閉大便利邪氣去則氣逆嘔吐自愈矣益胃之劑廣濟豆蔻子湯治反胃嘔吐不下食腹中氣逆人參一兩白豆蔻七粒甘草炒一兩生薑五兩水四升煮取一升五合去滓分溫三服相去如人行五六里丁香煮散丁香石蓮肉各十四枚北棗七枚生薑七片黃秫米半合上以水一碗半煮稀粥去藥取粥食之咳嗽嘔吐痰血飲食咳而嘔吐痰食俱出者傷於胃氣昔人所謂肺病連胃是也嘔血帶痰而出者傷於肺之絡金匱所謂熱傷血脈是也吐食者二陳湯加減治之吐血者補肺湯主之加減二陳湯半夏一錢杏仁一錢五分茯苓一錢五分炙草五分橘紅一錢竹茹八分生薑一片粳米一百粒上藥用清水煎服加枇杷葉蘆根佳補肺阿膠湯阿膠一錢五分兜鈴五分炙草五分牛蒡一錢杏仁七粒糯米一百粒都作一服甚者加生地黃藕汁泄瀉諸症統論戴復庵云瀉水腹不痛者濕也飲食入胃輒瀉之完穀不化者氣虛也腹痛瀉水腸鳴痛一陣瀉一陣者火也或瀉或不瀉或多或少者痰也腹痛甚而瀉瀉後痛減者積也飧泄者水穀不化而完出濕兼風也溏泄者漸下汙積黏垢濕兼熱也鶩泄者所下澄徹清冷小便清白濕兼寒也濡泄者體重軟弱泄下多水濕自甚也滑泄者久下不能禁固濕勝氣脫也故曰濕多成五泄濕瀉濕瀉一名濡泄其脈濡細其症泄水虛滑腸鳴身重腹不痛由脾胃有濕則水穀不化清濁不分久雨潮溢或運氣濕土司令之時多有此疾內經所謂濕勝則濡泄左傳所謂雨淫腹疾是也又水寒之氣入客腸間亦令人濡瀉經云太陽之勝寒客下焦傳為濡泄是也本事芎藭丸治風濕滑泄芎藭神麯白朮附子泡各等分上為細末麵糊丸如梧子大每服三五丸米飲送下許叔微云左氏述楚子圍蕭蕭將潰無社告叔展曰有麥面乎有山鞠藭乎意欲令逃水中以避是知芎藭能除濕予常加朮附以制方治脾濕而瀉者萬無不中此藥亦治飧泄劉草窗瀉濕湯生白朮三錢白芍二錢陳皮炒一錢五分防風一錢升麻五分上銼作帖水煎服此用風藥以舉其氣抑勝其濕也河間云有腸胃燥郁水液不能宣行於外反以停濕而泄或燥濕往來而時結時泄者此又濕瀉之變余見有老人久泄飲牛乳而泄反止者此類是耳胃苓湯治脾濕太過泄瀉不止平胃散五苓散各等分上銼水煎服平胃散治酒泄不已飲後尤甚加丁香縮砂麥芽神麯各五錢為末米飲調二錢立愈升陽除濕湯方見飧泄東垣云予病脾胃久衰視聽半失氣短精神不足此由陽氣衰弱不得舒伸伏匿於陰中耳癸卯歲六七月間淫雨陰寒逾月不止時人多病泄利一日予體重肢節疼痛大便泄下而小便閉塞治法諸泄利小便不利先分利之又云治濕不利小便非其治也噫聖人之法布在方策其不盡者可以意求耳今客邪寒濕之淫從外而入里若用淡滲之劑以除之是降之又降復益其陰而重竭其陽則陽氣愈削而精神愈短矣故必用升陽風藥羌活獨活柴胡升麻各一錢防風葛根半錢炙甘草半錢同㕮咀水二盅煎至一盞去滓稍熱服大法云濕寒之勝助風以平之又曰下者舉之得陽氣升騰而去矣又云客者除之是因曲而為之直也醫不達升降浮沉之理而一概施治其愈者幸也寒瀉一名鶩溏鶩溏者水糞並趨大腸也夫脾主為胃行其津液者也脾氣衰弱不能分布則津液糟粕並趨一竅而下金匱所謂脾氣衰則鶩溏也又寒氣在下亦令人水糞雜下而色多青黑所謂大腸有寒則鶩溏也羅謙甫云鶩溏者大便如水其中有少結糞是也補本丸蒼朮川椒去目炒名一兩末之醋和丸如桐子大每服五十丸食前溫水下一法惡痢久不效者彌佳小兒丸如米大桂枝湯治太陽經傷動傳太陰下利為鶩溏大腸不能禁固卒然而又下中有硬物欲起而下欲了而又不了小便多清此寒也宜溫之春夏桂枝湯秋冬白朮散川桂枝白芍藥白朮各半兩炙草二錢每服半兩水一盞煎七分去滓溫服白朮散白朮白芍藥各三錢乾薑炮半兩炙草二錢上為細末如前服之甚則除去乾薑加附子三錢謂辛能發散也附子溫中湯治寒瀉腹痛或水穀不化附子泡乾薑炮各一錢半人參白朮白茯苓白芍炙草各一錢厚朴豆蔻陳皮上作一帖水煎空心服熱瀉熱瀉者夏月熱氣乍乘太陰與濕相合一時傾瀉如水之注亦名暴泄內經所謂暴注下迫皆屬於熱是也其症腹痛自汗煩渴面垢脈洪數或虛肛門熱痛糞出如湯或兼嘔吐心腹絞痛者即霍亂之候也香薷飲香薷去土一斤白扁豆半斤微炒厚朴半斤去皮薑汁炙熟上㕮咀每服三錢水一盞煎七分沉冷不拘時服一方加黃連四兩薑汁炒令黃六和湯香薷二錢砂仁半夏杏仁人參甘草炙各五分赤苓藿香白扁豆薑汁略炒厚朴木瓜各一錢水二盅姜五片紅棗一枚煎一盅不拘時服久泄久泄不止百藥不效或暫止而復來此必有陳積在腸胃之間積一日不去則瀉一日不愈必先逐陳積而後補之庶幾獲益如果系臟虛滑泄審無腹痛脈微虛不沉滯者可以溫澀之藥固之本事溫脾湯治痼冷在腸胃間連年腹痛泄瀉休作無時服諸熱藥不效宜先取去然後調治易瘥不可畏虛以養病也厚朴乾薑甘草桂心附子生各二兩大黃生四錢碎切湯一盞浸半日濾去渣煎湯時和渣下上細銼水二升半煎八合後下大黃汁再煎六合去滓澄去腳分三服自夜至曉令盡不受食前更以乾薑丸佐之乾薑丸乾薑巴豆去心炒黃人參大黃各一兩上除巴豆余為末同研煉蜜丸如桐子大服前湯時用湯下一丸震靈丹一名紫金丹治一切沉寒痼冷久瀉久痢臍腹冷痛嘔吐不食及婦人血氣虛損崩漏帶下禹餘糧火煅醋淬不計遍數手捻得碎為度紫石英赤石脂丁頭代赭石如禹餘糧製法各四兩以上四味並作小塊入瓦鍋內鹽泥固濟候乾用炭十斤煅通紅火盡為度入地埋出火毒二宿滴乳香另研五靈脂去沙石篩沒藥去砂石各二兩硃砂水飛一兩上八味併為細末以糯米粉煮糊為丸如芡實大曬乾出光每一丸空心溫酒下或冷水下忌豬羊血恐減藥力婦人醋湯下乳豆丸治滑泄不止諸藥無效肉豆蔻生為末上用通明乳香以酒浸過研成膏丸如桐子大每五十丸空心米飲送下和劑桃花丸寒瀉腹中痛服諸熱藥以溫中並不見效登圊不迭穢物隨出此屬下焦宜桃花丸以溫澀之赤石脂乾薑炮等分上為末面和丸如梧子大每服三十丸空心食前米飲下日三河間訶子散治泄久腹痛漸已瀉下漸少宜此藥止之訶子一兩半生半熟黃連三錢木香半兩甘草二錢上為細末每服二錢以白朮芍藥湯調下如止之未已宜因其歸而送之於訶子散內加厚朴一兩竭其邪氣也按收澀之劑固腸丸訶子散皆治熱滑扶脾丸桃花丸皆治寒滑蓋滑泄雖同而有陰陽之分也以下食泄加味平胃散治食積瀉噫氣作酸泄而腹痛甚瀉後痛減臭如抱壞雞子得效云傷食積而瀉者糞白可驗且腹必耕痛方泄是也蒼朮厚朴陳皮甘草縮砂草果山楂子麥芽水煎服有停飲食數日乃瀉後屢作屢止飲食稍多即發名曰瀼瀉宜枳朮曲糵丸治飲酒過多遂成酒泄骨立不能食但飲一二杯即發經年不愈方蒼朮厚朴陳皮甘草丁香縮砂乾葛麥芽神麯上為末空心米飲調下二錢治傷酒晨起必瀉方人參白朮乾薑炙甘草茯苓乾葛陳皮川黃連酒浸炒上銼姜水煎服腎泄腎泄者五更溏泄也腎雖水臟而中有元陽為脾土之母又腎者主蟄封藏之本而開竅於二陰腎陽既虛即不能溫養於脾又不能禁固於下故遇子後陽生之時其氣不振陰寒反勝則腹鳴奔響作脹瀉去一二行乃安積月不愈或至累年此病藏於腎宜治下而不宜治中者也五味子散五味子一兩吳茱萸半兩細粒綠色者上二味同炒香熟為度細末每二錢陳米飲下許氏云頃年有一親識每五更初欲曉時必溏泄一次如是數月有人云此名腎泄感陰氣而然得此頓愈四神丸肉豆蔻五味子各二兩補骨脂四兩吳茱萸浸炒一兩上為末生薑八兩紅棗一百枚煮熟取棗肉和丸如梧子大每服五七十丸空心或食前白湯下一云夜食前更進一服蓋暖藥雖平旦服之至夜力已盡無以敵一夜陰氣之故也澹寮無五味吳萸有茴香一兩木香半兩一方去五味吳萸入神麯麥芽按五更溏泄不獨腎虛一端酒積食積寒積皆作此病概與溫腎非其治矣食積酒積治法詳久泄吞紅丸子或單服曲糵枳朮丸寒積者積寒在脾腎宜魏氏椒樸丸椒樸丸益智仁去殼炒川椒炒出汗川厚朴薑製陳皮白乾薑茴香炒各等分上用青鹽等分於銀石器內以水浸前藥慢火煮乾焙燥為末酒糊丸如梧子大每服三十丸加至四十丸空心鹽湯溫酒任下傷酒者濕熱在脾宜理中湯加乾葛黃連或葛花解酲湯吞酒煮黃連丸飲食過多脾胃之氣不能運化其人必噯氣如敗卵宜治中湯加砂仁半錢吞紅丸子或單服曲糵枳朮丸飧泄飧泄完穀不化也脾胃氣衰不能熟腐水穀而食物完出經所謂脾病者虛則腹滿腸鳴飧泄不化是也又清氣在下則生飧泄者謂陽氣虛則下陷也又風氣入脾亦令飧泄夫風者木氣也而行於土中風性善行傳化疾速則熟腐不及經所謂久風入中為腸風飧泄是也又脾所生病為胸滿嘔逆飧泄者亦木氣制土之所致也又虛邪舍於腸胃多寒則腸鳴飧泄食不化者土性喜溫而惡寒多寒則變化無權也故飧泄之病約有三端一曰虛二曰風三曰冷而皆以虛為本也亦曰虛泄胃風湯治風冷虛氣入客腸胃水穀不化泄瀉注下腹脅虛滿腸鳴㽲痛人參茯苓川芎官桂當歸白芍白朮各等分每服二錢水一大盞粟米百餘粒同煎七分去渣稍熱空心服若虛勞嗽加五味子若有痰加半夏若發熱加柴胡若有汗加牡蠣若虛寒加附子若寒甚加乾薑皆依本方等分防風芍藥湯治飧泄脈弦身熱腹痛而渴防風芍藥各二錢黃芩一錢蒼朮三錢水煎服此治風入脾之法也鞠藭丸方見濡泄吳茱萸散方見腸痹升陽除濕湯治胃氣不升清氣在下飧泄不已蒼朮一錢半柴胡升麻羌活防風澤瀉豬苓神麯各七分麥芽陳皮各五分甘草三分炙水二盞煎一盞去滓空心服如胃寒腸鳴加益智仁半夏各五分薑棗同煎靈樞云頭有疾取之足謂陽病在陰也足有疾取之上謂陰病在陽也中有疾傍取之中者脾胃也傍者少陽甲膽也脾胃有疾取之足少陽甲膽也甲風木也東方春也胃中真氣者穀氣也飲食不化穀氣下流者濕勝故也故曰濕多成五泄宜助甲膽風以克之又是升陽助清氣上行之法也大抵此症本胃弱不能克化奪食少食欲使胃氣不困也若藥劑大則胃不勝藥泄亦不止當漸漸與之不可多服餌也經云飧泄取三陰三陰者太陰也宜補中益氣湯去當歸加白芍東垣云清氣在下者乃人之脾胃氣衰不能升發陽氣故用升麻柴胡助甘辛之味以引元氣之升不令下陷為飧泄也加味四君子湯治氣虛泄瀉四君子加肉豆蔻煨訶子泡各一錢薑棗煎一方加縮砂藿香炮姜各五分山藥蓮子陳皮各一錢烏梅一個名參苓蓮術散諸痢治法統論痢疾古名滯下亦名腸澼以其滯澀腸臟下多不快而澼澼有聲也或赤或白或赤白相雜或下腸垢而無糟粕或糟粕相雜雖有痛不痛之異然皆裡急後重逼迫惱人痢疾古有赤熱白冷及五色分屬五臟之辨然臟腑寒熱當以脈症互參雖有前說存之而已若執此認病泥矣準繩謂後重因邪壓大腸墜下者當用大黃檳榔輩如羅謙甫水煮木香膏東垣白朮安胃散等方瀉其所壓之邪則後重自除若邪已瀉其重仍在者知大腸虛滑不能自收而重當用御米殼等澀劑固其滑收其氣用亦愈也議論自正但水煮木香白朮安胃二方皆以御米殼為君且有烏梅五味子白芍訶子並無檳榔大黃而云然者豈未之察耶又謂大腸為邪墜下之重其重至圊後不減大腸虛滑不收之重其重至圊後隨減愚謂邪墜之重圊後當減虛滑之重圊後不減茲反言之亦有誤耶又謂休息痢多因兜住積滯以致時作時止宜四君子吞駐車丸再投去積卻用兜劑按四君駐車都非去積之劑然議論自正敗毒散發散風濕益元散解利熱邪故俱治發熱下利治痢大法後重者宜下腹痛者宜和身重者除濕脈弦者去風膿血稠黏以重藥竭之身冷自汗以毒藥溫之風邪內縮者汗之則愈鶩溏為利者溫之而已又曰在表者發之在裡者下之在上者湧之在下者竭之身表熱者內疏之小便澀者分利之盛者和之去者送之過者止之又曰食寒冷者宜溫熱以消導之傷濕熱者宜苦寒以內疏之風邪內陷者升舉之濕氣內盛者分利之裡急者下之後重者調之腹痛者和之洞泄腸鳴無力不及拈衣脈細微而弱者溫之收之膿血稠黏數至圊而不能便脈洪大而有力者下之寒之分治痢症諸方寒下之劑潔古大黃湯大黃一兩銼好酒二大盞浸半日許煎至一盞半去滓分二分頓服之痢止勿服如未止再服取利為度後服芍藥湯和之利止再服白朮黃芩湯盡徹其毒也審系寒積留滯則宜溫下之法治之韓𢘅大黃湯川黃連吳茱萸炒一兩廣木香一兩大黃酒浸炒二兩上為末水丸量人虛實加減丸數蓋暑毒與食物相搏結在下脘則升降出入不得循其正糟粕欲行不得行而火復迫之則將臟腑脂膏逼迫而下故取大黃驅熱毒下糟粕清腸臟也如膿血相雜而脈浮大者慎勿以大黃下之下之必死謂氣竭也而陽無所收不收則死和利之劑芍藥湯潔古行血調氣經曰溲而便膿血知氣行而血止也行血則便膿自愈調氣則後重自除芍藥一兩當歸黃連黃芩各半兩大黃三錢桂二錢五分甘草炒檳榔各二錢木香一錢上九味㕮咀每服五錢水二盞煎至一盞去滓溫服一方無桂甘有枳殼名導滯湯先醒齋滯下丸川連薑汁炒一斤滑石八兩研末白芍酒炒五兩甘草炙三兩檳榔四兩枳殼五兩木香二兩半上為末荷葉湯稍加薑汁和丸如綠豆大每服四錢凡燥煩渴噁心者勿用木香元氣虛弱者勿用檳榔枳殼裡急色赤者加當歸惟噁心嘔吐不思食勿用白多加吳茱萸湯泡七次七分扁豆炒二錢陳皮一錢赤多加烏梅肉一錢山楂肉二錢紅曲一錢腹痛加白芍三錢甘草三錢口渴及發熱調滑石末三錢小便赤少或不利亦加方噁心欲吐即噤口痢多加人參石蓮肉綠色升麻醋炒久利不止加肉豆蔻一錢蓮肉去心炒黃三錢扁豆茯苓各二錢人參三錢劉河間曰夫治諸痢者莫若以辛苦寒藥治之或微加辛熱佐之蓋辛熱能發散邪氣開通鬱結苦能燥濕寒能除熱使氣宣平而已其濕熱鬱抑欲利不利宜以韓𢘅加大黃湯利之當歸導氣湯東垣當歸芍藥各一錢生地二錢甘草一錢半檳榔木香各二錢青皮槐花炒各七分澤瀉五分上為末用水煎食前溫服如小便利去澤瀉噁心去槐花加薑汁炒黃連燥渴減木香一半丹溪青六丸治血痢及產後腹痛自利能補脾補血去三焦濕熱六一散三兩紅曲炒半兩酒糊丸按和者和養其腸胃利者通利其積滯凡正不足而邪有餘者宜仿此法治之疏解之劑活人敗毒散治下利發熱脈浮者人參川芎羌活獨活前胡茯苓枳殼桔梗炙草柴胡陳倉米上㕮咀每服五錢水一盞半生薑三片煎至七分去滓服無時一名倉稟湯藿香正氣散香薷飲下利雖曰有積有熱如用藥不效即是腸胃有風邪熱者赤者與敗毒散冷者白者不換金正氣散治痢之法大要經以散風邪行滯氣開胃脘為先不可遽用粟殼龍骨牡蠣輩以閉澀腸胃邪氣得補而愈甚不為纏擾撮痛則為裡急後重所以日久淹延而未已也肉蔻訶子白朮輩恐其補住寒邪亦不可遽投溫通之劑葛氏療痢色白食不消者為寒下方豉一斤綿裹薤白一把水三升煮取二升及熱頓服之此不從暑毒而發者或過啖生冷或坐臥高堂大廈寒氣所乘脾亦不運故隨感而為痢以葛氏豉薤湯治之如逾二三日寒化為熱其病形與暑毒同也黑丸子烏梅肉杏仁去皮尖另研十四粒巴霜去油半錢百草霜六錢上為細末和勻稀糊為丸如黍米大每服十五丸加至二十丸白湯送下一方有半夏縮砂各十四粒感應丸溫補之劑理中湯人參白朮炮姜炙草水煎服如痢不止宜加豆蔻木香有熱加黃連真人養臟湯人參白朮各六兩白芍木香各一兩六錢甘草肉桂各八錢肉豆蔻麵裹煨五錢御米殼蜜炙訶子肉一兩二錢上㕮咀每服四錢水一盞半煎至八分去渣食前溫服忌生冷魚腥酒面油膩之物如滑泄夜起久不瘥者可加附子四片此溫補兼收之劑臟虛滑脫者宜之若有熱者不可用也宜冷澀之劑冷澀之劑外臺方治傷寒八九日至十餘日大煩渴作熱三焦有瘡慝下利或張口吐舌目爛口瘡不識人用此除熱毒止痢龍骨半斤水一斗煮四升沉之井底冷服五合漸漸進之肘後方治熱病下利慾死者龍骨半斤研水一斗煮取五升候極冷稍飲得汗即愈效又治久利休息不止者龍骨四兩打碎水五升煮取二升半分五服冷飲仍以米飲和丸每服十丸按三方並用龍骨水煎冷服蓋以冷除熱而以澀固脫爾和養之劑駐車丸治一切下痢無問冷熱阿膠十五兩搗碎蛤粉炒成珠以醋四升熬成膏當歸十五兩川黃連三十兩去須炮乾薑十兩上為末同阿膠膏杵成丸梧子大每服三十丸食前米飲下日三凡蘊熱血痢裡急而痛甚雖已疏通盪滌然其痛不減者非熱亦非積也營血虧少陽剛勝陰故爾用藥當以血藥為佐營血一調其痛立止矣
