body:
  text: 卷四屍疰五屍惡氣所發一病而五名也其症令人寒熱淋瀝沉沉默默無處不惡或腹痛脹急不得氣息上衝心胸及攻兩脅或壘塊踴起或攣引腰脊是也其得之疾速如飛走狀者名曰飛屍停遁不消去來無時者名曰遁屍沉痼在人臟腑者名曰沉屍衝風則發者名風屍隱伏積年不除者名伏屍然雖有五者之名其為鬼惡邪氣則一也亦可通以一法治之雄黃丸治卒中飛屍腹痛脹急上衝心胸及攻兩脅或壘塊踴起或攣引腰脊雄黃研大蒜各一兩二味搗丸如彈子大每服一丸熱酒化下未瘥更服蒺藜子丸治同上蒺藜子炒去刺二兩為末蜜丸小豆大食後水下二十丸木香丸木香丁香各三分鬼箭羽桔梗當歸陳皮去白炒紫蘇微炒各一兩白檳榔煨十四枚桃仁去皮尖雙仁炒黃色十四枚上搗篩每服五錢水煎溫服無時日二蒸熨方治遁屍飛屍及風毒腫流入頭面四肢芥子蒸熟焙一斤為末以鉛丹二兩拌勻分作兩處用疏皮袋盛之更換蒸熱以熨痛處麝香散治卒中惡氣心腹刺痛麝香一分犀角屑木香各半兩為末每服二錢空心熱水調下日二未止再服又方韭根一握切烏梅十四枚吳茱萸湯浸焙乾二兩半水五升煮以病人櫛內其中三沸櫛浮者生沉者死煮三升時飲之按櫛有通疏之用浮屬陽沉屬陰陽主開而陰主閉卒死客杵者邪氣暴加諸陽乍閉得陽而開則生得陰而閉則死也本事方云飛屍者遊走皮膚穿臟腑每發刺痛變作無常遁屍者附骨入肉攻鑿血脈每發不可得近見屍喪聞哀哭便發風屍者淫躍四肢不知痛之所在每發昏沉得風雪便作沉屍者纏骨結臟衝心脅每發絞切遇寒冷便作疰屍者舉身沉重精神錯雜常覺昏廢每節氣致變輒成大惡並宜用太乙神精丹及蘇合香丸及忍冬葉銼數斛煮令濃取汁煎之如雞子大一枚日三頃在徽城日嘗修合神精丹一料庚申余家一婦人夢中見二蒼頭一在前一在後手中持一物前者云到也未後應云到也爆然有聲遂魘覺後心一點痛不可忍昏悶一時許予忽憶神精丹有此一症取三粒令服之遂至府過少頃歸婦已無病矣云服藥覺痛止神醒今如常矣日後相識稍有邪氣與一二服無不應驗方在千金中乃治中風之要藥但近世少得曾青磁石為難合耳太乙神精丹治客忤霍亂腹痛脹滿屍疰惡風顛狂鬼語蠱毒妖魅雄黃油煎七日雌黃硃砂磁石曾青各一兩金芽石六錢上各研細將雌雄黃硃砂醋浸三日曾青用好酒浸銅器中紙封曝七日如天陰用火焙乾六味同研勻用砂盆盛令藥滿得三分許以此准合子大小先以赤石脂末固縫外以六一泥固濟訖候乾透以晴明六合吉日別用泥作三個柱子高五寸令平穩如鼎足狀安合子下置炭火三斤逐漸添炭常令及五斤只在盆底不得過口煅五日為度放冷水中浸合子候透剝去泥將合子輕手取開其藥精英五色盡在蓋上亦有三色者純白為上研細棗肉為丸如粟米大每服一丸米飲下如噤口牙緊斡開前齒灌下醒諸疰疰者住也邪氣停住而為病也皆因精氣不足邪氣乘之伏於筋脈流傳臟腑深入骨髓經久不已時發時止令心昏悶無不痛處其因風邪所觸者則為風疰臨喪哭泣死氣所感者則為屍疰鬼邪所擊者為鬼疰其風疰之去來擊痛遊走無常者又謂之走疰其他又有氣血溫涼勞泄等疰之名病各不同其為停住不去則一也詳見千金外臺聖濟諸書羌活湯治風疰心腹刺痛上攻胸背羌活橘紅大腹皮焙各三錢桑白皮一兩五錢芎藭一兩大豆炒一合搗末每服三錢水煎溫服良久再服杏仁丸治屍疰杏仁去皮尖雙仁炒亂髮灰各一錢研勻和丸如小豆大每服五丸豬膏酒下八毒丸治鬼疰中惡心痛癖積蠱注鬼氣雄黃研珍珠研礬石煅巴豆去皮心炒去油丹皮各一兩附子去皮臍三兩藜蘆二兩蜈蚣去頭足炙一條上為末蜜丸如小豆大米飲下二丸得吐為效一方用雄黃礬石硃砂附子炮藜蘆丹皮巴豆各一兩蜈蚣一條為末蜜丸小豆大每服五七丸冷白湯送下無時厚朴丸治一切氣疰大腸結澀背膊刺痛及食物不消奔豚氣逆厚朴薑汁炒一兩桂心大黃醋炒各二兩桃仁去皮尖雙仁炒三兩為末蜜丸如小豆每服三十丸米飲下食後臨臥服微利即效一方加附子二兩鬼迷鬼擊鬼迷者心氣不足精神衰弱幽陰之氣乘虛而感令人喜怒不常情思如醉或狂言驚怖向壁悲啼夢寐多魘與鬼交通乍寒乍熱腹滿短氣不食診其脈人迎氣口乍大乍小乃鬼魅所持之候也鬼擊之病得之無漸卒著人如矛戟所傷令人胸脅腹滿急痛不可按抑或即吐血或即下血輕者獲免重者或致不救治宜符禁之法兼辟邪安正之劑治鬼迷不醒方雄黃一味研如粉吹入兩鼻中瘥安息香取一皂子大焚令煙起邪自退治妖魅病人不言鬼方生鹿角鎊一味為細末每服一錢一言即瘥治卒中鬼擊方雞冠血一味瀝口中令下咽仍破雞以拓心下冷即棄於道旁肘後方治鬼擊諸病卒然著人如刀刺狀胸脅腹內切痛不勝抑按或吐血鼻血下血一名鬼排以醇酒吹兩鼻內良千金方吹醋少許入鼻中癲狂驚癇狂病多火而屬陽或以謀為失志或以思慮鬱結屈無所伸怒無所泄以致肝膽氣逆木火合邪乘於心則為神魂不守乘於胃則為暴橫剛強故治此者治火為先或痰或氣察其甚而兼治之生鐵落飲治痰火熱狂墜痰鎮心生鐵四十斤入火燒赤砧上捶之有花出如蘭如蛾紛紛落地者是名鐵落用水二斗煮取一斗用以煎藥石膏三兩龍齒煅研茯苓防風各一兩半元參秦艽各一兩竹瀝一升上㕮咀入鐵汁中煮取五升去滓入竹瀝和勻溫服二合日五服按此以重下氣以寒抑熱之法易老治一人病陽厥怒狂罵詈或歌或哭六脈無力身表如冰發則叫呼高聲因奪其食又以大承氣湯下之五七行瀉渣穢數斗身溫脈生而愈蓋鐵落飲以抑無形上怒之火承氣湯所以下有形內結之熱也真珠丸本事治肝經因虛內受風邪臥則魂散而不守狀若驚悸真珠三分另研極細乾地黃當歸各一兩半人參棗仁柏仁犀角茯神沉香龍齒各一兩為細末蜜丸梧子大辰砂為衣每服四五十丸金銀薄荷湯下日午夜臥各一服許學士云肝藏魂者也遊魂為變平人肝不受邪故臥則魂歸於肝神靜而得寐今肝有邪魂不得歸是以臥則魂揚若離體也此方以真珠母為君龍齒佐之真珠母入肝為第一龍齒與肝同類故也龍齒虎睛今人例以為鎮心藥不知龍齒安魂虎睛定魄蓋言類也東方蒼龍木也屬肝而藏魂西方白虎金也屬肺而藏魄龍能變化故魂遊而不定虎能專精故魄止而有守予謂治魄不寧者宜以虎睛治魂飛揚者宜以龍齒萬物有成理而不失亦在夫人達之而已寧志膏本事人參棗仁各一兩辰砂五錢乳香二錢半蜜丸彈子大每服一丸薄荷湯下一方有琥珀茯神石菖蒲遠志名人參琥珀丸一方無人參用酒調服名靈苑辰砂散一僧忽患癲疾不得眠臥諸藥不效孫兆曰今夜睡著明後日便愈也但有咸物任與師吃待渴卻來道至夜僧果渴孫以溫酒一角調藥一服與之有傾再索酒與之半角其僧便睡兩日夜乃覺人事如故人問其故孫曰人能安神矣而不能使神昏得睡此乃靈苑中辰砂散也人不能用之耳許學士云予族弟緣兵火失心制寧志膏與之服二十粒愈親舊傳去服之皆驗靈苑云服辰砂散訖便令安臥不可驚覺待其自醒即神魂定矣萬一驚寤不可復活吳正甫少時心病服此一刻五日方寤遂瘥安神丸治癲癇驚狂痰火之症能鎮心安神人參茯苓棗仁炒當歸生地酒炒黃連酒炒橘紅南星薑製各一兩天竺黃五錢雄黃牛黃各二錢琥珀真珠各二錢為末蜜丸桐子大硃砂為衣米飲下五十丸忌動風辛熱之物本事驚氣丸治驚憂積氣心受風邪發則牙關緊急痰涎昏塞醒則精神若癡附子橘紅天麻楠木香殭蠶白花蛇麻黃各五錢蘇子一兩乾蠍一分南星洗浸薄切薑汁浸一夕半兩硃砂一分為末入龍腦麝香少許同研極勻蜜丸如龍眼大每服一丸金銀薄荷湯化下許叔微云此予家秘方也戊午年軍中有一人犯法褫衣將受刃而得釋神失如癡余與一粒服訖而寐及覺病已失矣山東提轄張載揚妻因避寇失心已數年余授此方不終劑而愈又黃山沃巡檢彥妻狂厥者逾年更十餘醫不驗予授此方去附子加鐵粉亦不終劑而愈鐵粉非但化涎鎮心至如推抑肝邪特異若多恚怒肝邪大甚鐵粉能制伏之素問云厥陽怒狂治以鐵落飲金制木之義也茯苓丸辰砂石菖蒲人參遠志茯苓茯神鐵粉半夏曲膽星各等分為細末生薑四兩取汁和水煮和丸如桐子大別用硃砂為衣每服十粒加至二十粒夜臥生薑湯下此醫官都君方余嘗用以療心疾良驗鎮心丸治心風狂言多驚迷悶恍惚人參茯神犀角各一兩牛黃鉛粉各七錢半硃砂水飛龍齒研膽草天竺黃研遠志生地各半兩金箔五十片鐵粉七錢半研為細末蜜丸桐子大每服七丸竹葉湯送下無時溫膽湯三因治心虛膽怯觸事易驚或夢寐不詳短氣悸乏或自汗譫妄不寐合目則驚此氣鬱生涎涎與氣搏故變生諸症半夏枳實竹茹各一兩橘紅一兩五錢炙草四錢每服四錢水一盞半生薑七片棗一枚煎七分十味溫膽湯治症如前而挾虛者宜之半夏枳實陳皮去白各二錢棗仁炒遠志肉甘草湯制熟地酒焙竹茹人參各一錢茯苓一錢五分炙草五分水二盅生薑五片紅棗一枚煎一盅服滾痰丸王隱君方見痰門按癲狂之病屬痰熱相結多在肝膽胞絡之間余遇此症輒投礞石滾痰丸二三錢下膠痰如桃膠蜆肉者五升許即愈若痰少熱多陽明內實者當如羅謙甫之治醜斯兀闌發狂熱渴用大承氣一兩半加黃連二錢以下其熱俾便通汗出乃愈醜寶丸治一切癲癇怔忡搐搦難治之疾祛風清火豁痰調氣開心定志安神鎮驚妙香丸治驚癇百病亦治傷寒潮熱積熱結胸發黃狂走燥熱大小便不通巴豆三百十五粒去皮心膜炒熟研如面牛黃研膩粉研龍腦研麝香研各三兩辰砂飛九兩金箔九十片研研勻煉黃蠟六兩入白蜜三分同煉令勻為丸每兩作三十丸白湯下二丸日二服通涎散治忽患癲狂不止或風涎暴作氣塞倒僕瓜蒂五錢為末每服一錢井花水調下涎出即愈如未出含砂糖一塊下咽涎即出鶴年云予治崑山清水灣一人發狂先為刺百會神庭人中三穴後以蜀漆水拌炒熟一錢龍骨煅牡蠣煅各三錢黃連五分生大黃三錢水煎服一劑即安按狂症未有不從驚得者龍齒最能安魂者也未有無痰者驚則氣逆氣逆則痰聚蜀漆最善劫痰者也未有無火者火性炎上故登高而歌棄衣而走黃連能瀉心火病屬陽明故用大黃以瀉之斧底抽薪法也鶴年黃疸已食如飢但欲安臥一身面目及爪甲小便盡黃也此為脾胃積熱而復受風濕瘀結不散濕熱蒸郁或傷寒無汗瘀熱在裡所致是宜分別濕熱多少而治之若面色微黃而身體或青黑赤色皆見者與純熱之症不同當於濕家求之加減五苓散茵陳豬苓白朮赤苓澤瀉大茵陳湯茵陳蒿半兩大黃三錢梔子四枚水三升先煮茵陳減一半內二味煮取一升去滓分三服小便利出如皂角汁一宿腹減黃從小便出也如大便自利者去大黃加黃連二錢寇宗奭治一僧因傷寒發汗不徹有留熱面身皆黃多熱期年不愈方茵陳山梔各三分秦艽升麻各四錢為散每用三錢水四合去滓食後溫服五日病減二十日悉去搐鼻瓜蒂散寶鑑瓜蒂二錢母丁香一錢黍米四十九粒赤豆五分為細末每夜臥時先含水一口卻於兩鼻孔搐上半字便睡至明日取下黃水許叔微云夏有篙師病黃症鼻內痠疼身與目黃如金色小便赤澀大便如常此病不在臟腑乃黃入清道中也若服大黃則必腹脹為逆當瓜蒂散搐之令鼻中黃水出盡則愈孟銑方瓜蒂丁香赤小豆各七枚為末吹豆許入鼻少時黃水流出隔一日用瘥乃止一方用瓜蒂一味為末以大豆許吹鼻中輕則半日重則一日出黃水愈谷疸始於風寒而成於飲食也金匱云風寒相搏食谷即眩穀氣不消胃中苦濁濁氣下流小便不通陰被其寒熱流膀胱身體盡黃名曰谷疸又云谷疸之為病寒熱不食食即頭眩心胸不安久久發黃為谷疸茵陳蒿湯主之茵陳蒿湯即前大茵陳蒿湯此下熱之劑氣實便閉者宜之不然不可用茯苓茵陳梔子湯寶鑑治谷疸心下痞滿四肢困倦身目俱黃心神煩亂兀兀欲吐飲食遲化小便瘀悶發熱菌陳一錢茯苓五分梔子蒼朮去皮炒白朮各三錢黃連枳殼豬苓澤瀉陳皮防己各二分黃芩六分青皮一分長流水煎去滓空心溫服梔子茵陳泄濕熱而退黃黃連枳殼泄心下痞滿熱能傷氣黃芩主之濕熱壅胃二朮青皮除之濕熱流注經絡膀胱二苓防己利之膽礬丸本事治男婦食勞面黃虛腫痃癖氣塊膽礬無石者三兩黃蠟二兩大棗五十枚用石器入頭醋三升下膽礬大棗慢火熬半日取出棗子去皮核次下黃蠟再熬一二時如膏入臘茶二兩同和為丸桐子大每服二十丸茶清下日三許叔微云宗室趙彥才下血面如蠟不進食蓋酒病致此授此服之終劑而血止面色鮮潤食亦如常治濕熱黃病助脾去濕方乾坤生意針砂擂淨繡水淘白色以米醋於鐵銚內浸一宿炒乾再炒三五次候通紅二兩五錢陳粳米半升水浸一夜搗粉作塊煮半熟百草霜一兩半上三味搗千下丸如桐子大每服五十丸用五加皮牛膝根木瓜根浸酒下初服若瀉其病本去也脾勞黃病方摘元針砂四兩醋炒七次乾漆燒存性二錢香附三錢平胃散五錢為末蒸餅如桐子大湯下黃病有積神方先醒齋筆記蒼朮炒厚朴薑汁炒橘紅甘草楂肉茯苓麥芽各二兩檳榔一兩綠礬醋煅研細一兩五錢為末棗肉丸梧子大每服一錢白湯下日三服凡服礬者忌食蕎麥河豚犯之即死予每治脫力勞傷面黃能食四肢無力用造酒麴丸平胃散加皂礬煅透針砂淡醋湯下十丸日二酒疸小便不利心中懊憹而熱不能食時時欲吐面目黃或發赤斑由大醉當風入水所致蓋酒濕之毒為風水所遏不得宣發則蒸郁為黃也茵陳蒿湯治酒疸心中懊憹小便黃赤茵陳蒿葛根赤苓各五錢升麻秦艽栝蔞根各三錢山梔五分水煎三錢溫服日二以瘥為度小麥飲生小麥二合水煎取汁頓服未瘥再服大黃湯治酒疸懊憹脛腫溲黃面發赤斑大黃炒二兩山梔枳實豉炒三合水煎四錢溫服日二加茵陳亦得葛根湯濟生乾葛二錢梔子二錢枳實豆豉各一錢炙草五分水煎溫服無時女勞疸色欲傷腎得之金匱云額上黑微汗出手足心熱薄暮即發膀胱急小便自利名曰女勞疸蓋黃疸熱生於脾女勞疸熱生於腎故黃疸一身盡黃女勞疸身黃額上黑也仁齋云脾與腎俱病為黑疸凡房勞黃病體重不眠眼赤如朱心下塊起若瘕十死一生宜灸心俞關元二七壯及烙舌下以婦人內衣燒灰酒服二錢範汪亦云女勞疸氣短氣沉者取婦女月經布和血燒灰空腹酒服方寸匕日再不過三日必瘥陰黃病本熱而變為陰非陰症能發黃也韓祗和云病人三五日服下藥太過虛其脾胃亡其津液渴飲水漿脾土為陰濕所加與熱邪相會發黃此陰黃也當以溫藥治之如兩手脈沉細遲身體逆冷皮膚粟起或嘔吐舌上有苔煩躁欲坐臥泥水中遍身發黃小便赤少皆陰候也茵陳橘皮湯韓氏治身黃脈沉細數熱而手足寒喘嘔煩躁不渴者茵陳橘紅生薑各一兩半夏茯苓各五錢白朮二錢五分水四升煮取二升分作四服小茵陳湯韓氏治發黃脈沉細四肢及遍身冷附子一枚炮作八片炙草一兩茵陳二兩水四升煮取二升分三服一方有乾薑無甘草名茵陳附子湯韓氏茵陳理中湯治身冷麵黃脈沉細無力或泄自汗小便清白名曰陰黃人參白朮炮姜炙草茵陳上㕮咀每服五錢水煎羅謙甫治真定韓君祥暑月勞役過度渴飲涼茶及食冷物遂病頭身肢節沉重疼痛汗下寒涼屢投不應轉變身目俱黃背惡寒皮膚冷心下硬按之痛脈緊細按之空虛兩寸脈短不及本位此症得之因時熱而多飲冷加以寒涼過劑助水乘心反來侮土先傷其母後及其子經所謂薄所不勝而乘所勝也時值霖霪濕寒相合此為陰黃以茵陳附子乾薑湯主之內經云寒淫於內治以甘熱佐以苦辛濕淫所勝平以苦熱以淡滲之以苦燥之附子乾薑辛甘大熱散其中寒為君半夏草蔻辛熱白朮陳皮苦甘溫健脾燥濕為臣生薑辛溫以散之澤瀉甘平以滲之枳實苦辛泄其痞滿茵陳苦微寒其氣輕浮佐以薑附能去膚腠間寒濕而退其黃為使也煎服一兩前症減半再服悉愈又與理中湯服之數日得平復李思訓謂發黃皆是陽症凡云陰黃者皆陽壞而成陰非原有陰症也茵陳乾薑湯是治熱症壞而成寒者之藥學者要窮其源蓋即於本病主治藥內加熱藥一味以溫之如桂枝湯加大黃之意虛黃病在中氣之虛也其症小便自利脈息無力神思困倦言語輕微或怔忡眩暈畏寒少食四肢不舉或大便不實小便如膏得之內傷勞役飢飽失時中氣大傷脾不化血而脾土之色自見於外金匱云男子痿黃小便自利當與虛勞小建中湯又略例云內傷勞役飲食失節中州變寒之病而生黃者非傷寒壞症而只用建中理中大建中足矣不必用茵陳也表邪發黃即傷寒症也東垣云傷寒當汗不汗即生黃邪在表者宜急汗之在表之裡宜滲利之在半表半裡宜和解之在裡者宜急下之在表者必發熱身痛在裡者必煩熱而渴若陽明熱邪內郁者必痞結脹悶也麻黃連翹赤小豆湯發汗之劑麻黃去節連翹炙草生薑各二兩赤小豆一升杏仁四十個去皮尖生梓白皮一升大棗十二枚潦水一斗先煮麻黃再沸去上沫內諸藥煮取三升分溫三服半日服盡茵陳五苓散滲利之劑茵陳蒿末一錢五苓散五分水調方寸匕日三服柴胡茵陳五苓散和解之劑五苓散一兩茵陳五錢車前子一錢木通一錢五分柴胡一錢五分分二服水一盞半燈芯五十莖煎服連進數服小便清利愈因酒後者加乾葛二錢急黃卒然發黃心滿氣喘命在頃刻故名急黃也有初得病身體面目即發黃者有初不知黃死後始變黃者此因脾胃本有蓄熱穀氣鬱蒸而復客氣熱毒所加故發為是病也古云發熱心顫者必發為急黃瓜蒂散廣濟療急黃瓜蒂赤小豆丁香黍米各二七枚薰陸香麝香等分另研青布二方寸燒灰上為細末白湯下一錢得下黃水其黃則定消渴統論消渴病有三一渴而飲水多小便數有脂如麩片甜者是消渴也二吃食多不甚渴小便少似有油而數者是消中也三渴飲水不能多但腿腫腳先瘦小陰痿弱數小便者是腎消也古今錄驗消渴大禁有三一飲酒二房室三鹹食及面能慎此者雖不服藥自可無他不知此者縱有金丹亦不可救慎之慎之李詞部曰消渴之疾發則小便味甜按洪範云稼穡作甘以理推之淋餳醋酒作脯法須臾即皆能甜也人飲食之後滋味皆甜積在中焦若腰腎氣盛則上蒸精氣化入骨髓其次為脂膏其次為肌肉其餘則為小便氣臊者五臟之氣味鹹者潤下之味也若腰腎虛冷不能蒸化於上穀氣則盡下而為小便故甘味不變下多不止食飲雖多而肌膚枯槁譬如乳母穀氣上泄皆為乳汁消渴疾者穀氣下泄盡為小便也又肺為五臟之華蓋若下有暖氣上蒸即潤而不渴若下虛極即陽氣不能升故肺干而渴譬如釜中有水以板蓋之若下有火力則暖氣上騰而板能潤若無火力則水氣不能上板終不可得而潤也故張仲景云宜服八味腎氣丸並不可食冷物及飲冷水此頗得效故錄正方於後八味腎氣丸方見腎勞服訖後再服後方以壓之黃連二十分麥冬十二分苦參十分生地七分知母七分牡蠣七分栝蔞根七分為末牛乳為丸桐子大曝乾漿水或牛乳下二十丸日再服病甚者瘥後須服一載以上即永絕病根一方有人參五兩以上見本事方又療消渴口苦舌乾方麥冬五兩花粉三兩烏梅十個去核小麥三合茅根竹茹各一升水九升煎取三升去滓分四五服細細含咽療飲水不消小便中如脂方崔氏黃連栝蔞根各五兩為末生地汁和並手丸如桐子大每食後牛乳下五十丸日二服一方用生栝蔞汁生地汁羊乳汁和黃連任多少眾手捻為丸如桐子大麥冬飲服三十丸漸加至四十五丸輕者三日愈重者五日愈名羊乳丸麥冬飲子治膈消胸滿煩心短氣人參茯神麥冬知母五味子生地生甘草葛根栝蔞根上等分㕮咀每服五錢水二盞竹葉十四片煎至七分去滓溫服河間云心移熱於肺為膈消膈消者心肺有熱胸滿煩心津液燥少短氣久則引飲為消渴也麥冬飲子主之麥冬丸消渴之人愈與不愈常須慮有大癰以其內熱而小便數故也小便數則津液竭津液竭則經絡澀經絡澀則營衛不行營衛不行則熱氣留滯必於大骨節間發癰疽而卒當預備此藥除腸胃實熱兼服消渴方麥冬茯苓黃芩石膏玉竹各八分人參龍膽草各六分升麻四分枳實五分生薑栝蔞根各十分枸杞根為末蜜丸桐子大茅根粟米汁下十丸日二服若渴則與後藥栝蔞根生薑麥冬汁蘆根各三升水一斗煮取三升分三服冬瓜飲子治消渴能食小便如脂麩片日夜無度冬瓜一個割開去穰入黃連末十兩仍將頂蓋好熱灰中煨熟去皮細切研爛用布取汁每服一盞日三夜二服葶藶丸療消渴成水病浮腫方甜葶藶隔紙炒栝蔞根杏仁麩炒黃漢防己各一兩為末蜜丸桐子大每服三十丸茯苓湯下日三白朮散治諸病煩渴津液內耗不問陰陽皆可服之大能止渴生津乾葛二兩白朮人參茯苓炙草藿香木香各一兩為粗末每三錢水一盞半煎至一盞溫服豬肚丸治消渴豬肚一具洗淨黃連白粱米各五兩花粉茯神各四兩知母三兩麥冬二兩上六味為末內豬肚中縫密置甑中蒸極爛乘熱入藥臼中搗為丸若硬加蜜丸梧子大每服三十丸加至五十丸日二水病風水水為風激而上行也其脈浮而洪其症骨節疼痛惡風面目四肢皆腫是宜驅散風氣為主風去則水自下也麻黃附子湯麻黃三兩甘草一兩附子一枚水七升先煎麻黃去上沫內諸藥煮取二升半溫服八分日三此治風水挾寒之劑越婢湯麻黃六兩石膏半斤生薑三兩大棗十五枚甘草二兩水六升先煮麻黃去上沫內諸藥煮取三升分溫三服此治風水挾熱之劑香薷丸外臺干香薷五十斤細銼內釜中以水淹之出香薷上數寸煮使氣盡去滓澄清慢火煎令可丸丸如梧子大每服五十丸日三稍加之以小便利為度無所忌薷術丸干香薷一斤白朮七兩先將白朮為末後濃煎香薷汁和丸如桐子大飲服十丸日夜四五服利小便良五加皮散和劑五加皮地骨皮生薑皮大腹皮茯苓皮以上三方並苦辛淡利之法東垣云風水宜以辛散之以苦瀉之以淡滲利之使上下分消其濕皮水從肺閉得之蓋肺主諸氣而行水道肺閉則水不下行而氾濫皮膚狀與風水相似但不惡風為異防己茯苓湯防己黃耆桂枝各三兩茯苓六兩甘草二兩水六升煮取三升分溫服崔氏療大腹水腫上氣小便赤澀頸脈動不得臥方苦葶藶五兩炒黑色杏仁二兩炒令色黃大棗四十枚飯上蒸去皮核先搗葶藶一百杵再另搗杏仁三百杵總和棗膏搗爛丸如棗核大空心服八丸日晚食消更服五丸米飲下三日後平旦服五丸晚服三丸葶藶散聖濟治十種水氣百方不愈面目四肢俱腫氣息喘急眠臥不安小便漸澀腹脹氣悶水不入口命垂絕者椒目微炒三兩豬苓澤瀉四兩牽牛苦葶藶炒六兩加薑蔥煎三錢酒半盅沖服良久吃蔥白粥一碗酒一盅面東熱服百日消盡白前湯白前二兩紫菀二兩半夏五合澤漆根三兩水一斗內藥志水痕後加水七升微火煎令至痕邊去滓內藥六種白朮二兩吳茱萸五合桂心三兩人參一兩乾薑一兩栝蔞五合微火煎取三升分三服小便當利或溏下勿怪氣即降腫即減海藻散治男子婦人通身浮腫喘悶不便海藻大戟大黃續隨子去殼各一兩銼碎好酒二盞淨碗內浸一宿取出曬乾後用白牽牛頭末一兩滑石半兩甘遂麩炒黃一兩青皮去白橘紅各半兩肉豆蔻一個共前藥一處為細末每服二錢平明淡茶清調下至食時取下水二三行腫減五六分隔二三日平明又一服腫消忌鹽魚肉百日小兒只用一錢五歲以下用半錢孕婦不可服石水從膀胱不利得之四肢瘦腹大腫是其症也王太僕云下焦為分注之所氣窒不利則溢而為水也亦名里水其根在少腹是也鯉魚澤漆湯鯉魚重五斤者一頭以水二斗煮汁去魚澤漆五兩茯苓三兩桑白皮三升澤瀉五兩將後四味內魚汁中煮取四升去渣分四服小便當利漸消也忌酢物千金翼有赤小豆甘草麥冬人參生薑一方無澤漆有赤小豆白朮陳皮蔥白千金療膀胱石水腹腫四肢瘦方桑白皮六兩射干茯苓黃芩各四兩澤瀉五兩白朮四兩澤漆一升防己一兩大豆三升水五斗先煮大豆取三斗去滓澄清取汁一斗下諸藥煮取三升分溫三服禹功散張子和云病水之人如長川氾濫非杯杓可取必以神禹決水之法治之故名禹功散黑牽牛頭末四兩茴香一兩炒為末每服一二錢以生薑自然汁調下當轉下氣也腎水腎為水臟而元陽寓焉腎虛陽弱水無所制而氾濫肢體浮腫咳嗽喘急腰重足冷小便不利或因脾胃虛弱治失其宜元氣復傷而變症者非金匱加減腎氣丸不效金匱腎氣丸白茯苓三兩附子五錢牛膝官桂澤瀉車前山萸肉山藥丹皮各一兩熟地四兩為末和地黃膏煉蜜丸桐子大每服七八十丸空心白湯下脹滿統論二陰一陽發病善脹心滿善噫者腎膽同逆三焦不行氣蓄於上也三陽盛入於陰病䐜脹而頭痛言三陽之邪盛也盛則滿滿則溢而入於陰之分矣夫頭為陽腹為陰陰病故腹脹滿也有所墮墜惡血留內腹中滿脹不得前後此上傷厥陰之脈下傷少陰之絡腹脹屬脾胃者則飲食少屬他臟腑者則飲食如常其脹在皮膚孫絡之間者飲食亦如常其在腸胃肓膜之間者則飲食亦少其氣亦壅塞於五臟則氣促急不食而病危矣是故病在表者易治在腑者難治入臟者不治腹脹滿氣不通者加厚朴以破滯氣腹中坌悶此非腹脹滿乃散而不收可加芍藥收之是知氣結而脹宜厚朴以散之氣散而脹宜芍藥以收之脾脹濕氣歸脾壅塞不行其脈濡其體重其小便不利大便溏而不暢經云諸濕腫滿皆屬於脾又土鬱之發民病心腹脹跗腫是也又脾土受濕不能制水水漬於腸胃而溢於皮膚漉漉有聲怔忡喘息即為水脹是也小溫中丸治脾虛肝實不能運化不可下之陳皮半夏神麯茯苓各一兩白朮二兩生香附針砂醋炒紅各一兩五錢苦參炒川連炒厚朴各半兩甘草三錢為末醋水各一盞打糊為丸桐子大每服七八十丸白朮六錢陳皮一錢生薑一片煎湯吞下虛甚加人參一錢病輕者服此丸六七兩小便即長病甚者服一斤後小便如常胃苓湯和脾胃去濕消脹蒼朮厚朴薑汁炒陳皮白朮茯苓各一錢澤瀉豬苓各一錢甘草六分官桂五分加姜煎禹餘糧丸三因許學士朱丹溪云此乃治膨脹之要藥蛇含石大者三兩置新鐵銚上入炭火中燒與銚子一般紅傾入醋中候冷取出研極細禹餘糧石三兩真針砂五兩淘淨炒乾入餘糧一處用米醋二升銅器內煮乾為度置銚中上炭火中燒紅傾淨磚上候冷研極細以上三物為主其次量人虛實加入下項羌活木香茯苓川芎牛膝酒浸桂心白蔻炒茴香炒蓬朮附子青皮京三稜炮白蒺藜當歸酒浸各半兩為末入前末拌勻以湯浸蒸餅捩去水和藥再杵極勻丸如桐子大空心溫酒白湯下三十丸至五十丸最忌鹽一毫不可入口否則發疾愈甚但試服藥即於小便內旋去不動臟腑病去日二三服兼以溫和調補氣血藥助之真神方也肝脹怒動肝火逆於中焦其症口苦脈弦脅及小腹脹滿或痛發則身熱氣逆是也左金丸黃連六兩吳茱萸一兩粥為丸椒目大每服三十丸白湯下按繆刺論謂有所墮墜惡血留內腹中滿脹不得前後先飲利藥此上傷厥陰之脈下傷少陰之絡是火逆之外又有血滯一症火無形以苦辛平之血有形故以利藥行之新定赤芍生地歸尾桃仁各一錢紅花香附童便浸二錢大黃酒浸一錢五分丹皮青皮醋炒各八分䐜脹即氣脹胸膈脹滿也經云濁氣在上則生䐜脹是也宜升清降濁蓋清不升則濁不降也又七情鬱結氣道壅隔上不得降下不得升腹大而四肢瘦削即氣脹也木香順氣湯木香蒼朮各三分草蔻三分青皮益智仁陳皮澤瀉茯苓半夏乾薑吳茱萸各二分升麻柴胡各一分厚朴四分人參當歸各五分水二盞煎一盞食前溫服通幽湯東垣云濁陰本歸六腑而出下竅今在上是濁氣反行清道氣亂於中則脹作矣治在幽門泄其陰潤其燥使幽門通利大便不閉則濁陰得歸下地䐜脹腹滿俱去矣當歸升麻桃仁各一錢紅花甘草炙三分生地熟地各五分一方加枳殼五分本方加大黃麻仁名當歸潤腸湯治同血脹汙血成積石瘕之屬也經云石瘕生於胞中寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大如懷子狀可導而下經驗桃奴丸桃奴延胡索豭鼠糞香附官桂砂仁五靈脂桃仁去皮尖各等分為末每服三錢溫酒調下雞矢醴散宣明大黃桃仁去皮尖乾雞屎各等分為末每服二錢水一盞姜三片煎湯調下奪命丹治瘀血入胞衣脹滿難下服此血即消胞衣自下炮附子半兩牡丹皮一兩乾漆一兩碎之炒令煙盡為末醋一升大黃末一兩同熬成膏和勻丸如桐子大溫酒下五七丸食脹一名谷脹飲食過節停滯中焦其症吞酸噯氣惡聞食臭得食則益甚經云飲食不節起居不時者陰受之陰受之則入五臟入五臟則䐜滿閉塞是也是宜消而去之甚則下之所謂中滿者瀉之於內也枳實導滯丸大黃一兩枳實麩炒黃芩黃連俱酒炒焦神麯各五錢白朮土炒茯苓三錢澤瀉二錢為末蒸餅為丸人參丸外臺療久心腹痛脹痰飲不下食人參白朮枳實各六分厚朴青木香大黃檳榔各六分茯苓八分橘皮五分蜜丸桐子大生薑大棗煎湯送下二十丸日二服漸加至三十丸無礙丸治脾病水橫流四肢脹滿木香五錢京三稜炮蓬莪朮炮檳榔郁李仁湯浸去皮各一兩大腹皮二兩為末炒麥芽粉糊丸桐子大每服二十丸生薑湯下熱脹熱聚於裡口乾便閉經云諸腹脹大皆屬於熱是也枳殼銼散治熱症脹滿厚朴枳殼桔梗各半兩炙草一錢大黃蒸三錢銼每服三錢姜五片棗二枚烏梅一枚煎服愚按熱脹有二假令外傷風寒有餘之邪自表入里寒變為熱而作胃實腹滿仲景以大承氣下之亦有膏粱之人濕熱鬱結於中而成脹滿者宜清熱導濕東垣中滿分消丸主之中滿分消丸治中滿熱脹有寒者勿用黃芩一兩二錢黃連炒五錢薑黃白朮人參炙草豬苓各一錢茯苓乾薑砂仁各二錢枳實半夏各五錢厚朴薑製一兩知母炒四錢澤瀉陳皮各三錢為末蒸餅為丸如桐子大每服百丸熱白湯下食後量病人虛實加減寒脹其症有二有寒氣襲表而脹於外者經云膚脹者寒氣客於皮膚𪔣𪔣然不堅腹大身盡腫皮厚以手按其腹窅而不起腹色不變此其候也有寒氣入於裡而脹於內者蓋陰氣凝聚久而不散內攻腸胃則為寒中脹滿泄利之症經云臟寒生滿病是也在表者溫而散之在裡者溫而行之溫胃湯治冷則氣聚脹滿不下食熟附子當歸厚朴人參半夏曲橘紅生薑各一兩炙草一兩川椒去合口者三錢銼散每服三錢木香塌氣丸元戎丁香胡椒各三錢郁李仁四錢白醜枳實各一兩檳榔木香蠍尾各半兩為細末飯丸綠豆大每服十丸加至十五丸薑湯下此溫行之劑治單腹脹最妙若胸脅脹滿一身面目盡浮鼻塞咳逆清涕出當用小青龍湯二三服分利其經卻進消脹藥實脹胃氣實則脹也脈大堅便秘按之痛仲景云腹滿按之痛者為實可下之經云中滿者瀉之於內又云下之則脹已是也沉香交泰丸治脹而大便燥結者沉香橘紅白朮各二錢厚朴五錢吳茱萸枳實青皮木香茯苓澤瀉當歸各二錢大黃酒浸一兩為末蒸餅為丸梧子大每服五十丸加至七八十丸溫湯下微利為度四妙丸治老幼腹脹血氣凝滯用此寬腸順氣商州枳殼厚而綠片者去穰四兩分作四份一用蒼朮一兩同炒一用茴香一兩同炒一用萊菔子一兩同炒一用乾漆一兩同炒炒黃後去四味只取枳殼為末以四味煎汁煮麵糊丸桐子大每食後米飲下五十丸虛脹中氣虛衰脾胃不健而三焦痞塞是為氣虛中滿經云足太陰虛則鼓脹也其脈軟其色白其症腹脹按之不痛溏泄腸鳴宜溫養陽氣為主塞因塞用也參朮健脾湯人參白朮茯苓陳皮半夏縮砂厚朴薑製各一錢炙草三分水姜煎服一方無甘草有麥芽山楂因甘能滿中積聚統論積者積累之謂由漸而成重而不移聚者聚散之謂作止不常痛無定所故曰積者陰氣聚者陽氣積聚之病非獨痰食氣血即風寒外感亦能成之然痰食氣血非得風寒未必成積風寒之邪不遇痰食氣血亦未必成積經云卒然多食飲則腸滿起居不節用力過度則絡脈傷血溢腸外與寒相搏併合凝聚不得散而成積此之謂也經論心肝腎皆有積心曰伏梁心下堅直如梁木也肝曰肥氣脅下氣聚如覆杯也腎曰奔豚往來上下如豚之奔也又有伏瘕疝瘕瘕聚血瘕伏瘕者伏結於內疝瘕者沖痛如疝瘕聚者聚散不常血瘕者血凝成瘕也難經又補脾肺之積脾曰痞氣氣痞而不運肺曰息賁響有聲也巢氏又有癥瘕之辨謂其病不動者癥也雖有癖而可推移者瘕也癥者徵也有形可見也瘕者假也假物成形也張子和又分九積酒積者目黃口乾食積者酸心腹滿氣積者噫氣痞塞涎積者咽如拽鋸痰積者涕唾稠黏癖積者兩脅刺痛水積者足腫脹滿血積者打撲肭疼肉積者贅瘤核癧各治法詳見本方許學士云大抵治積或以所惡者攻之所喜者誘之則易愈如硇砂阿魏治肉積神麯麥芽治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治痰積礞石巴豆治食積各從其類也若用群隊之藥分其勢則難取效肥氣經曰肝之積名曰肥氣在左脅下如覆杯有頭足久不愈令人發咳痎瘧連歲不已咳肺病也積氣上攻至肺則咳侮所不勝也痎瘧三日瘧也肝所生病為往來寒熱連歲不已者積不去則瘧亦不已也溫白丸局方通治五積及十種水氣八種痞氣五種淋疾九種心痛七十二種風三十六種遁屍疰忤癲癇翻胃噎塞脹滿不通紫菀去苗菖蒲九節者去毛吳茱萸湯洗七次焙乾柴胡厚朴薑製各一兩桔梗去蘆茯苓去皮皂莢去皮子弦炙桂枝乾薑炒黃連川椒去目及閉口者微炒出汗巴豆去皮膜油人參各半兩川烏炮去皮臍八錢為細末入巴豆研勻蜜丸桐子大每服三丸漸加至五丸七丸生薑湯送下臨臥服有孕忌服易老云本方治肥氣加柴胡川芎鱉甲丸治肥氣體瘦飲食少思鱉甲一枚重四兩者洗淨以醋和黃泥固濟背上可厚三分令乾京三稜炮制枳殼麩炒黃各三兩川大黃銼炒二兩木香忌火桃仁去皮尖雙仁用麩炒微黃細研如膏一兩半上除鱉甲外俱搗為細末後泥一風爐子上開口可安鱉甲取前藥末並桃仁膏內鱉甲中有好米醋二升時時旋取入鱉甲內慢火熬令稠取出藥卻將鱉甲去泥淨焙乾搗為細末與前藥同和搗為丸梧子大每服二十丸溫酒送下空心臨臥各一服伏梁經曰心之積名曰伏梁起臍上大如臂上至心下久不愈令人煩心心為火臟心受邪則火內鬱而煩也溫白丸加石菖蒲黃連桃仁桃奴散治伏梁氣在心下結聚不散桃奴三兩為末空心溫酒調下二錢桃奴是桃實著樹不落正月中採者是也痞氣經曰脾之積名曰痞氣在胃脘復大如盤久不愈令人四肢不收發黃疸飲食不為肌膚脾氣行乎四肢脾氣既痞四肢無以受氣故不收不收猶不舉也脾色黃而合肉氣痞不運熱鬱於中故黃色外見而肌膚日削也溫白丸加吳茱萸乾薑息賁經曰肺之積名曰息賁在右脅下復大如杯久不已令人灑淅寒熱喘咳發肺壅肺主氣而合皮毛肺郁成積壅於內者不能衛於外故灑淅寒熱痹於上者不復降於下故喘咳發肺壅壅癰也溫白丸加人參紫菀奔豚經曰腎之積名曰奔豚發於少腹上至心下若豚狀或上或下無時久不已令人喘逆骨痿少氣腎為水臟而喜凌心故上至心下奔突如豚腎居下焦而善逆故令人喘逆腎合骨而為氣之根故骨痿少氣溫白丸加丁香茯苓遠志氣積氣滯成積也凡憂思鬱怒久不得解者多成此疾故王宇泰云治積之法理氣為先氣既升降津液流暢積聚何由而生丹溪乃謂氣無形不能作聚成積只一消痰破血為主誤矣天地間有形之物每自無中生何止積聚也戴復庵只以一味大七氣湯治一切積聚其知此道歟大七氣湯香附一錢半青皮陳皮桔梗官桂藿香益智莪朮三稜各一錢甘草七分半為末每服四五錢姜三斤棗一枚水煎服肝積肥氣用前湯煎熟待冷卻以鐵器燒通紅以藥淋之乘熱服肺積息賁用前湯加桑皮半夏杏仁各五分心積伏梁用前湯加石菖蒲半夏各五分脾積痞氣用前湯下紅丸子腎積奔豚用前方倍桂加茴香炒楝子肉各五分此濟生方也指迷有半夏無三稜統旨有元胡索薑黃草蔻無桔梗血積痛有定處遇夜則甚其脈芤澀婦人產後及跌僕努力者多有此病或憂怒傷其內風寒襲於外氣逆血寒凝結成積內經云卒然外中於寒若內傷於憂怒則氣逆六輸不通溫氣不行凝血蘊里而不散此之謂也加減四物湯東垣治婦人血積熟地當歸川芎芍藥肉桂廣皮三稜乾漆炒煙盡各等分為粗末每服二錢水煎服丹溪當歸丸無桂漆有神麯百草霜酒和丸伏瘕經云小腸移熱於大腸為伏瘕河間云大腸熱氣菀結津液消耗腹痛秘澀檳榔丸主之檳榔丸檳榔大黃銼碎炒枳殼麩炒各二兩木香桃仁去皮尖炒大麻仁另研各一兩為末蜜丸桐子大每服十丸至十五丸溫酒下無時石瘕瘕聚石瘕者衃血留止結硬如石即血瘕也經云寒氣客於子門子門閉塞氣不得通惡血當瀉不瀉衃以留止日以益大狀如懷子月事不以時下皆生於女子可導而下亦名瘕聚經云任脈為病男子七疝女子瘕聚此之謂也新定大黃三錢用酒同三稜蓬朮浸一宿去稜術不用炒桃仁三十粒去皮尖炒肉桂三錢附子四錢炮木香一錢半青皮二錢醋炒當歸五錢乾漆二錢半炒煙盡為末酒糊丸桐子大每服五十丸淡醋湯下溫酒亦可米瘕乾德中浙江有慎恭道肌瘦如勞惟好食米缺之則流清水情似憂思食米頃頓復如常眾醫莫辨後遇蜀僧道庶以雞屎及白米各半合共炒為末水一盞調服良久病者吐出如米形遂瘥其病為米癥是也肉積阿魏丸阿魏山楂肉各一兩連翹五錢黃連六錢五分上三味為末以阿魏醋煮為丸如梧子大每服五六十丸食前白湯下又方治肉積蟲積一應難消難化腹中飽脹疼痛皆能取效如神不傷元氣元珠名積塊丸京三稜莪朮並醋炒自然銅蛇含石並醋淬七次各二錢雄黃蜈蚣全用焙燥各一錢二分木香一錢半辰砂沉香各八分鐵花粉用米醋炒一錢天竺黃阿魏全蠍洗焙乾蘆薈各四錢冰片五分上為極細末用雄豬膽汁煉為丸如梧子大每服七八分重者一錢五更酒送下塊消即止不必盡劑用黑狗膽汁丸亦妙通治諸積宣明三稜湯治癥瘕痃癖積聚不散堅滿痞脹飲食不下京三稜二兩白朮一兩蓬朮當歸各半兩檳榔木香各七錢半為末每服三錢沸湯調下三因散聚湯治九氣積聚狀如癥瘕隨氣上下發則心腹絞痛攻刺腰脅小腹䐜脹大小便不利半夏檳榔當歸各七錢半厚朴薑製枳殼茯苓附子炮川芎吳茱萸湯炮炙草各一兩杏仁去皮尖麩炒桂心橘紅各二兩為末每服四錢水一盞姜三片煎七分空心溫服大便不利加大黃諸積太倉丸陳倉米四兩以巴豆二十一粒去皮尖同炒至米香豆黑勿令米焦去豆不用再入橘紅四兩為末和丸桐子大薑湯送下五丸日二萬病紫菀丸即溫白丸加羌活獨活防風萬病感應丸即溫白丸減去川椒加下藥羌活三稜甘遂杏仁防風各一兩五錢威靈仙一兩
