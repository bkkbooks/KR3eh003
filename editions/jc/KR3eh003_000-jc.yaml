front:
  text: 徐序傷寒而外金匱一書又雜症之大法門也吾吳尤在涇先生學術淵深天機敏妙嘗以其吟詠自得之餘究心靈素有金匱心典集註北田讀書錄行世又出其生平見聞所以羽翼金匱者條分縷析列為八卷祖述仲景遺意薈萃各家之說參以論斷所謂廣長舌大法輪可想見先生濟世婆心矣餘生也晚不獲親炙先生討論精奧讀其書如見其人焉聞諸故老云先生鍵戶著書絕意榮利一時名宿如方東華顧秀野沈歸愚李客山諸君相與結城南之社其詩採入國朝別裁集為時所誦集者已久晚年為人治病多奇中蓋歷數十年精意研殫宜其神妙莫測是書余得之及門平舟沈子復於星門陳子處借校訛正補缺名之曰金匱翼竊仿傷寒附翼之義夫科舉之學揣摩家猶曰中式況於病乎則是書為金匱羽翼而先生為仲聖功臣矣是為序嘉慶十有八年癸酉三月長洲後學徐錦書於心太平軒柏序聞之著書難選書尤難醫理之難知也其書汗牛充棟欲別贗存真如披沙揀金覽之博尤貴擇之精吾鄉尤在涇先生通儒也邃於醫理所著醫書數種已刻者早已家置一編而治雜病一書只存抄本是書之必傳於後無庸贅述獨惜其未廣所傳也吾宗淡安大兄昔同遊西疇夫子門析疑賞奇師深喜其好學迄今積三十年孜孜不倦宜其乞方踵至名動公卿乃復虛懷若谷雖盛暑晚歸余至必剪燭深談也嚐出郭氏傷寒補亡論尤氏雜病兩書正訛補缺相與商榷者久之今尤氏書校刊已成促其先付剞劂名之曰金匱翼尤氏固為仲聖功臣而淡安亦屬尤氏知己矣是為序弟柏雪峰氏拜書尤序余侄在涇幼習儒業長精於醫於古方書靡不畢貫而治病處方一以仲景為宗既以其道活人慮無以昭後世也乃注仲景金匱即世所傳金匱心典是也間又取雜病討論之集為八卷詳其證候析其治法表裡虛實之辨補瀉溫涼之用開卷瞭然如指掌焉嗚呼此道之難知也久矣今睹是書抑何其深切而著明也惜其所注仲景傷寒論名貫珠集者余不得而見之然在涇不專以醫名其所為詩必宗老杜一如其醫之必宗仲景云乾隆三十三年歲次戊子岳岩老人世輔書於虎丘山塘之思永堂
