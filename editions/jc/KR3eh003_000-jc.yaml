body:
  text: 大父拙吾府君家傳楠生十年隨吾父移居花溪又四年而大父歿事大父日淺而所熟聞於吾父之口述者十有二三焉恐後之人欲舉其事而無由也謹錄而載之家乘大父諱怡字在涇號拙吾吾曾大父第三子曾大父有田千畝曾伯祖鼎黃公非辜被累鬻幾盡及析產大父僅受田三十畝繼又以事棄去遂為蔞人某年除夕漏鼓移盎無粒米大母偕吾父枯坐一室中燈半滅大父方賣字於佛寺晨光透乃攜數十錢易米負薪而歸業醫始不著於時大母以針指佐食嚴寒雞數鳴刀尺猶未離手卒以是致疾大父時追悼之不畜姬妾者二十年大父甚貧困往來皆一時名流若番禺方東華錢塘沈方舟寧國洪東岸同郡若顧秀野沈歸愚陳樹滋徐龍友周迂村李客山諸先生皆折節與交楠自曉事後未見有一雜賓至者性沉靜淡於名利晚年治病頗煩稍暇即讀書灌花飼鶴觀魚以適其幽閒恬淡之意間作古文時文絕類荊川然非所專力也己巳得疾不服藥絕粒待盡易簀前一日索紙筆書留別同社諸公詩字畫蒼勁不異平時詩曰椰瓢松塵有前緣交好於今三十年曲水傳觴宜有後旗亭畫壁猥居前病來希逸春無分老至淵明酒已捐此後音塵都隔斷新詩那得到重泉蓋絕筆也所著醫書數種已刻者金匱心典集註醫學讀書記以及北田吟稿二卷皆已膾炙人口大父少時學醫於馬元一先生先生負盛名從遊者無數晚得大父喜甚謂其夫人曰吾今日得一人勝得千萬人矣後先生著書甚多皆大父所商榷以傳於此見前輩之卓識云孫世楠述此藹谷先生所作家傳也先生人品學問為吳中名宿今讀其家傳益信家學淵源英賢繼起實有所本云淡安附識
