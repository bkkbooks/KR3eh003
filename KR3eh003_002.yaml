body:
  text: 卷二痰飲統論人之有形藉水飲以滋養水之所化憑氣脈以宣流蓋三焦者水穀之道路氣脈之所終始也若三焦調適氣脈平均則能宣通水液行入於經化而為血灌溉周身設三焦氣澀脈道不通則水飲停滯不得宣行因之聚成痰飲為病多端古方論痰有四痰飲懸飲溢飲支飲是也詳見金匱要略然又有留飲癖飲流飲伏飲之異其聚而不散者曰留飲僻處脅下者曰癖飲流移不定者曰流飲沉伏於內者曰伏飲又因酒而成癖者曰酒癖因寒多所致者曰冷痰因熱邪所傷者曰熱痰病雖多端悉由三焦不調氣道否澀而生病焉是以氣行即水行氣滯即水滯故知飲之為病在人最多善治者以宣通其氣脈為先則飲無所凝滯所以治痰飲者當以溫藥和之蓋人之氣血得溫則宣流也及結而成堅癖則兼以消痰破飲之劑攻之痰之源不一有因熱而生者有因氣而生者有因風而生者有因驚而生者有因積飲而生者有多食而生者有因暑而生者有傷冷物而成者有因脾虛而成者其為病也驚痰則成心痛癲疾熱痰則成煩躁懊憹頭風爛眼風痰則成癱瘓大風眩暈暗風悶亂飲痰成脅痛四肢不舉每日嘔吐食痰成瘧痢口臭痞氣暑痰頭昏眩暈黃疸頭疼冷痰骨痹四肢不舉氣刺痛酒痰飲酒不消但得酒次日又吐脾虛生痰食不美反胃嘔吐氣痰攻注走刺不定丹溪痰生於脾胃宜實脾燥濕又隨氣而升宜順氣為先分導次之又氣升屬火順氣在於降火熱痰則清之濕痰則燥之風痰則散之郁痰則開之頑痰則軟之食痰則消之在上者吐之在中者下之又中氣虛者宜固中氣以運痰若攻之太過則胃氣虛而痰愈盛矣節齋治痰七法一曰攻逐古云治痰先補脾脾復健運之常而痰自化然停積既甚譬如溝渠瘀壅久則倒流逆上汙濁臭穢無所不有若不決而去之而欲澄治已壅之水而使之清無是理也故須攻逐之劑神仙墜痰丸黑牽牛取頭末三兩皂角酥炙用一兩白礬生用一兩上為末水丸桐子大酒下三五十丸控涎丹甘遂大戟白芥子各等分上為末水糊丸桐子大臨臥薑湯服五七丸至十丸痰猛加丸數李時珍曰痰涎為物隨氣升降無處不到入心則成癲癇入肺則壅竅為喘咳背冷入肝則膈痛乾嘔寒熱往來入經絡則麻痹疼痛入筋骨則牽引釣痛入皮肉則瘰癧癰腫陳無擇三因方並以控涎丹主之殊有奇功一名妙應丸又人忽患胸背手足腰項筋骨牽引釣痛走易不定或手足冷痹氣脈不通此乃痰涎伏在心膈上下隨氣攻注隧道閉塞所致誤認癱瘓非也須以此藥治之十棗湯芫花醋炒黑色甘遂麵裹水煮大戟各等分上為細末以水一升半煮大棗十枚至八合去滓調藥末強人一錢匕弱人五分平旦服之不下更加五分下後以糜粥調養之河間云芫花之辛以散飲大戟之苦以泄水其甘遂直達水氣所結之處乃泄水飲之聖藥也礞石滾痰丸王隱君曰痰病古今未詳方書雖有五飲諸飲之異而莫知其病之源或頭風作眩目暈耳鳴或口眼蠕動眉稜耳輪痛癢或四肢遊風腫硬似疼非疼或齒頰痛牙齒浮痛或噯氣吞酸心下嘈雜或痛或穢咽嗌不利咯之不出咽之不下其痰如墨或如破絮桃膠蜆肉之狀或心下如停冰鐵心氣冷痛夢寐奇怪失志癲癇或足腕痠痛腰背骨節卒痛或四肢筋骨疼痛難以名狀並無常處或手臂痛麻狀若風濕或脊上一條如線之寒起者或渾身習習如臥芒刺者或眼黏濕癢口糜舌爛喉痹等症或繞項結核狀若瘰癘或胸腹間有如二氣交紐噎息煩悶有如煙火上衝頭面烘熱或中風癱瘓或癆瘵荏苒之疾或風毒腳氣或心下怔忡如畏人捕或喘咳嘔吐或嘔冷涎墨汁綠水甚為肺癰腸毒便膿攣跛內外為病百端皆痰所致其狀不同難以盡述蓋津液既凝為痰不復周潤三焦故口燥咽乾大便秘結面如枯骨毛髮焦槁婦人則因此月水不通若能逐去敗痰自然服餌有效余用滾痰丸以愈諸疾今特相傳於世云青礞石一兩沉香五錢大黃酒蒸熟切曬黃芩各八兩上將礞石打碎用焰硝一兩同入瓦罐鹽泥固濟曬乾火煅石色如金為度研末和諸藥水丸如梧子大白湯食後服人壯氣實者可至百丸服後仰臥令藥在胸膈間徐徐而下除逐上焦痰滯惡物過膈然後動作食湯水方能中病明日當下痰積惡物若不下加十丸愚按痰之與飲同類而異名者耳痰者食物所化飲者水飲所成故痰質稠而飲質稀也痰多從火化飲多從寒化故痰宜清而飲宜溫也痰多膠固一處飲多流溢上下故痰可潤而飲可燥也是以控涎十棗為逐飲之真方礞石滾痰乃下痰之的藥易而用之罕有獲效者矣學者辨之二曰消導凡病痰飲未盛或雖盛而未至堅頑者不可攻之但宜消導而已消者損而盡之導者引而去之也和劑二陳湯治痰飲為患或嘔逆噁心或頭眩心悸或中脘不快或食生冷飲酒過度脾胃不和並宜服之半夏薑製橘紅各五兩白茯苓三兩甘草一兩半炙上㕮咀每服四錢水一盞煎七片煎八發熱服無時一方有大棗一枚本方加枳實桔梗名桔梗半夏湯濟生導痰湯半夏湯洗七次四兩天南星泡去皮赤茯苓枳實橘紅各一兩甘草半兩炙上㕮咀每服四錢水姜煎食後溫服青礞石丸治食積成痰青礞石敲碎如棗子大以焰硝二兩同入鍋煅黃色半夏湯炮七次天南星漫火煨制各五錢風化硝三錢盆淨者冬月以絹袋盛懸風前化之黃芩五錢茯苓五錢上為細末神麯糊入薑汁為丸如梧子大每服三五十丸薑湯送下一方加薑汁菖蒲滑石一方無南星有白朮一方有枳實倍礞石一方加蒼朮五錢滑石一兩又方半夏陳皮白朮白茯苓大黃黃芩人參炙草礞石各一兩沉香五錢上為末以竹瀝一大碗半薑汁三匙拌勻曬乾如此五六度仍以竹瀝薑汁糊丸如小豆大每服百丸臨臥薑汁吞下又方牽牛頭末二兩滑石二兩大黃一兩木香黃芩礞石枳殼青皮陳皮檳榔各五錢沉香二錢為末水丸桐子大薑湯下五十丸半夏丸治膈痰結實滿悶喘逆半夏薑汁製五兩皂角五挺去皮揉水煮半夏生薑五兩同半夏搗作餅炙乾上為末蜜為丸梧子大薑湯下二十丸治熱痰結在胸膈咯吐不出滿悶作痛名痰結又脅下痛作寒熱咳嗽氣急亦痰結也製半夏陳皮一錢赤苓一錢桔梗栝蔞仁枳殼各七分黃連黃芩梔子貝母蘇子桑皮杏仁芒硝各五分木香甘草各三分上銼作一帖姜三片同煎至半納芒硝溶化去滓又入竹瀝薑汁調服鶴頂丹治諸頑痰迷塞關竅不通聲音不出白礬黃丹各一兩火煅為末麵糊丸麻子大每服三十丸研末入全蠍少許薑湯調灌之吐痰立愈青州白丸子治風痰壅盛嘔吐眩暈及癱瘓中風半夏七兩南星三兩白附子二兩川烏五錢上共為細末清水浸春五夏三秋七冬十日朝夕換水候日數足乃取納絹袋中濾過其滓再研再濾以盡為度澄清去水曬乾為末以糯米粥清糊丸綠豆大薑湯吞下三五十丸局方如癱瘓風以溫酒送下如小兒驚風薄荷湯下百一選方加川芎二兩天麻殭蠶全蠍各一兩並生用為細末麵糊丸瑞竹堂方加天麻全蠍木香枳殼各一兩三曰和始因虛而生痰繼因痰而成實補之則痰益固攻之則正不支惟寓攻於補庶正復而痰不滋或寓補於攻斯痰去而正無損是在辨其虛實多寡而施之橘皮湯半夏制五兩茯苓陳皮各三兩細辛青皮桔梗枳殼甘草炙各二兩人參旋覆花去萼各一兩上銼散每服三錢生薑五厚片煎服直指六君子湯人參白朮茯苓甘草減半陳皮半夏各一錢水二盞姜五片煎至一盅去滓不拘時服四曰補夫痰即水也其本在腎痰即液也其本在脾在腎者氣虛水泛在脾者土虛不化攻之則彌盛補之則潛消自非聖知罕能得其故也濟生腎氣丸四君子湯苓桂朮甘湯五曰溫凡痰飲停凝心膈上下或痞或嘔或利久而不去或雖去而復生者法當溫之蓋痰本於脾溫則能健痰生於濕溫則易行也千金半夏湯治冷痰白朮三兩半夏一升生薑八兩茯苓人參桂心甘草炙附子炮各二兩水八升煮三升分溫服吳茱萸湯吳茱萸人參半夏薑製桂心各二兩茯苓二兩甘草一兩薑棗湯煎三錢空心溫服日二聖濟總錄曰氣為陽陽不足者不能消導水飲則聚而成痰浸漬腸胃上為嘔逆吐酸下為洞泄寒中久不已則令人消瘦少氣倚息妨於飲食昔人治痰飲多以溫藥和之為此故也沉香茯苓丸溫脾胃利胸膈和氣血沉香一兩白茯苓製半夏人參丁香各二兩甘草陳皮去白肉豆蔻煨檳榔各半兩共末蜜丸桐子大薑湯下二十丸本事神術丸茅山蒼朮一斤去皮研為末生芝麻半兩水二盞研濾去汁大棗十五枚煮爛去皮核研上三味搜和乘熱入臼杵丸如梧子大干之每日空腹溫湯吞下五十丸加至一百丸二百丸忌桃李雀蛤初服心膈微燥進山梔散一服不燥矣許叔微云予平生有二疾一則臟腑下血二則膈中停飲血有時而止停飲則無時而愈始因年少時夜坐為文左向伏几案是以飲食多墜向左邊中夜以後稍困乏則飲酒兩三杯既臥就枕又向左邊側睡氣壯盛時殊不覺三五年後覺酒止從左邊下漉漉有聲脅痛飲食殊減十數日必嘔吐數升酸水暑月止是右邊身有汗漐漐常潤左邊病處絕燥遍訪名醫及海上方服之少有驗間或中病止得月餘復作其補則如天雄附子礬石其利則如牽牛大戟甘遂備嘗之矣予後揣度之已成癖囊如潦水之有窠臼不盈窠不行水盈窠而後行者也清者可行濁者依然停蓄蓋下無路以決之也是以積之五七日必稍吐去而稍寬數日復作夫脾土惡濕而水則流濕莫若燥脾以勝濕崇土以填窠臼則疾當去矣於是悉屏諸藥一味服蒼朮三月而疾愈自此一向服數年不嘔不吐胸膈寬飲啖如故暑月汗周體而身涼飲亦當中下前此飲漬於肝目亦多昏眩其後燈下能書細字皆蒼朮之力也予初用茅朮半年後止用燥烈味極辛者削去皮不浸極有力而亦自然不燥也山梔散用山梔一味干為之末沸湯點服故知久坐不可伏向一邊時或運動亦消息之法六曰清或因熱而生痰或因痰而生熱交結不解相助為瘧是以欲去其痰必先清其熱昔人所謂痰因火盛逆上者治火為先也其證咽喉乾燥或塞或壅頭目昏重或咳吐稠黏面目赤熱潔古小黃丸南星半夏黃芩各一兩上為末薑汁浸蒸餅為丸如桐子大每五七十丸生薑湯下食後服二陳湯加黃芩連翹山梔桔梗薄荷亦佳聖濟鵝梨煎丸治熱痰涼心肺利胸膈解毒補虛益氣鵝梨大者二十枚去皮取汁皂夾十條去皮水揉取汁生地黃八兩搗取汁薄荷生搗取汁白蜜八兩同上汁熬成膏人參白茯苓半夏各一兩檳榔煨三分青皮去白炒桔梗甘草炙各三分上共為末搗膏為丸梧子大荊芥湯下二十丸日二一方有木香蓯蓉白蒺藜山藥白朮羌活防風聖濟千金散治熱痰壅盛胸膈不利半夏薑汁製蛤粉各半兩甘草凝水石三錢煅上共末水下三錢空心服以利為度一方有羌活七曰潤肺虛陰涸枯燥日至氣不化而成火津以結而成痰是不可以辛散不可以燥奪清之則氣自化潤之則痰自消杏仁煎治燥痰在肺中上氣咳嗽或心胸煩熱杏仁去皮尖三兩生薑汁白蜜飴糖各一兩半桑皮貝母木通各一兩二錢半紫菀五味各一兩上銼碎用水三升熬至半升去滓入前杏仁等四味再熬成膏每服一匕含化一方有款冬知母一方有生地汁紫蘇子節齋化痰丸治郁痰老痰膠固稠黏難於咯唾天門冬片芩酒炒栝蔞仁橘紅海石粉各一兩半香附鹽水炒芒硝桔梗連翹各五錢青黛二錢上為末煉白蜜入薑汁少許和丸櫻桃大細嚼一丸清湯下飲食傷食傷食者飲食自倍腸胃乃傷也當分上中下三焦而治在上吐之在中消之在下奪之羅太無雲大抵內傷之理傷之微者但減食一二日所傷之物自得消化此良法也若傷之稍重者以藥內消之傷之太重者以藥除下之瓜蒂散宿食在上脘用此吐之所謂在上者因而越之也瓜蒂炒赤豆煮各等分上為細末以豉七合煮汁和散一匕服一法溫漿水調服一錢匕取吐為度經云上部有脈下部無脈其人當吐不吐者死謂食塞於上而脈絕於下也何者陽火之根本於地下陰水之源出於天上食塞於上是絕五臟之源源絕則水不下流兩尺脈絕吐去上焦之物而脈自通如不能吐則非食病而是根蒂之先拔故死或以陰陽水三升煮白鹽一升令消分三服刺吐去所食即愈出千金方紅丸子壯脾胃消宿食去膨脹京三稜蓬朮青皮去白陳皮去白各五斤炮姜胡椒各三斤上為末醋面和丸如梧子大礬紅為衣每服三十丸食後薑湯下易簡方有阿魏治食索粉成積方紫蘇濃煎汁加杏仁泥服之即散治食狗肉不消心下堅或腹脹口乾大渴心急發熱狂言妄語或洞下杏仁一升去皮尖研以沸湯三升和絞汁三服狗肉原片皆出淨或以蘆根煮飲之亦消千金治所食不消方取其餘類燒作末酒服方寸匕便吐其宿食即瘥按飲食停滯中脘雖藉藥力為之消磨然所以運行藥力者胃氣也故有屢經消食行氣而食不下者余即於前所用藥內加人參一二錢治之如神學者不可不知備急方治寒飲食過傷心腹卒痛如錐刺川大黃末乾薑末巴豆去皮心研去油用霜上各等分和合一處研勻煉蜜為丸如小豆大溫水下一丸實者加一丸一云每服三丸未知更服三丸腹中轉鳴當吐下便愈東垣導滯丸治傷濕熱之物不得旋化而作痞滿悶亂不安便閉者黃芩茯苓白朮黃連各三錢澤瀉二錢枳實神麯各半兩大黃煨一兩上為末湯浸蒸餅為丸食遠沸湯下五十丸鶴年云傷食與停食宜分兩項傷食者飲食自倍腸胃乃傷病在不及消化停食不論食之多少或當食而怒或當食而病在氣結而不能化也治傷食宜偏重於食或吐或下或消若停食則偏重在氣惟理氣而兼之以消吐下之法不可用也大都傷食當分上中下三焦而停食則專在胃脘也傷酒千金療卒大醉恐腸爛方作湯著大器中漬之冷復易之酒自消夏月亦用之佳又方絞茅根汁飲二升又方搗生葛汁飲之無鮮者乾葛煎服亦佳又方粳米一升水五升煮使極爛漉去滓飲之良葛花解酲湯治酒病嘔逆心煩胸滿不食小便不利青皮三分木香半錢橘紅人參豬苓茯苓各一錢半神麯澤瀉乾薑白朮各二錢白蔻仁砂仁葛花各半兩上為極細末每服三錢白湯調服但得微汗則酒病去矣羅謙甫云夫酒者大熱有毒氣味俱陽乃無形之物也若傷之止當發散使汗出則愈最妙法也其次莫如利小便二者乃上下分消其濕何酒病之有今之治此者乃用酒癥丸大熱之劑下之又用牽牛大黃下之是無形元氣病反傷有形陰血乖誤甚矣不能食不能食者胃中元氣虛也然有虛冷虛熱之異宜分別治之消食丸治數年不能食麥糵曲各一升乾薑炮烏梅焙各四兩上為末蜜丸每服十五丸日再加至四十丸亦治反胃又方神麯炒黃二兩麥糵炒黃二兩烏梅四兩乾木瓜半兩茯苓甘草炙各二錢五分蜜丸櫻桃大每服一丸不拘時細嚼白湯下一方無木瓜有人參乾薑又方豉心一升熬末麥芽曲各一兩熬川椒一升出汗乾薑一升末上五味篩以蜜拌食後酒服方寸匕以上三方並治胃虛冷不能食之劑資生丸健脾開胃消食止瀉調和臟腑滋養營衛白朮米泔水浸用山黃土拌九蒸曬去土切片焙乾用三兩橘紅二兩白茯苓人乳拌飯上蒸曬乾一兩五錢人參人乳浸透飯鍋上蒸透三兩山楂蒸二兩神麯炒二兩白豆蔻微炒澤瀉炒各三錢半川連薑汁炒三錢半桔梗炒藿香甘草蜜炙各半兩扁豆炒一兩蓮肉去心炒一兩麥芽面炒山藥炒芡實炒各一兩五錢薏仁炒三兩上為末煉蜜丸每服二錢細嚼淡鹽湯下凝神散收斂胃氣清涼肌表人參白朮茯苓山藥各一錢半扁豆知母生地黃粳米甘草各一錢淡竹葉地骨皮麥冬各五錢上作一服水二蠱姜三片紅棗一枚煎一盅食遠服高鼓峰云腎為胃之關關門不利升降息矣關門即氣交之中天之樞也故腎旺則胃陰足胃陰足則思食若關門枯槁腎水不能上達當急以六味加歸芍養之若血燥大腸乾枯有黑屎積疊胃底則當以熟地五錢當歸三錢白芍桃仁二錢麻仁三錢微微潤之視其形體如常氣血尚足即於前方內可加大黃二錢助血藥大腸一順利胃自開矣一開之後大劑六味左歸等類不數服之方有濟也以上治胃虛氣熱之劑範汪療胃氣虛不能食四肢重短氣調和五臟並療諸疾調中湯方薤白切一升枳實六枚炙橘皮三枚大棗十二枚粳米三合香豉六合水六升先煮薤白得四升內諸藥煮取一升半適寒溫服一方有生薑一兩延年無枳實有茯苓人參按此以辛甘氣味和暢胃陽推揚穀氣虛者延年方較良本事治脾腎虛弱全不進食二神丸破故紙四兩炒肉豆蔻二兩生用上為細末用大肥棗四十九枚生薑四兩切片同煮棗爛去姜取棗剝去皮核用肉研為膏入藥和杵丸如梧子大每服三十丸鹽湯下有人全不進食服補藥皆不效予授此方服之頓然能食此病不全作脾虛蓋腎氣虛弱真元衰劣譬如金鼎之中置之米穀下無火力雖終日不熟其何能化黃魯直嘗記服菟絲子淘淨酒浸曬乾為末日抄數匙以酒下十日外飲啖如湯沃雪亦此理也寬中進食丸滋形氣喜飲食人參炮姜青皮各一錢大麥牙炒縮砂仁炒炙甘草各一錢半白茯苓橘紅澤瀉白朮各三錢枳實四錢豆蔻五錢豬苓七錢神麯炒木香各五分半夏七錢上為末湯浸蒸餅為丸桐子大每服三十丸米湯送下食前谷勞谷勞者胃受水穀其氣虛弱不能傳化谷盛氣虛則令人怠惰嗜臥肢體煩重腹滿善飢而不能食食已則發穀氣不行使然也沉香湯沉香白朮土炒人參白茯苓紫厚朴薑汁炒各一兩半夏薑製木香草豆蔻甘草陳皮黑乾薑生薑大棗水煎三錢溫服日二肘後云飽食便臥得谷勞病令人四肢煩重嘿默欲臥食畢輒甚用大麥糵一升椒一兩並炒乾薑三兩搗末每服方寸匕日三食亦內經曰大腸移熱於胃善食而瘦謂之食亦夫胃為水穀之海所以化氣味而為營衛者也胃氣和飲食有節氣血盛而膚革充盈若乃胃受邪熱消爍穀氣不能變化精血故善食而瘦也病名食亦言雖食亦若飢也又胃移熱於膽亦名食亦以膽為陽木熱氣乘之則爍土而消穀也甘露飲治胃熱善食不生肌肉生地熟地天冬麥門冬片芩石斛枇杷葉甘草枳殼茵陳各一兩上十味水煎三錢服諸血統論失血諸證妄行於上則吐衄衰涸於內則虛勞妄返於下則便紅積熱膀胱則癃閉尿血滲透腸間則為腸風陰虛陽搏則為崩中濕蒸熱瘀則為滯下熱極腐化則為膿血火極似水則血色紫黑熱勝於陰則發為瘍濕滯於血則發為痛痹癮疹皮膚則為冷痹蓄之在上其人喜狂蓄之在下其人喜忘血出上七竅為血溢大小便下血為血泄然內經云溢則後血是血下出亦可云溢正不必拘也先見血後見痰嗽多是陰虛先見痰嗽後見血多是痰火積熱凡吐衄血太甚不止當防其血暈用茅根燒煙將醋灑之令鼻嗅氣以遏其勢或驀然以冷水噀其面使驚則止血虛眩暈卒倒不可艾灸驚哭叫動動則乘虛而死矣須以當歸川芎白芍熟地黃耆人參白朮茯苓陳皮荊芥穗甘草各七分棗二枚烏梅一個同煎服之凡用血藥不可單行單止又不可純用寒涼必加辛溫升藥如用寒涼藥用酒煎酒炒之類乃寒因熱用也久患血證血不歸元久服藥而無效者以川芎為君則效丹溪凡嘔吐血若出未多必有瘀於胸膈者當先消而去之驟用補法血成瘀而熱多致不起業師薛一瓢先生治陸元賓勞傷吐血後日漸消瘦有時發寒熱飲食減少微有乾咳四肢無力語亦懶師用大當歸一隻重二兩者木器捶松陳酒煎令服三劑以其人素不飲酒改用酒水各半煎果三服而諸病皆愈風熱吐血風陽邪也熱火氣也併入絡中則血溢絡外其證乍寒乍熱咳嗽口乾煩躁者是也宜以辛涼入血之藥治之聖惠荊芥地黃湯荊芥穗為末生地汁調服二錢駱隆吉曰風火既熾當滋腎水此以荊芥發陽邪而以地黃養陰氣也聖濟荊芥穗散荊芥穗山梔仁片芩蒲黃水煎五錢溫服晚再服以瘥為度鬱熱失血鬱熱失血者寒邪在表閉熱於經血為熱迫而溢於絡外也勿用止血之藥但疏其表鬱熱得舒血亦自止若表已解而熱不消血不止者然後以清熱降血之藥治之若肺氣已虛客熱不去咳嗽咽乾吐血嗽血者宜以甘潤養血為主而以辛藥涼肺佐之如大阿膠丸之類寶鑑大阿膠丸阿膠微炒生地黃熟地黃卷柏乾山藥五味子雞蘇葉大薊各一兩茯苓柏子仁另研百部遠志人參麥門冬防風各半兩上為細末煉蜜丸彈子大煎小麥麥門冬湯下一丸食後大薊飲子解鬱熱止吐衄亦治辛熱物傷肺胃嘔吐血名肺疽大薊根洗犀角鎊升麻桑白皮炙蒲黃炒杏仁去皮尖各二錢甘草炙桔梗炒各一兩水二盅生薑五片煎至一盅不拘時服和劑龍腦雞蘇丸治胸中鬱熱咳嗽吐血衄血涼上膈止虛煩雞蘇淨葉一斤即龍腦薄荷生乾地黃末六兩後入麥冬二兩人參二兩阿膠二兩蒲黃二兩木通二兩黃耆一兩柴胡銼同木通以沸湯大半升浸一二宿絞汁後入膏二兩甘草一兩半上為細末以蜜二升先煉一二沸然後下生地黃末不住手攪時時入絞下柴胡木通汁慢慢熬成膏勿令焦然後以其餘藥末同和為丸如豌豆大每服二十丸熱水下側柏散治鬱熱內損心肺吐血下血其出如湧泉口鼻俱流須臾不救服此即安側柏葉蒸乾二兩半荊芥穗燒灰人參各一兩上為末每服三錢入白麵二錢新汲水調如稀糊啜服暑毒失血暑毒失血者脈大氣喘多汗煩渴蓋心主血而暑氣喜歸心也此病多於酒客及陰虛之人有之千金治酒客瘟疫中熱毒乾嘔吐血方蒲黃犀角栝蔞根甘草各二兩桑寄生葛根各三兩水七升煮三升分三服局方枇杷葉散治暑毒攻心嘔吐鮮血香薷二錢厚朴甘草麥冬木瓜茅根各一錢陳皮枇杷葉丁香各五分為末每服二錢姜水煎服蓄熱吐血蓄熱吐血者熱蓄血中因而妄行口鼻皆出熱如湧泉膈上熱胸中滿痛脈洪大弦長按之有力精神不倦或血是紫黑成塊者須用生地黃赤芍茜根牡丹皮三製大黃滑石桃仁泥之屬從大便導之此非釜底抽薪之法不能奪火熱上湧之勢也海藏云畜血喜忘如狂身熱屎黑者疾已甚也但小腹滿小便不利者輕也滑伯仁曰血溢血泄諸蓄血證其始也予率以桃仁大黃行血破滯之劑折其銳氣而後區別治之雖往往獲效然猶不得其所以然也後來四明遇故人蘇伊舉閒論諸家之術伊舉云吾鄉有善醫者忘其姓字每治失血蓄妄必先以快藥下之或問失血復下虛何以當則曰血既妄行迷失故道不去血利瘀則以妄為常曷以御之且去者自去生者自生何虛之有予聞之愕然曰昔者之疑今釋然矣按去者自去生者自生人易知也瘀者未去則新者不守人未易知也細心體驗自見簡要濟眾川大黃一兩末每服一錢以生地汁一合水半盞煎三五沸服無時藕汁茯苓飲生藕汁小薊根汁生地黃汁茯苓蒲黃炒黑後二味等分為末每服二錢用三汁調下按虛人未可下者宜此法清熱且利瘀也按千金云凡吐血後體中但讝讝心中不悶者輒自愈假令煩躁心中悶亂紛紛嘔吐顛倒不安者當急以瓜蒂杜蘅人參等吐去清黃汁或血一二升無苦蓋謂中有瘀血不盡故也然與其湧而上之不若導而下之之為順也吐法昔人且不忌而況於下法乎直指方鮮生地黃搗汁煮飲日數升良四生丸治吐血衄血熱妄行乘於陰也生荷葉生艾葉側柏葉生地黃各等分上搗爛為丸如雞子大每服一丸用水二盅煎一盅去滓服一方有生薄荷葉無荷葉十灰散治嘔吐咳嗽血大薊小薊柏葉荷葉茅根茜根大黃梔子棕櫚皮牡丹皮上各等分燒存性出火毒研為極細末用生藕汁及生蘿蔔汁磨松墨半碗調服五錢即止氣逆失血氣逆失血者血從氣逆得之暴怒而厥也經云陽氣者大怒則形氣絕而血菀於上使人薄厥又怒則氣逆甚則嘔血及飧泄是也必有胸脅滿痛等證宜芍藥陳皮枳殼貝母之屬行其氣而血自下或肝火因氣而逆者必有煩躁燥渴等證宜芍藥生地黃丹皮芩連之屬降其火而血自寧小烏沉湯烏藥去心十兩甘草炒一兩香附子炒用砂盆洗去毛皮然後焙乾二十兩上為細末每服一錢不拘時沸湯點按大怒氣逆必有火熱從之上行宜以黃連青黛香附柴胡甘草山梔等藥平其肝則自愈獨進溫燥寧無偏勝之弊且非古人抑怒全陰之意勞傷吐血勞傷吐血者經所謂用力太過則絡脈傷是也蓋絡脈之血隨經上下往來不休若絡脈有傷損之處其血因得滲漏而出矣如是者須和養血氣安順謹調使損者復完則血脈循行如故所謂勞者逸之是也此等未關臟氣但體性堅凝尚可望其生全若不能如此而或縱情違理絡脈完已復損則必無幸矣發灰散亂髮燒灰每服二錢米醋湯調服亦治小兒尿血治吐血不止將本人血磁鍋焙乾為末每一錢二分以參麥煎湯調下即止凡吐粉紅色痰涎者是肺絡損傷而血滲也治以鮮藕白糯米紅棗三物煎湯頻頻服之久自愈此方系正白旗遲維職所授用之良驗遲公曾任崇明及六合縣系一榜出身三世明醫陽虛失血陽虛失血者脾胃氣虛不能固護陰氣也仁齋直指云血遇熱則宣流故止血多用涼劑然亦有氣虛挾寒陰陽不相為守榮氣虛散血亦錯行所謂陽虛陰必走是耳外證必有虛冷之狀其血色必黯黑而不鮮法當溫中使血自歸經絡可用理中湯加楠木香或甘草乾薑湯其效甚著曹氏云吐血須煎乾姜甘草湯與服或四物理中湯亦可若服生地黃竹茹藕汁去生便遠三因云理中湯能止傷胃吐血以其最理中脘分利陰陽安定血脈也按經云榮氣出於中焦是以脾胃為統血之司而甘溫氣味有固血之用也世醫畏其能動血雖遇當用而不敢用者多矣厥疾不瘳誰之過歟或有仿千金例於伏龍肝甘草乾薑白朮之中加阿膠之潤黃芩之苦以折炎上之勢而復既脫之陰亦內經甚者從之之意也理中湯人參白朮甘草乾薑炮各三兩水八升煮取三升去滓溫服一升日三服甘草乾薑湯甘草炙四兩乾薑炮二兩水三升煮取一升五合去滓分溫再服黑神散和劑黑豆炒半升去皮干熟地酒浸當歸去蘆酒製肉桂去粗皮乾薑炮甘草炙芍藥蒲黃各四兩上為細末每服二錢酒半盞童子小便半盞不拘時煎服凡吐血脈微身涼惡風者須於地黃芍藥中加肉桂一錢虛冷人多有此證傷胃吐血傷胃吐血者酒食過飽胃間不安或強吐之氣脈賁亂損傷心胃血隨嘔出也簡易黑神散治傷酒食醉飽過度胃絡內傷及低頭掬損吐血致多口鼻俱出百草霜不拘多少村居者佳上研細每服二錢糯米湯下喜涼水者新汲水調服鼻衄鼻衄有表寒裡熱之異表寒者傷寒不解而閉熱於經也詳傷寒門裡熱者陽明熱極而血為熱迫也宜犀角地黃湯主之或陽明之熱不得下通而反上壅者宜拔萃犀角地黃湯通其下而上自愈諸衄血家不可與白虎湯虛者亦不可與卒得之腹痛而利者但可溫之羅謙甫云經歷晉才卿膏粱而飲至春病衄易醫數四皆用苦寒之劑俱欲勝其熱而已然終不愈而飲食起居浸不如初肌寒而時躁言語無聲口氣臭穢惡冷風而其衄之餘滴則未絕也彼惟知見血為熱而以苦寒攻之抑不知苦瀉土土脾胃也脾胃人之所以為本者今火為病而瀉其土火固未嘗除而土已病矣土病則胃虛胃虛則榮氣不能滋榮百脈元氣不循天度氣隨陰化而無聲肌寒也粗工嘻嘻以為可治熱病未已寒病復起此之謂也項彥章治一婦患衄三年許醫以血得熱則淖溢與瀉心涼血之劑益困衄出數滴輒昏去六脈微弱而寸為甚曰肝藏血而心主之今寸口脈微知心虛也心虛則不能主血故逆而妄行法當補心兼養脾氣脾者心之子實則心不虛也與琥珀諸補心藥遂安按心虛補脾即千金脾旺則氣感於心之意然補脾藥未議及竊謂當兼補脾陰不當專補脾氣也犀角地黃湯易老云治鼻衄此藥為最勝犀角芍藥丹皮各一錢半生地四錢甘草五分水一盅半煎八分服拔萃加大黃黃連黃芩茅花湯白茅花水煎濃汁兩碗分二服如無花以根代之人參蓮心散人參一錢蓮子心一分共為末以水空心下二錢以瘥為度一方蓮子心五十個糯米五十粒為末酒調服治勞心吐血發灰散發灰一錢人中白炙研五分麝香研一分用少許吹鼻中立愈元珠雞蘇散雞蘇葉黃耆生地阿膠白茅根各一兩麥門冬去心桔梗蒲黃炒貝母去心炙甘草五錢每服四錢姜三片水煎服麥門冬飲子治脾肺虛弱氣促精神短少衄血吐血人參麥門冬當歸各五分五味子五個黃耆甘草芍藥各一錢紫菀一錢五分上㕮咀分作二服水二盞煎至一盞去滓溫服食後一方有生地無甘草芍藥紫菀名清肺飲子齒衄齒衄有手足陽明與足少陰之異蓋手陽明入下齒中足陽明入上齒中而腎主骨齒又為骨之餘也大抵屬陽明者多有餘故有便秘口臭齒齦腫痛等證凡素嗜肥甘或善飲胃強者多有之屬少陰者多不足故口不臭牙不痛雖痛不甚但齒搖不堅凡陰虛羸瘦好色者多有之而宜清宜補為治迥別不可不分也元珠云齒衄多陽明熱盛所致緣手足陽明俱入齒中而衝任二脈並附陽明陽明者多氣多血之經也陽明有熱發則隨經上入齒中血如潮湧疼痛不已甚則昏昧予率用三製大黃末二錢枳殼湯少加童便調下並去黑糞數塊其血頓止要知腎虛出血者其血必點滴而出齒亦悠悠而疼決不如此之暴且甚也東垣清胃飲治醇酒厚味或補胃熱藥太過以致牙疼不可忍牽引頭腦滿面發熱或齦齒腐潰出血不止此陽明火也生地一錢五分升麻當歸牡丹皮犀角連翹各一錢甘草黃連各五分水煎服按陽明熱實上熏口齒者宜此清之若大便閉結不通者須加大黃從下奪之外臺方治滿口齒出血枸杞根洗煎湯漱咽驗元戎地黃引子治腎虛齒衄不止熟地黃生地黃地骨皮枸杞子各等分焙乾為末每服二錢蜜湯調服無時寶鑑用治衄血往來久不愈日三服良安腎丸治腎虛陰火上炎服涼藥而愈甚者宜淡鹽湯送下三五錢間進黑鍚丹方見喘證或用腎氣丸煎服效鶴年舌衄舌衄者舌出血不止也心主血在竅為舌若心臟蘊熱血得熱而妄行或溢於心之竅則有舌上出血之證甚者出如湧泉聖濟阿膠散阿膠炒黃耆蜜炙蒲黃新者一兩共末用生地黃汁空心調下二錢千金方亂髮燒灰水服方寸匕日三服大衄血汗附大衄者口鼻耳目皆出血是也由熱氣乘虛入血則血妄行與衛氣錯溢於竅也阿膠湯主之阿膠湯阿膠蛤粉炒一兩蒲黃五錢水煎去滓入生地黃汁服之急以帛系兩乳神白散治血汗用人中白瓦上炙研末入麝香少許和勻空心酒下二錢一方有發灰聖惠散治大衄久衄及諸竅出血不止人中白一團雞子大綿五兩燒研每服二錢溫水服大便下血統論許學士云予苦疾三十年蓄下血藥方近五十餘品其間或驗或否或始驗而久不應者或初不驗棄之再服有驗未易歷談大抵此病品類不同對病則易愈如下清血色鮮者腸風也血濁而色黯者臟毒也肛門射如血線者脈痔也亦有一種下部虛陽氣不升血隨氣而降者仲景云脈弦而大弦則為減大則為芤減則為寒芤則為虛寒虛相搏此名為革婦人則半產漏下男子則亡血失精此下部虛而下血者是也若是革脈卻宜服溫補藥蟲痔宜熏千金用蝟皮艾者佳予嘗作頗得力黑地黃丸頗佳鶴年結陰便血結陰便血者以風冷之邪結於陰分而然蓋邪在五臟留而不去是之謂結陰邪內結不得行則病歸血分故為便血經曰結陰者便血一升再結二升三結三升正此之謂宜外灸中脘氣海三里以引胃氣散風邪內以平胃地榆湯溫散之劑止之景岳寶鑑平胃地榆湯治邪陷陰分結陰便血陳皮厚朴蒼朮甘草地榆人參白朮當歸芍藥升麻乾葛茯苓神麯乾薑炒香附各等分上㕮咀每服五錢加薑棗煎空心服一方無香附有附子益智仁胃風湯治風冷乘虛入客腸胃水穀不化及下血或下清血或下豆汁久而無度者即八物湯去地黃甘草加官桂等分每服二錢水一大盞粟米百餘粒同煎七分去滓稍熱服蓋亦陰結之類為陰氣內結故去甘寒而加辛熱結者散之也經驗方荊芥一味略炒為末米飲服二錢地榆湯河間曰陰結便血者以陰氣內結不得外行血氣無宗滲入腸下致使漸多此湯治之地榆四兩甘草半炙半生三兩縮砂仁七枚上為末每服五錢水三盞煎至一半去滓溫服濕熱便血濕熱便血者血濁而色黯滑氏所謂足太陰積熱久而生濕從而下流也赤豆當歸散主之若但熱而無濕者腹中痛血色鮮連蒲散主之赤豆當歸散赤小豆三升浸令芽出曬乾當歸十兩上二味杵為散漿水服方寸匕日三服連蒲散生地當歸白芍枳殼川芎槐角黃芩各一錢黃連蒲黃炒各一錢二分水二盅煎八分服泊宅編云乾柿燒灰米飲服二錢本草柿治腸癖解熱毒消宿血又百一選方云曾通判子病下血十年用此方一服而愈王煥之知舒州下血不止郡人陳宜父令其四時取柏葉其方如春取東枝之類燒灰調二錢服之而愈潔古芍藥黃連散治腹痛下血有熱芍藥黃連當歸各半兩大黃一錢淡桂五分甘草炙二錢每服五錢水煎痛甚者調木香檳榔末一錢用淡桂者略借辛溫以助藥力且拔病本也一方平胃散加槐花當歸枳殼烏梅丹溪中虛脫血中者脾胃也脾統血脾虛則不能攝血脾化血脾虛則不能運化是皆血無所主因而脫陷妄行其血色不甚鮮紅或紫或黑此陽敗而然故多無熱證而或見噁心嘔吐宜理中湯溫補脾胃中氣得理血自歸經矣理中湯理物湯即理中四物合劑黃土湯白朮甘草附子地黃阿膠黃芩各三兩灶心黃土半升水八升煮取三升分溫三服腸痔下血本事治腸痔在腹內有鼠奶出血方白蕪荑貫眾狼牙根椿東引枝槐東引枝白皮者各一分白蟮頭一個炙焦雄黃半兩蝟皮一分炙焦上為末臘月豬脂和為丸如彈子大綿裹納下部日三易附方木耳五錢浸一宿洗淨空心生食禁茶湯半日許如嫌淡少加鹽三服必愈但不能除根耳鶴年自試驗過溲血溲血有虛有實實者下焦積熱血為熱迫尿血成淋虛者房勞內作血失統御溺血不已亦有心臟有熱熱乘於血血滲小腸而尿血者當參合脈證治之凡小便血出成淋作痛或雜尿而出者從膀胱中來也如血出不痛者為尿血乃心熱移於小腸血從精竅中來也濟生小薊飲子治下焦結熱之劑生地四兩小薊根滑石通草蒲黃炒淡竹葉藕節當歸山梔仁甘草炙各半兩上㕮咀每服四錢水一盞煎八分空心溫服一方有白茅根阿膠鹿茸散治下元虛憊小便尿血日夜不止之劑鹿茸酒洗去毛塗酥炙令黃當歸焙生地黃焙各二兩蒲黃一合冬葵子炒四兩五錢上為極細末每服三錢匕空心溫酒調服日二一方煉蜜為丸如梧子大每服二十丸食前炒鹽湯下如神散治心臟有熱熱乘於血之劑阿膠蛤粉炒一兩山梔車前子黃芩甘草炙各二錢半上為細末每服半錢或一錢井華水調服日三此方合犀角地黃湯用之良發灰散亂髮燒存性為末每服二錢以醋二合湯少許調服或以側柏葉汁調糯米粉和丸梧子大湯服五十丸鹿角膠丸治房事勞傷小便出血鹿角一兩炒成珠沒藥油發灰各六錢上為末取白茅根汁打糊為丸如梧子大空心鹽湯吞七八十丸
