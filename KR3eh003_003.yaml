body:
  text: 卷三膈噎反胃統論膈隔也飲食入咽不得輒下噎塞膈中如有阻隔之者故名膈噎又其病正在膈間食不得下氣反上逆隨復吐出故又名膈氣反胃者飲食入胃全無阻隔過一二時輒復吐出有反還之意故曰反胃甚者朝食暮吐暮食朝吐有翻傾之義故亦名翻胃不似噎隔之噎然後吐不噎則不吐也噎膈之病有虛有實實者或痰或血附著胃脘與氣相搏翳膜外裹或復吐出膈氣暫寬旋覆如初虛者津枯不澤氣少不充胃脘乾癟食澀不下虛則潤養實則疏瀹不可不辨也飲食下咽不得入胃為噎食不下通氣反上逆為塞東垣乃謂陽氣不得出者為塞陰氣不得降者為噎豈非謂入食從陰而氣出從陽耶其文則深其旨反晦至謂先用陽藥治本後用諸塞瀉標吾不知其何謂矣子和論膈噎纍纍數百言謂三陽結熱前後閉澀下既不通必反上行所以噎食不下夫膈噎胃病也始先未必燥結久之乃有大便祕少若羊矢之證此因胃中津氣上逆不得下行而然乃胃病及腸非腸病及胃也又因河間三乙承氣之治謂噎膈之病惟宜用下結散陽消其疾自愈夫脘膈之病豈下可去雖仲景有大黃甘草東垣有通幽潤腸等法為便祕嘔吐者立然自是食入輒吐之治非所論於食噎不下也獨其所謂慎勿頓攻宜先潤養小著湯丸纍纍加用關扃自透或用苦酸微湧膈涎因而治下藥勢易行設或不行蜜鹽下導始終勾引兩藥相通者其言甚善蓋痰血在脘不行不愈而藥過病所反傷真氣非徒無益矣故以小丸纍加適至病所無過不及以平為期則治噎之道也但須審是痰是血而行之耳膈噎之證大都年逾五十者是津液枯稿者居多若壯年氣盛非血即痰近見有津液枯稿之劑治一少年肥實男子至死不悟哀哉鶴年先嬸傳一方云用燒酒一斤浸海蜇花頭一斤入瓷瓶內埋地數年則海蜇化為水矣取飲半酒杯妙鶴年又識痰膈痰膈因七情傷於脾胃鬱而生痰痰與氣搏升而不降遂成噎膈其病令人胸膈痞悶飲食輒噎不得下入胃中必反上逆而嘔與痰俱出治法宜調陰陽化痰下氣陰陽平均氣順痰下病斯已矣和劑四七湯治喜怒憂思悲恐驚之氣結成痰涎狀如破絮或如梅核在咽喉之間咯不出咽不下此七情所為也中脘痞悶氣不舒快或痰飲嘔逆噁心並皆治之半夏制二錢茯苓一錢六分紫蘇葉八分厚朴薑製一錢二分水一盞生薑七片紅棗二枚煎至八分不拘時服丁沉透膈湯和濟治脾胃不和痰逆噁心或時嘔吐飲食不進十膈五噎痞塞不通並皆治之人參砂仁香附各一兩青皮木香肉豆蔻白豆蔻丁香各半兩陳皮藿香沉香厚朴各七錢五分草果半夏神麯各二錢半甘草一兩五錢麥芽五錢白朮二兩每服四錢水一盞薑三片棗一枚不拘時熱服滌痰丸半夏曲枯礬皂角炙刮去皮弦子元明粉白茯苓枳殼各等分上為末霞天膏如丸量人虛實用之血膈丹溪治一少年食後必吐出數口卻不盡出膈上時作聲面色如平人病不在脾胃而在膈間其得病之由乃因大怒未止輒食麵故有此證想其怒甚則血菀於上積在膈間礙氣升降津液因聚為痰為飲與血相搏而動故作聲也用二陳加香附韭汁蘿蔔子二日以瓜蒂散敗醬吐之再一日又吐痰中見血一盞次日復吐見血一盅而愈一中年人中脘作痛食已乃吐面紫霜色兩關脈澀乃血病也因跌僕後中脘即痛投以生新血推陳血之劑吐血片碗許而愈一中年婦人反胃以四物加帶白陳皮留尖去皮桃仁生甘草酒紅花濃煎入驢尿以防生蟲與數十帖而安一人咽膈間常覺有物閉悶飲食妨礙脈澀稍沉形色如常以飲熱酒所致遂用生韭汁每服半盞日三服至二斤而愈一人食必屈曲下膈梗澀微痛脈右甚澀而關沉左卻和此汙血在胃脘之口氣因鬱而為痰必食物所致詢其去臘日飲㓠剁酒三盞遂以生韭汁冷飲細呷之盡半斤而愈一貧叟病噎膈食入即吐胸中刺痛或令取韭汁入鹽梅滷少許細呷得入漸加忽吐稠涎數升而愈此亦仲景治胸痹用薤白取其辛溫能散胃脘痰涎惡血之義也愚謂此不獨辛溫散結之義蓋亦咸能潤下而酸味最能開膈胃止嘔吐品味不雜而意旨周密殊可取也一婦年及五十身材略瘦小勤於女工得噎膈證半年矣飲食絶不進而大便燥結不行者十數日小腹隱隱然疼痛六脈皆沉伏以生桃仁七個令細嚼杵生韭汁一盞送下片時許病者云胸中略作寬舒以四物六錢加栝蔞仁一錢桃仁泥半錢酒蒸大黃一錢酒紅花一分煎成止藥一盞取新溫羊乳汁一盞合而服之半日後下宿糞若干明日腹中痛止漸可進稀粥而少安後以四物出入加減合羊乳汁服五六十帖而安江應宿治一老婦年近七旬患噎膈胃脘乾燥屬血虛有熱投五汁湯二十餘日而愈其方蘆根汁藕汁甘蔗汁牛羊乳生薑汁少許余各半盞重湯煮溫不拘時徐徐服滋血潤腸湯治血枯及死血在膈飲食不下大便燥結當歸酒洗三錢芍藥煨生地黃各一錢半紅花酒洗桃仁去皮尖炒大黃酒煨枳殼麩炒各一錢水一盅半煎七分入韭菜汁半酒盞食前服秦川剪紅丸良方雄黃另研木香各五錢檳榔三稜煨蓬朮煨貫仲去毛乾漆炒煙盡陳皮各一兩大黃一兩半上面和丸梧子大每五十丸食前米飲送下吐出瘀血及下蟲為效氣膈氣膈病使人煩悶食不下時嘔沫淳于意作下氣湯治此疾一日氣下二日能食三日愈然下氣湯方不傳一村夫因食新筍羹咽納間忽為一噎延及一年百藥不效王中陽乃以蓽茇麥芽炒青皮去穰人參苦桔梗柴胡白蔻楠木香高良薑半夏曲共為末每服一錢水煎熱服次日病家報云病者昨已痛極自己津唾亦咽不下服藥幸納之胸中沸然作聲覺有生意敢求前劑況數日不食特遊氣未盡擬待就木今得此藥可謂還魂散也王遂令其搗碎米煮粥將熟即入藥再煎一沸令啜之一吸而盡連服數劑得回生因名曰還魂散食之以治七情致病吐逆不定面黑目黃日漸瘦損傳為噎證者多驗但忌油膩魚腥黏滑等物永類鈐方治噎膈不食黃犬干餓數日用生粟或米干飼之俟其下糞淘洗米粟令淨煮粥入薤白一握泡熟去薤入沉香末二錢食之救急療氣噎方半夏柴胡各三兩生薑三兩羚羊角犀角桔梗昆布通草炙甘草各二兩水八升煮三升分三服療因食即噎塞如炙臠在膈不下方射干六分升麻四分桔梗四分木通一錢赤苓八分百合八分紫菀頭二十一枚水二大升煎九合去渣分溫三服食遠蟲膈張文仲備急方言幼年患反胃每食羹粥諸物須臾吐出貞觀中許奉御兄弟及柴蔣諸名醫奉敕調治竟不能療漸疲困候絶旦夕忽一衛士云服驢小便極效遂服二合後食只吐一半晡時再服二合食粥便定次日奏知宮中五六人患反胃者同服一時俱瘥此物稍有毒服之不可過多須熱飲之病深者七日當效後用屢驗廣五行記永徽中絳州有僧病噎數年臨死遺言令破喉視之得一物似魚而有兩頭遍體悉是肉鱗致鉢中跳躍不止以諸味投鉢悉為水時寺中刈藍作靛試取少許置鉢中蟲繞鉢畏避須臾蟲化為水後人以靛治噎疾每效治梅核膈氣方取半青半黃梅子每個用鹽一兩淹一日夜曬乾又浸又曬至水盡乃止用青線三個夾二梅麻線縛定通裝瓷罐內封埋地下百日取出每用一梅含之咽汁入喉即消收一年者治一人收二年者治二人其妙絶倫昆布丸治五噎咽喉妨塞食飲不下昆布洗麥門冬天門冬並去心焙訶黎勒去核各一兩五錢木通川大黃微炒川朴硝郁李仁湯浸去皮微炒桂心百合各一兩羚羊角屑杏仁去皮尖麩炒黃蘇子微炒射干各五錢柴胡去蘆陳皮去白檳榔各二錢半上為細末煉蜜和搗三百杵丸如梧子大每服三十丸不拘時熱酒送下夜飯後用綿裹彈子大一丸噙化雜療方普濟方云反胃吐食藥物不下結腸三五日至七八日大便不通如此者必死昔金州周禪師得正胃散方於異人十痊八九君子收之可濟人命用白水牛喉一條去兩頭節並筋膜脂肉及如阿膠黑片臨時旋炙用米醋一盞浸之微火炙乾淬之再炙再淬醋盡為度研末厚紙包收或遇陰濕時微火烘之再收遇此疾每服一錢食前陳米飲調下輕者一服立效集驗療反胃朝食暮吐暮食朝吐方羊肉去脂膜作脯以好蒜齏空腹任意食之立見效驗聖濟總録治咽喉妨礙如有物吞吐不利方杵頭粳人參各一錢石蓮肉炒二錢水煎服日三次虛勞統論虛勞一曰虛損蓋積勞成虛積虛成弱積弱成損也虛者空虛之謂損者破散之謂虛猶可補損則罕有復完者矣古有五勞五蒸六極七傷之名而不一其説然五勞者主五臟心勞肝勞脾勞肺勞腎勞是也五蒸者主軀體膚蒸肉蒸脈蒸筋蒸骨蒸是也六極者氣極血極筋極肌極精極骨極合內外兼陰陽者也七傷者大飽傷脾大怒氣逆傷肝極力舉重久坐濕地傷腎形寒飲冷傷肺憂愁思慮傷心大恐懼不節傷志風雨寒暑傷形合形臟神而言者也外此所謂志勞憂勞瘦勞思勞及陰寒陰痿裡急精速等為七傷者皆非也損證有自上至下者有自下至上者而皆以中氣為主故難經一損損於肺皮聚而毛落二損損於心血脈虛弱不能榮於臟腑婦人則月水不通三損損於胃飲食不為肌膚此自上而下者也一損損於腎骨痿不能起於床二損損於肝筋緩不能自收持三損損於脾飲食不能消克此自下而上者也機要云虛損之疾寒熱因虛而感也感寒則損陽故損自上而下治之宜以辛甘淡過於胃則不可治也感熱則損陰故損自下而上治之宜以苦酸鹹過於脾則不可治也夫脾胃居中而運水穀脾胃氣盛四臟雖虛猶能溉之不然則四臟俱失其養矣得不殆乎故曰過於脾胃者不治治損之法莫善於難經謂損其肺者益其氣損其心者調其榮衛損其脾者調其飲食適其寒溫損其肝者緩其中損其腎者益其精蓋肺主氣益之使充也心主血而營衛者血之源和之使無偏也脾運水穀而主肌肉調之適之毋困其內亦無傷其外也肝苦急緩之使疏達也腎主精益之使不匱也後人不辨損在何臟概與養陰清火術亦疏矣陳藏器諸虛用藥凡例本出千金此在初學殊足以為準則若夫得心應手神明變化端不在此區區形迹間也虛勞營衛不足虛勞營衛不足者脈極虛芤遲短氣裡急四肢痠疼腹中痛或悸或衄或手足煩熱咽乾口燥宜甘酸辛藥調之甘以緩急酸以養陰辛以養陽也小建中湯方白芍六兩甘草桂枝生薑各三兩大棗十二枚膠飴一升虛甚者加黃耆一兩半上六味以水七升煮取三升去滓內膠飴更上微火消解溫服一升日三服深師治虛勞腹滿食少泄瀉者無膠飴有人參二兩半夏一升必效方治虛勞失精加龍骨白蘞各一兩古今録驗治虛勞裡急小腹急痛氣引胸脅或心痛短氣以乾薑代生薑加當歸四兩經云肝生於左肺藏於右心位在上腎處在下脾居四臟之中生育營衛通行津液一有不調則失所育所行矣必以此湯溫健中臟故名建中中臟者脾胃也脾欲緩急食甘以緩之故以飴糖為君甘草為臣桂枝辛熱散也潤也營衛不足潤而散之芍藥酸寒收也泄也津液不足收而行之故以芍桂為佐生薑辛熱大棗甘溫胃者衛之源脾者營之本衛不足益之必以辛營不足補之必以甘甘辛相合脾胃健而營衛通故以薑棗為使也大建中湯方治內虛里結少氣手足厥冷小腹攣急或腹滿弦急不能食起即微汗陰縮或腹中寒痛或唇口乾精自出或手足乍寒乍熱而煩冤痠疼不能久立多夢失精黃耆當歸桂心芍藥各二錢人參甘草各一錢半夏黑附子炮各二錢半每服五錢水二盞薑三片棗二枚煎一盞去滓食前溫服本方加白朮蓯蓉麥冬川芎熟地茯苓名十四味建中湯皆補益營衛之劑也炙甘草湯治虛勞不足汗出而悶脈結悸行動如常不出百日危急者十一日死炙甘草四兩桂枝生薑各三兩麥冬去心麻仁各半升人參阿膠各二兩大棗三十枚生地黃一斤上九味以酒七升水八升先煮八味取三升去滓內膠消盡溫服一升日三服朱雀湯治勞傷心氣變生諸疾雄雀一隻取肉炙赤小豆一合人參赤苓紫石英小麥大棗肉各一兩紫菀遠志丹參各半兩炙甘草二錢半上細銼拌勻每服三錢用水一盞煎六分去滓食遠溫服奇效方肺勞肺勞者呼吸少氣咳嗽喘急嗌乾氣極則皮毛焦乾津枯力乏腹脹喘鳴由預事而憂或風邪久住而成宜分邪正冷熱而治之紫菀湯治氣極皮毛焦枯四肢無力喘急短氣不足以息紫菀茸洗乾薑炮黃耆人參五味子鍾乳粉杏仁麩炒去皮甘草炙各等分上㕮咀每服四錢水一盞薑三片棗一枚煎服無時葛可久保和湯治風寒久嗽成勞及肺燥成痿者服之決效知母貝母天冬麥冬款冬各三錢花粉薏仁杏仁炒去皮尖各二錢粉草炙紫菀五味子馬兜鈴百合桔梗各一錢阿膠生地黃當歸紫蘇薄荷各五分生薑三片上水煎入飴糖一匙服三日三服食後進一方無地黃有百部若血盛加薄黃茜根藕節大薊茅花根痰盛加半夏橘紅茯苓枳實炒栝蔞喘甚加桑白皮陳皮葶藶子蘇子熱盛加山梔炒黑黃連黃芩連翹風熱加防風金沸草甘菊花寒甚加桂枝五味子臘月加乾薑心勞心勞者恍惚驚悸少顏色熱則煩心口乾溺澀寒則內栗夢多恐怖由曲運神機而成熱則清之寒則溫之養血安神則一也遠志引子治心勞虛寒夢寐驚悸遠志去心茯神去木肉桂人參棗仁炒黃耆當歸各一兩甘草炙半兩上㕮咀每服四錢水一盞薑五片煎服無時麥門冬湯治心勞虛熱唇口赤煩渴溺澀麥門冬去心遠志甘草煮去心人參黃芩生地黃茯神石膏煅各一兩甘草炙半兩煎服法同前腎勞腎勞之證面黑足冷耳聾膝軟腰痛少腹拘急小便不利八味腎氣丸主之此為腎臟不足內生寒冷王太僕所謂腎虛則寒動於中也八味腎氣丸方熟地黃八兩萸肉山藥各四兩牡丹皮建澤瀉白茯苓各三兩附子制肉桂各一兩上為末煉蜜丸如桐子大每服七八十丸空心滾湯下本方加五味子鹿茸名十補丸本方去附子加五味子二兩名加減八味丸薯蕷丸補丈夫一切病不能具述方薯蕷枸杞子續斷茯苓牛膝菟絲子巴戟杜仲各一兩蓯蓉二兩五味子山萸肉蛇床子各一兩上為散酒調方寸匕日三夜二禁醋蒜治腎勞精敗面黑方肉蓯蓉四兩水煮令爛薄細切研精羊肉分為四度下五味以米煮粥空心食聖濟總録許學士本事方唐鄭相國云豫為南海節度使時年七十有五粵地卑濕傷於內外衆疾俱作陽氣衰絶乳石補益之藥一切不應元和七年有訶陵國舶主獻此方經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京録方傳之其方用破故紙十兩揀洗為末用胡桃肉去皮二十兩搗如泥即入前藥末更以好煉蜜和勻如飴盛瓷器中且日以溫酒化藥一匙服之不飲酒溫熱水化下彌久則延年益氣悅心明目補益筋骨但禁食蕓薹羊血蕃人呼為補骨脂丸脾勞脾勞之證食不化心腹痞滿嘔吐吞酸面色痿黃甚者心腹常痛大便泄利手足逆冷骨節痠疼日漸消瘦由脾胃久積風冷之氣所致亦名冷勞木香豬肚丸主之木香豬肚丸方木香附子郁李仁乾薑陳皮麥冬各一兩肉豆蔻一兩熟艾鱉甲柴胡神麯各二兩厚朴薑水炒三兩鍾乳粉桂心各五錢共末用雄豬肚一具去脂膜切細入好米醋三升煮爛研細入末搗和丸梧子大空心溫酒米飲任下二十丸千金治虛補勞方羊肚一具切白朮一升上二味以水二斗煮取六升每服二升日三又方豬肚一具人參五兩蜀椒乾薑各二兩半蔥白七兩白粱米半升上六味㕮咀諸藥令相得和米內肚中縫合勿令泄氣取四斗半水緩水煮爛空腹食之大佳兼下少飯濟生白朮湯治脾勞虛寒嘔吐不食腹痛泄瀉胸滿善噫人參白朮草果肉豆蔻麵裹煨熟厚朴陳皮木香麥芽各一兩炙草半兩每服四錢水一盞薑五片棗一枚煎服無時風勞風勞之證肌骨蒸熱寒熱往來痰嗽盜汗黃瘦毛焦口臭或成疳利由風邪淹滯經絡瘀鬱而然其病多著於肝亦名肝勞寶鑑秦艽鱉甲散鱉甲一兩醋炙柴胡地骨皮秦艽知母當歸各半兩上為粗末每服半兩水一盞入烏梅一枚青蒿五葉同煎至七分去滓溫服臨臥空心各一服如嗽多可加阿膠麥冬五味元戎有桃柳枝各七個薑三片為柴胡鱉甲散大便硬者服之大便溏者半氣半血服逍遙散元珠云體虛之人最易感於邪氣當先和解微汗微利之從其性而治之次則調之醫者不知邪氣加於身而未除便行補劑邪氣得補遂入經絡往往至死不可不知也柴胡飲子太無人參黃芩炙草大黃芍藥柴胡當歸各半兩每服四錢水薑煎溫服麥煎散治少男室女骨蒸黃瘦盜汗肌熱口臭婦人血風攻疰四肢方見發熱門良方團魚丸治骨蒸勞嗽纍效貝母前胡知母杏仁各一兩柴胡半兩用團魚二個同煮熟取肉連汁食之將藥焙乾為末再以團魚骨甲煮汁一盞和藥丸梧子大每服二三十丸煎黃耆六一湯空心送下病既安仍服黃耆六一湯方調理廣濟療骨蒸肺熱每至日晚即惡寒壯熱頰色微赤不能下食日漸羸瘦方生地黃三兩切蔥白一把香豉二兩炙甘草五錢童子小便二升上五味以地黃等於小便中浸一宿平晨煎兩沸絞去滓澄取一升二合分溫二服相去如人行七八里服一劑瘥止直指全鱉丸此與良方團魚丸治同知母貝母杏仁浸去皮各三兩柴胡二兩川芎一兩當歸明阿膠炒酥各半兩上粗截入厚瓷器中用中等活鱉一個生宰去頭以鱉肉並血並藥用醇酒五升同浸一宿密紙封次早慢火同煮香熟令病者隨意食之只留鱉甲併骨並藥焙乾為末以浸藥酒汁調米粉為糊丸桐子大每七十丸米飲下傷寒餘熱未盡或失於調攝致咳嗽寒熱吐血衄血纏綿日久狀如勞瘵此皆元氣虛邪氣留著例用養氣生血藥兼小柴胡青蒿鱉甲或前胡犀角石膏等隨證加減無有不愈者切不可純用補劑亦不可誤認虛損勞怯輕用杜仲熟地山萸等溫補之藥也熱勞熱勞者因虛生熱因熱而轉虛也其證心神煩躁面赤唇焦身熱氣短或口舌生瘡是也明醫雜著云人之一身陽常有餘陰常不足況節欲者少過欲者多精血既虧相火必旺火旺則陰愈消而勞瘵咳嗽咯血吐血等證見矣故宜常補其陰使陰與陽齊則水能制火而水升火降斯無病矣補陰丸方黃柏去皮酒炒褐色知母去皮毛酒炒龜板酥炙透各三兩杞子鎖陽酥炙乾白芍酒炒天冬去心各二兩熟地酒蒸五兩五味一兩乾薑炒紫色三錢冬用五錢上為末入煉蜜及豬脊髓三條和勻杵丸桐子大每服八九十丸空心淡鹽湯送下寒月可用溫酒下丹溪原方有陳皮牛膝當歸虎骨無杞子天冬五味乾薑用酒煮羊肉為丸瓊玉膏治虛勞乾咳生地黃四斤茯苓十二兩人參六兩白蜜一斤上先將生地黃熬汁去滓入蜜煉稠再將參苓細末和入瓷罐封水煮半日白湯化服臞仙加琥珀沉香各五錢按虛勞之人氣血多有郁聚之處故雖形衰氣少而脅下迫塞不得左右臥者虛中有實也臞仙於滋補之中寓通行之意如張僧繇畫龍一經點睛通體皆靈而用之者往往獲效是豈徒參地苓蜜之力哉大造丸紫河車一具米泔水洗淨少加酒蒸極爛以山藥末搗和焙乾敗龜板酥炙一兩天冬麥冬各一兩二錢熟地二兩半夏加五味七錢上除熟地另杵外共為末用酒煮米糊同熟地搗膏丸桐子大或蜜丸亦可每服八九十丸空心臨臥鹽湯下冬月酒下婦人去龜板加當歸二兩大補天丸治勞婦虛損勞傷形體羸瘦腰痛疼痛遺精帶濁紫河車初胎者一具米泔浸淨入小砂罐內加水一碗煮沸候冷取起放竹籃中四圍用紙糊蜜烘乾為末知母乳炒龜板酥炙各三兩黃柏蜜炙三兩熟地五兩搗肉蓯蓉牛膝麥冬山藥炒虎脛骨酥炙黃耆蜜炙茯神各一兩半杜仲何首烏人參白芍各一兩枸杞二兩生地酒洗天冬當歸北五味各一兩冬加乾薑半兩炒焦上為細末用豬脊髓三條蒸熟加煉蜜和搗為丸桐子大每服八十丸空心淡鹽湯下冬月酒下治骨蒸便溏口渴方青蒿烏梅秦艽甘草小麥水煎服草還丹治陰虛骨蒸青蒿一斗五升童便三斗文武火煎約童便減至二斗去青蒿再煎至一升入豬膽七個再熬數沸用甘草末收和為丸梧子大每服五十丸又方鮮地骨皮三錢紅棗七枚煎湯代茶日一劑治骨蒸神效若治童勞加燕窩一錢鶴年黃耆鱉甲煎治虛勞客熱肌肉消瘦四肢倦怠五心煩熱口燥咽乾頰赤心忪日晡潮熱夜有盜汗胸脅不利減食多濁咳唾稠黏時有膿血黃耆知母桑白皮炙甘草赤芍藥紫菀各五錢半地骨皮秦艽白茯苓生地柴胡各六錢六分肉桂人參苦桔梗各三錢三分鱉甲酥炙天冬各一兩半夏五錢上為粗末每服三錢水一盞煎至七分去滓食後溫服一名人參黃耆散乾血勞乾血血瘀而干也瘀則生熱內傷肝肺發熱咳嗽日以益甚不已則成勞金匱所謂經絡營衛氣傷內有乾血肌膚甲錯兩目黯黑者是也大黃蟅蟲丸大黃二兩五錢黃芩二兩甘草三兩桃仁一升杏仁一升虻蟲一升蟅蟲半升蠐螬百枚芍藥四兩乾地黃十兩乾漆一兩水蛭百枚上為末蜜丸小豆大酒服五丸日三服王念西云虛勞發熱未有不由瘀血者而瘀血未有不由內傷者人之起居飲食一有失節便能成傷瘀積之血牢不可拔新生之血不得周灌與日俱積其人尚有生理乎仲景施活人手眼以潤劑濡乾血以蠕動啖血之物行死血死血既去病根以鏟而後可以從事於滋補矣陳大夫百勞丸可與此互用喻嘉言曰此世俗所稱乾血勞之良治血結在內手足脈必相失宜服此方然必兼大補劑瓊玉膏之類服之按相失者不相得也血結脈不通使然陳大夫百勞丸治一切勞瘵積滯疾不經藥壞者宜服錦紋大黃去皮及黑心四錢乳香沒藥當歸各一錢人參二錢桃仁去皮尖另研如泥虻蟲水蛭各十四枚炒上為極細末煉蜜丸桐子大都作一服可百丸五更用百勞水下取惡物為度服白粥十日按都作一服服當作劑劑量也量病之輕重而制其大小也云取惡物為度則非一服令儘可知傳尸勞張雞峰云傳尸勞者緣尸疰及挾邪精鬼氣而成者也大概寒熱淋露沉沉默默不的知其所苦而無處不惡積年纍月漸就委頓即死之後又復傳易他人者是也茲須以通神明去惡氣諸藥治之百一選方治傳尸勞天靈蓋三錢酥炙黃為末稱鱉甲極大者醋炙黃為末稱一兩九肋者更妙桃仁二錢五分去皮尖研青蛇腦小豆許酥炙色轉為度無蛇腦亦得虎糞內骨安息香半兩以上為末絹篩篩過檳榔二錢半別為細末麝香一錢別研青蒿取近梢三四寸細銼六兩豉三百粒楓葉二十一片蔥根二十一個拍破童便半升桃柳李桑東引枝各七莖長七寸如著頭大細銼上先將青蒿桃李桑枝楓葉蔥豉以官升量水三升煎至半升去滓入安息香天靈蓋虎糞內骨鱉甲桃仁童便同煎取汁去滓有四五合將檳榔麝香同研勻調作一服早晨溫服以被覆出汗恐汗內有細蟲以帛拭之即焚此帛相次須瀉必有蟲下如未死以大火焚之並棄長流水內所用藥切不可令病人知之日後亦然十來日後氣體復原再進一服獺肝散獺肝一具陰乾杵末飲服方寸匕日三未愈再服肘後云此方甚效寶鑑紫河車丸治傳尸勞服三月必平復其餘勞症須數服神效紫河車一具用米泔水浸一宿洗淨焙乾鱉甲酥炙桔梗去蘆胡黃連芍藥大黃敗鼓皮心醋炙貝母去心龍膽草黃藥子知母各二錢半芒硝犀角蓬朮各一錢半硃砂研二錢上為細末煉蜜丸如梧子大硃砂為衣食前溫酒服二十丸如膈熱食後服重病不過一料發熱統論有表而熱者謂之表熱無表而熱者謂之裡熱故苦以治五臟五臟屬陰而居於內辛者以治六腑六腑屬陽而居於外故曰內者下之外者發之飲食勞倦為內傷元氣元氣傷則真陽下陷內生虛熱故東垣發補中益氣之論用人參黃耆等甘溫之藥大補其氣而提其下陷此用氣藥以補氣之不足者也勞心好色內傷真陰陰血既傷則陽氣偏勝而變為火矣此謂陰虛火旺勞瘵之症故丹溪發陽有餘陰不足論用四物加黃柏知母補其陰而火自降此用血藥以補血之不足者也益氣補陰皆內傷症也一則因陽氣之下陷而升提之一則因陰火之上升而滋降之一升一降迥然不同矣節齋平日發熱熱在行陽之分肺氣主之故用白虎湯以瀉氣中之火日晡潮熱熱在行陰之分腎氣主之故用地骨皮散以瀉血中之火白虎湯治脈洪故抑之使秋氣得以下降也地骨皮散治脈弦故舉之使春氣得以上升也治熱之法有五一曰和二曰取三曰從四曰折五曰奪假令小熱之病當以涼藥和之和之不已次用取為熱勢稍大當以寒藥取之取之不已次用從為熱勢既甚當以溫藥從之謂藥氣溫也味隨所為或以寒因熱用味通所用或寒以溫用或以汗發之不已又用折為病勢極甚當以逆制之制之不已當以下奪之下奪之不已又用屬為求其屬以衰之緣熱深陷在骨髓無法可出針藥所不能及故求屬以衰之求屬之法是同聲相應同氣相求之道也如或又不已當廣求其法而治之譬如孫子之用兵在山谷則塞淵泉在水陸則把渡口在平川廣野當清野千里塞淵泉者刺俞穴把渡口者奪病發時前清野千里如肌羸瘦弱當廣服大藥以養正勞倦發熱勞倦發熱者積勞成倦陽氣下陷則虛熱內生也其症身熱心煩頭痛惡寒懶言惡食脈洪大而空狀類傷寒切戒汗下但服補中益氣湯一二服得微汗則已非正發汗乃陰陽氣和自然汗出也補中益氣湯黃耆蜜炙錢半人參炙甘草一錢白朮土炒陳皮當歸各五分升麻柴胡各三分加薑三片棗三枚水煎本方加芍藥五味名調中益氣湯火鬱發熱火鬱者陽氣為外寒所遏不得宣行鬱而成火或因胃中過食冷物郁遏陽氣於脾土之中令人心煩手足心熱骨髓中熱如火燎此為鬱熱經云火鬱則發之東垣火鬱湯升麻葛根白芍藥柴胡根各一兩防風炙草各五錢上㕮咀每服三四錢水二大盞入連須蔥白三寸煎去滓稍熱服血虛發熱血虛發熱亦從勞倦得之東垣云飢困勞役之後肌熱煩躁困渴引飲目赤面紅晝夜不息其脈大而虛按之無力經云脈虛則血虛血虛則發熱症象白虎惟脈不長實為辨也誤服白虎旬日必變當歸補血湯黃耆一兩當歸二錢生地黃五錢生草一錢上一服水煎溫服食前陽浮發熱陽氣虛浮其端有二或脾胃氣虛陽浮於外其症上見嘔惡下為溏泄其脈大而不實身雖大熱切忌寒涼宜甘辛溫藥溫其中使土厚則火自斂也或腎虛火不歸經遊行於外其症煩渴引飲面赤舌刺唇黑足心如烙或冷如冰其脈洪大無倫按之微弱宜八味腎氣丸之屬導火下行也理中湯八味腎氣丸方見虛勞門王肯堂云相火寄於命門命門者男子以藏精女子以系胞因嗜欲竭之火無所附故厥而上行桂附與火同氣而其味辛能開腠理致津液通氣道據其窟宅而招之同氣相求火必降下矣且火從腎出者是水中之火也火可以水折而水中之火不可以水折故巴蜀有火井焉得水則熾得火則熄則桂附者固治浮遊相火正劑歟痰積發熱積痰發熱者其脈弦滑其證胸膈痞塞背心疼痛活人書所謂中脘有痰令人憎寒發熱狀類傷寒但頭不痛項不強為異瘀血作熱瘀血發熱者其脈澀其人但漱水而不欲咽兩腳必厥冷少腹必結急是不可以寒治不可以辛散但通其血則發熱自止當歸承氣湯當歸大黃各四錢芒硝甘草各二錢上㕮咀入薑煎一方無芒硝有芍藥名清涼飲子骨蒸熱骨蒸熱者熱伏於內而氣蒸於外也其症肌熱盜汗黃瘦口臭久而不愈此骨髓伏熱營衛不通之所致也少男室女多有此證麥煎散方見虛勞門柴胡梅連散治骨蒸勞熱久而不愈三服除根其效如神柴胡人參黃芩甘草胡黃連當歸芍藥各半兩上為末每服三錢童便一盞烏梅一個豬膽五匙豬脊髓一條韭根半錢水一盅同煎至七分去滓溫服無時原方有前胡無人參黃芩甘草當歸芍藥余蓋從柴胡飲子增入以備補虛瀉熱之用去前胡者不欲重散也食積酒毒發熱食積者當暮發熱惡聞食臭時時噯腐其脈滑或實活人所謂傷食令人頭痛脈數發熱但左手人迎脈平和身不疼是也酒毒者脈數溺赤經云酒氣與穀氣相搏熱盛於中故熱遍於身內熱而溺赤是也加味越鞠丸蒼朮神麯香附黑山梔撫芎針砂山楂上為末糊丸酒煮黃連丸黃連八兩用酒二升入瓦罐內重湯煮爛取出曬乾為末滴水丸桐子大每五十丸食前溫水下分治臟腑上下血氣諸熱錢氏瀉青丸治肝熱當歸焙龍膽草川芎山梔羌活防風大黃上為末蜜丸雞頭子大每服一丸一方彈子大竹葉湯化下一丸龍薈丸治肝臟積熱當歸焙龍膽草梔子黃連黃柏黃芩各一兩大黃蘆薈青黛各半兩木香二錢半麝香五分別研上為末煉蜜丸如小豆大小兒如麻子大每二十丸生薑湯下外臺麥門冬飲療心勞不止口赤乾燥心悶肉毛焦色生麥冬一升去心陳粟米一升雞子白二七枚淡竹葉三升切上先以水一斗煮粟米竹葉取九升去滓澄清接取七升冷下雞子白攪五百轉去上沫下麥門冬煮取三升分三服濟生黃芩湯治心熱口瘡煩渴小便不利生地木通甘草黃連黃芩麥冬梔仁澤瀉每服四錢水一盞薑三片煎服無時瀉黃散治脾熱口臭咽乾目黃藿香葉七錢山梔一兩石膏半兩防風四兩甘草二兩上銼同蜜酒拌微炒香為末每服二錢水一盞煎清汁飲外臺療脾熱方石膏一斤碎綿裹生地汁一升淡竹葉切五升赤蜜一升水一斗二升煮竹葉取七升去滓內石膏取一升五合去滓下地黃汁兩沸下蜜煎取三升細細服瀉白散治肺熱桑白皮炒黃地骨皮各一兩甘草炙半兩上為末每服二三錢水一盞入粳米百粒煎食後服易老加黃連海藏云加山梔黃芩方能瀉之東垣滋腎丸治腎熱黃柏三兩知母二兩桂一錢半上為末熟水丸桐子大每七八十丸至百丸食前百沸湯下外臺三黃湯治腎熱大小便祕塞耳鳴色黑大黃切別漬水一斗黃芩芒硝各三兩梔子十四枚甘草炙一兩上以水四升先煮三物取一升五合去滓下大黃更煎兩沸下芒硝分三服外臺梔子煎治膽實熱精神不守梔子二十一枚甘竹茹一兩炒香豉六合大青橘皮各一兩赤蜜三合水六升煎取一升七合去滓下蜜更上微火煎兩沸分再服導赤散治小腸實熱小便赤澀而渴生地黃木通甘草各等分上為末每服三錢水一盞入竹葉七片同煎至五分食後溫服丹溪云導赤散正小腸藥也瀉白湯治大腸實熱腹脹不通挾臍痛食不化口生瘡喘不能久立淡竹葉黃芩梔子仁柏皮炙各半兩茯苓芒硝各一兩生地黃三兩橘皮半兩上銼每四錢入薑棗煎空心服千金竹葉湯治胃熱竹葉小麥各一升知母石膏各三兩黃芩茯苓麥冬各二兩人參一兩生薑五兩栝蔞根半夏甘草各一兩生上㕮咀以水一斗煮竹葉小麥取八升去滓內諸藥煮取三升分三服老小分五服千金地黃煎生地黃汁四升三合茯神知母葳蕤各四兩栝蔞根五兩竹瀝三合生薑汁白蜜生麥冬汁生地骨皮汁各一升石膏八兩上以水一斗二升先煮諸藥取三升去滓下竹瀝生地黃麥冬汁微火熬四五沸下蜜薑汁微火煎取六升初服四合日三夜一加至六合夏月作散服之東垣云發熱而不能食自汗短氣者虛也以甘寒之劑瀉熱補氣能食而熱口舌乾燥大便難者以辛苦大寒之劑下之瀉熱補水當細分之不可概論涼膈散治上焦積熱煩躁面赤頭昏咽痛喉痹口瘡頰腫便溺祕赤譫妄睡臥不安一切風壅新薄荷連翹黃芩梔子甘草各一兩半大黃芒硝各半兩上末每服二三錢竹葉七片蜜三匙煎食後服與四物各半服能益血泄熱名雙和散本事加赤芍乾葛治諸熱病纍效玉機云輕者宜桔梗湯本方去硝黃加桔梗舟楫之品浮而上之去膈中無形之熱且不犯下二焦也八正散治下焦積熱二便祕澀口渴咽乾舌瘡血淋大黃瞿麥木通滑石萹蓄車前子山梔甘草各等分上為末每服二錢入燈芯水煎服通膈丸本事治上焦虛熱肺脘咽膈有氣如煙搶上人參川黃連茯苓各三兩硃砂一分真片腦少許上為細末研勻煉蜜丸如梧子大熟水下三五丸日二三服四順清涼飲子治血分熱大黃蒸甘草炙當歸芍藥各等分上㕮咀每服五錢用水一盞半薄荷十葉同煎至七分去滓溫服潔古云涼風至而草木實清涼飲子乃秋風撤熱之劑也海藏桔梗湯治氣分熱桔梗連翹山梔薄荷黃芩酒炒甘草各等分上為粗末竹葉白水煎溫服汗之熱服惡寒惡寒有陽虛陽郁之異陽虛者宜補而溫之陽郁者宜開發上焦以升陽明之氣丹溪所謂久病惡寒當用解鬱是也桂枝加人參附子湯治陽虛腠理不固惡寒自汗其脈浮虛桂枝白芍各一兩半甘草炙一兩附子炮半個人參一兩半每服五錢生薑三片棗一枚水煎服陽郁治案進士周年近四十得惡寒證服附子數百帖而病益甚脈弦而緩遂以江茶入生薑汁香油些少調飲之吐痰一升許減大半又與通聖散去麻黃硝黃加當歸地黃百帖而安一女子惡寒用苦參赤小豆各一錢為末齏水調飲之吐痰甚多繼用南星川芎蒼朮黃芩酒打面為丸服愈元珠云上焦不通則陽氣抑遏而皮膚分肉無以溫之故寒栗東垣升陽益胃湯用升發之劑開發上焦以升陽明之氣出於表而溫之也丹溪吐出濕痰亦開發上焦使陽氣隨吐伸發出外而溫之也故寒栗皆愈二者乃陽郁表寒之要大建中湯療中虛怯寒黃耆當歸桂心白芍各二錢人參一錢甘草一錢半夏黑附炮去皮各二錢半上八味㕮咀每服五錢水二盞薑三片棗二枚煎至一盞去滓食後溫服羅謙甫治僉院董誠彥夏月勞役過甚煩渴不上極飲潼乳又傷冷物遂自利腸鳴腹痛四肢逆冷冷汗自出口鼻氣亦冷六脈如珠絲時發昏憒衆大醫議以蔥尉臍下又以四逆湯五兩生薑二十片連須蔥白九莖水三升煮取一升去滓涼服至夜半氣溫身熱思粥飲至天明而愈許魯齋先生聞知嘆曰病有輕重方有大小治有緩急僉院之病非大方從權急治不能愈也昔有一婦人惡寒特甚盛暑亦必服皮衣數件晝夜常坐臥床褥飲食如常亦一無所苦更名醫數四終莫能治補瀉寒熱溫涼備嘗之矣一醫以玉屏風散大劑煎水以大鍋令患者熏蒸半日許汗出得愈鶴年識瘧疾統論少陽膽為風木之府瘧家寒熱之邪必歸少陽是以瘧脈多弦少陽居半表半裡之間其氣從陽則熱從陰則寒也瘧者金火交診故其病寒熱並作也氣分受邪發於六陽時血分受邪發於六陰時淺者每日一發深者間日一發極深者三日發也淺者屬陽陽性易動故日行之氣觸著便發深者屬陰陰性常靜故日行之氣屢觸而始發也瘧發時雖大熱大渴必以淡生薑湯適寒溫飲之若恣飲冷水瓜果脾胃轉傷邪氣不達綿延難愈凡瘧疾多熱久而不解者其人必本陰虛法當益陰除熱非當歸鱉甲制首烏牛膝之屬不能除也多寒而久不解者其人必本陽虛法當甘溫散邪非乾薑附子桂枝人參之屬不能已也瘧邪在陽者其證多汗感而即發邪不能留其留藏不去者惟陰邪耳陰邪不能作汗雖以汗藥發之亦不得惟甘潤和陰如當歸牛膝之屬多服久服自能出汗而解也傷寒往來寒熱勞瘵寒熱如瘧傷食勞役腳氣疝氣腫毒初起俱有寒熱陰虛證每日午後發熱惡寒至晚亦得微汗而解脈弦而數但不大弦為辨耳俱不可誤認為瘧也凡病寒熱有期者瘧也無期者諸病也凡瘧病自陰而漸陽自遲而漸早者由重而輕也自早而漸遲自陽而漸陰者由輕而重也凡感邪極深發愈晏而作愈遲者必使漸早漸近方是佳兆故治此疾者春夏為易秋冬為難瘧邪必從汗出邪在陰者必汗出至足乃佳然非麻葛輩可發但開鬱通經其邪熱即散而為汗矣其虛者非參耆歸地則終不能得汗也古稱風寒暑濕皆能成瘧然必客於營衛之舍然後成瘧不爾不成瘧也夫營之有舍猶行人之有傳舍也營衛之氣日行一周歷五臟六腑十二經絡之界分必其舍有邪與日行之衛氣相遇則病作離則病休故發作有時與傷寒大異也俗有傷寒變瘧瘧變傷寒之説愚謂傷寒變瘧者本是瘧邪因其氣特甚故一發而不止逮汗出氣衰乃復返於舍而後日作非傷寒能變瘧也瘧變傷寒者本是傷寒因邪氣先中少陽故寒熱如瘧其邪遞引遞出遍滿三陽之界因而發熱不止設不解則又轉而之三陰非瘧邪能變傷寒也是以始先似瘧之證熱雖退身表尚有餘熱不似瘧之熱退即涼也始先似傷寒者汗常浹體而熱不退過一二日忽振寒而發熱或熱退一日而復作寒熱非如傷寒之汗出即熱退而邪解也學者智識既具自當獨斷豈可習焉不察自同衆人也久瘧不退邪氣陷入陰分虧損營血有熱無寒口燥唇乾有似傷寒人皆謂之變傷寒不知其為傳勞瘵也脈將散大或細數而死期至矣風瘧風瘧者脈浮多汗惡風多於春時得之經云以春病者惡風是也亦有發於秋者經云夏暑汗不出者秋成風瘧是也楊仁齋云風瘧是感風而得惡風自汗煩躁頭疼風陽氣也故先熱後寒可與解散風邪溫瘧瘟瘧者先熱而後寒與風瘧大略則同其但熱而不寒者經所謂得之冬中於風寒氣藏於骨髓之中至春夏陽氣大發邪氣與汗皆出此病藏於腎其氣先從內出之於外也外臺云病瘧六七日但見熱者溫瘧也與夏傷暑而秋病瘧者不同又有先傷風而後傷寒者亦先熱而後寒名曰溫瘧與此亦不同桂枝白虎湯知母六兩甘草炙二兩石膏一斤碎桂枝三兩粳米六合上銼每服五錢水一盞半煎至八分去滓溫服汗出即愈延年療溫瘧壯熱不能食知母鱉甲湯知母鱉甲炙骨皮各三兩常山二兩竹葉一升石膏四兩水煎分三服濕瘧濕瘧者寒熱身重肢節煩疼脹滿善嘔自汗陳無擇云因汗出復浴濕舍皮膚及冒雨濕所致當從太陰論治除濕湯主之寒多者必兼溫行陽氣也除濕湯半夏厚朴蒼朮米泔制各二兩白朮生藿香橘紅白茯苓各一兩甘草炙七錢上㕮咀每服四錢薑七片棗一枚水煎食前溫服本方去白朮加人參草果水薑烏梅煎即和劑人參養胃湯脈無力寒多加薑附脈有力熱多加芩連柴胡朴蒼藿薑發散也半果茯橘劫痰也人參惟虛人最宜疸瘧疸單也言獨熱而無寒也經云陰氣孤絶陽氣獨發則熱而少氣煩冤手足熱而欲嘔名曰疸瘧此以陽臟而病陽證與諸瘧證亦不同其治之之法有三一者熱氣內蓄而表有客寒則當散以辛涼一者客邪已解而蘊熱獨盛則當清以苦寒或甘寒一者邪火雖盛而氣血已衰真陰已耗急急宜壯水固原也備急竹葉常山湯治疸瘧及溫瘧常山三兩淡竹葉一握小麥一升水五升煮一宿明旦煮取二升分溫三服牡瘧瘧多寒者名曰牡瘧金匱云然也然牡當作牝傳寫之誤耳衛州書云瘧多寒者痰多也痰為水類能遏絶其陽氣於裡使不得外達故寒多不熱雖熱亦不甚也用蜀漆散者吐去其痰陽氣一伸其疾自愈夫牡屬陽牝屬陰寒多為陰故宜曰牝牡蠣湯牡蠣麻黃各四兩蜀漆三兩甘草二兩上先取蜀漆三過去腥水八斗煮蜀漆麻黃等得六升去沫內余藥煮取二升吐勿復飲之痰瘧痰瘧由夏月乘涼飲冷及臥濕地飢飽失時脾胃不和痰積中脘所致其脈弦滑其證胸痞嘔吐或時眩暈者是也微則消之甚而實者蜀漆常山之類攻而去之虛者四獸飲之屬補而逐之常山散常山一兩銼碎以好酒浸一宿瓦器煮乾為末每服二錢水一盞煎半盞去滓停冷五更服之不吐不瀉效四獸飲半夏茯苓人參草果陳皮甘草減半烏梅肉白朮各等分上㕮咀同薑棗等分以鹽少許淹服食頃厚皮紙煨令香熟焙乾每服半兩水煎未發前並進三服食瘧食瘧一名胃瘧飲食無節傷胃而成其證腹痛中滿不能食食則嘔逆噯腐吞酸其脈氣口獨盛戴復庵法平胃散加草果砂仁吞紅丸子方見飲食門先醒齋筆記梁溪王興甫偶食牛肉覺不快後遂發瘧飲食漸減至食不下咽已而水飲亦不下白湯過喉間嘔出作碧色藥不受小便一滴如赤茶大便祕醫皆束手仲淳忽至視之令仰臥以指按至心下偏右大叫因詢得其由用丸藥一服至喉輒不嘔水道漸通次日下黑物數塊如鐵其病如失丸藥用礬紅和平胃散作末棗肉丸白湯下三錢虛瘧虛瘧者或體虛而病瘧或因瘧則致虛六脈微弱神氣倦怠是以補養正氣為主經云瘧脈緩大虛便用藥不宜用針蓋病瘧而脈虛氣先餒矣故不宜用針而宜用藥所謂陰陽形氣俱不足者勿刺以針而調以甘藥也補中益氣湯小建中湯二方俱補虛散邪之劑楊仁齋云有中年人臟腑久虛大便常滑忽得瘧疾嘔吐異常惟專用人參為能止嘔其他瘧藥並不可施遂以二陳湯加人參縮砂倍用白豆蔻一二服病人因自覺氣脈頓平於是寒熱不作蓋白豆蔻能消能磨流行三焦營衛一轉寒熱自平也新定人參烏梅散治虛瘧久瘧少氣不食亦治勞瘧勞瘧者遇勞即發經年不差者是人參三錢烏梅一枚黃耆當歸茯苓陳皮各一錢鱉甲制首烏白朮各二錢上都作一服加薑煎痎瘧痎瘧者老瘧也三日一發其氣深固卒不得出有纍年不愈者亦曰三陰瘧大抵瘧病在三陽者宜汗宜和在三陰者宜溫宜利甚者非吐下不能拔其病根也其脅下有塊者名曰瘧母以鱉甲丸主之千金常山丸常山三兩鱉甲二兩炙知母一兩甘草五錢蜜丸梧子大未發前酒服十丸臨發一服正發又一服鱉甲丸鱉甲香附各二兩三稜蓬朮各一兩常山一兩阿魏二錢上並用醋浸神麯糊丸白湯下梧子大五十丸積消及半即止仁齋云瘧之經久而不歇其故何耶有根在也曰飲曰水曰敗血是耳瘧家多蓄痰涎黃水或停瀦心下則常山能吐之或結癖脅間則常山能破其癖而下之其有純熱無寒或蘊熱內實之證投以常山大便點滴而下似泄不泄須用北大黃為佐大泄數下然後獲愈也又婦人産後敗血流經亦能令人寒熱如瘧至暮則發發則身痛如被杖宜通經活血之劑鹿角屑和血止痛如神
