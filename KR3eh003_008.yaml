body:
  text: 卷八夢遺精滑夢遺精滑雖皆屬火而有心腎之異動於心者神搖於上則精遺於下也不必治腎但清其心而夢自已蓋精之藏貯雖在腎而精之主宰則在心是以少年伶俐之人多有此病而田野愚魯之人無患此者總由心之動靜而已動於腎者壯年氣盛久節淫欲經絡壅熱精乃不固經所謂陽強不能密陰氣乃絶是也而此病復有二有出於木者有出於水者以二臟皆有相火故也宜分別治之又有脾胃濕熱下流腎經精氣不清而遺者得之醇酒厚味過多也直指所謂心腎之外又有脾精不禁小便漏濁手足乏力腰背痠痛當用蒼朮等劑以斂脾精斂脾謂何精生於穀也清心之劑安神丸生地硃砂水飛當歸各一錢甘草五分黃連一錢五分湯浸蒸餅為丸如黍米大每服十五丸或二十丸津咽或用溫水送下導赤散婁全善云一壯年夢遺白濁與澀精藥益甚改用導赤散大劑服之遺濁皆止生地木通甘草等分竹葉二十片水煎服一方加人參麥門冬茯神湯治思想太過夢泄夜臥心悸茯神去皮木一錢五分遠志石菖蒲茯苓各一錢棗仁炒一錢二分人參當歸各一錢甘草四分黃連生地各八分水二盅蓮子七枚捶碎煎八分食前服蓮子六一湯治心熱夢遺赤濁石蓮肉連心用六兩甘草炙一兩上為末每服二錢食後燈心一小撮煎湯調下王荊公妙香散安神閉精定心氣人參益智仁龍骨五色者各一兩白茯苓茯神去木遠志去心各半兩硃砂研甘草炙各二錢半上為細末每服二錢空心溫酒調服真珠丸真珠六兩以牡蠣六兩用水同煎一日去牡蠣以真珠為末上於乳鉢內研三五日後寬著水飛過候乾用蒸餅和丸如梧子大每服二十丸食前溫酒送下珍珠粉丸黃柏新瓦上炒赤真蛤粉各一斤真珠三兩上為末滴水丸梧子大每服一百丸空心溫酒送下法曰陽盛乘陰故精泄黃柏降火清心蛤粉咸而補腎陰易老方無真珠一味正傳定志珍珠丸治心虛夢泄蛤粉黃柏人參白茯苓各三兩遠志石菖蒲青黛各二兩樗根白皮一兩上為末麵糊丸梧子大青黛為衣空心薑鹽湯下五十丸正傳本事清心丸治年壯氣盛久節淫欲經絡壅熱夢漏心忪恍惚好黃柏皮一兩為細末用生腦子一錢同研煉蜜丸如梧子大每服十丸至十五丸濃煎麥冬湯下大智禪師云夢遺不可全作虛冷亦有經絡熱而得之者是也常治一人至夜脊心熱夢遺用珍珠丸豬苓丸遺止後服紫雪脊熱始除或清心丸亦佳本事清燥濕熱之劑神芎丸大黃黃芩各二兩黑醜頭末滑石各四兩黃連川芎薄荷葉各半兩滴水丸桐子大每服五十丸食後溫水下局方無黃連婁全善云一中年夢遺與澀藥勿效改與神芎丸下之後與豬苓丸遂愈豬苓丸治年壯氣盛濕熱鬱滯夢遺半夏一兩破如豆粒用豬苓二兩為末先將一半炒半夏色黃勿令焦出火毒取半夏為末糊丸梧子大候乾用前豬苓末一半又同炒微裂入瓷瓶內養之空心溫酒或鹽湯下三四十丸常又服於未申間以溫酒下此方以行為止治濕熱鬱滯小水頻數夢遺精滑良蓋半夏有利性而豬苓導水即腎氣閉導氣使通之意一男子夢遺醫與澀藥反甚先服神芎丸大下之卻服此豬苓丸愈可見夢遺屬鬱滯者多矣經驗豬肚丸治夢遺泄精進飲食健肢體此藥神應白朮麵炒五兩苦參白者三兩牡蠣左顧者煅研四兩上為末用雄豬肚一具洗淨以瓷罐煮極爛木石搗如泥和藥再加肚汁搗半日丸如小豆大每服四五十丸日進三服米飲送下久服自覺身肥而夢遺永止和劑威喜丸白茯苓去皮四兩切塊同豬苓二錢半於瓷器內煮二十餘沸曬乾不用豬苓黃蠟四兩上以茯苓為末溶黃蠟搜和為丸如彈子大每空心細嚼滿口生津徐徐咽服以小便清和為度效忌米醋及怒氣動性三仙丸益智仁二兩用鹽二兩炒去鹽烏梅一兩半炒山藥一兩另為末上用山藥末煮糊為丸梧子大每服五十丸用硃砂為衣空心臨臥以鹽湯下蒼朮丸茅山蒼朮去粗皮一斤米泔浸一日夜焙乾舶山茴香炒三兩川烏炮去皮臍破故紙各二兩炒川楝子蒸取肉焙乾三兩白茯苓二兩龍骨別研二兩上末糊丸梧子大硃砂為衣每服五十丸空心縮砂仁湯下粳米飲亦可此直指所謂脾精不禁當用蒼朮輩以斂脾精是也若有熱者宜鳳髓丹祕固精氣之劑葛元真人百補交精丸熟地黃酒浸一宿切焙乾四兩五味子六兩山藥牛膝酒浸一宿焙乾肉蓯蓉酒浸一宿切碎焙乾各二兩杜仲去粗皮慢火炒斷絲三兩澤瀉山茱萸茯神遠志巴戟肉柏子仁微炒另研赤石脂各一兩上為細末煉蜜丸如梧子大每服二十丸空心酒送下一方有石膏一兩固真散白龍骨一兩韭子一合上為末每服二錢匕空心用酒調服此二藥大能澀精固真氣暖下元一方有白茯苓菟絲子醋和丸桐子大每服五十丸溫酒鹽湯下名玉露丸一方加天雄鹿茸牡蠣酒糊丸梧子大每服五十丸酒下日再名內固丸玉鎖丹治玉門不閉遺精日久如水之漏不能關束者文蛤八兩白茯苓二兩白龍骨一兩上為細末米糊丸梧子大每服七十丸空心淡鹽湯下臨睡更進一服極效加蓮鬚或肉二兩芡實二兩菟絲子四兩牡蠣一兩山藥糊丸尤妙赤白濁有濕熱下流而致者病從脾而及腎也丹溪曰大率多是濕痰流注治宜燥濕降火珍珠粉丸主之真珠粉丸黃柏炒蛤粉炒各一斤珍珠三兩上為末水糊丸如梧子大每服一百丸空心溫酒下黃柏苦而降火蛤粉珍珠咸而補腎也又方加樗白皮青黛乾薑炒滑石等分神麯糊丸盧氏曰病因濕熱的矣然亦不可專用苦寒藥故用炒柏之類又以乾薑之溫而佐之也又方海蛤黃柏各三兩樗根白皮青黛各二兩人參白茯苓各三兩遠志石菖蒲各二兩麵糊丸梧子大每服五十丸空心薑鹽湯下名定志珍珠丸又方加知母炒牡蠣煅粉山藥炒等分為末糊丸梧子大每服八十丸鹽湯下萆薢分清飲益智仁川萆薢石菖蒲烏藥等分上㕮咀每服四錢水一盞入鹽一捻煎七分食前溫服一方加茯苓甘草治腎虛白濁方聖濟總録肉蓯蓉鹿茸山藥白茯苓等分上為末米丸梧子大每服三十丸棗湯下小菟絲子丸石蓮肉二兩白茯苓一兩菟絲子酒浸研五兩懷山藥二兩內以七錢五分作糊上為細末用山藥末糊丸梧子大每服五十丸溫酒或鹽湯下空心服一方有五味子名元菟丹一方無山藥名茯菟丸便閉統論潔古云臟腑之祕不可一概論治有虛祕有實祕有風祕有冷祕有氣祕有熱祕有老人津液乾燥婦人分産亡血及發汗利小便病後血氣未復皆能作閉不可一例用硝黃利藥巴豆牽牛尤在所禁按仲景云脈浮而數能食不大便者為實名曰陽結期十七當劇脈沉而盡不能食身體重大便反硬名曰陰結期十四日當劇東垣云陽結者散之陰結者熱之前所云實閉熱閉即陽結所云冷閉虛閉即陰結也虛閉虛閉有二一以陰虛一以陽虛也凡下焦陽虛則陽氣不行陽氣不行則不能傳送而陰凝於下下焦陰虛則精血枯燥精血枯燥則津液不到而腸臟乾稿治陽虛者但益其火則陰凝自化治陰虛者但壯其水則涇渭自通蓯蓉潤腸丸肉蓯蓉酒浸焙二兩沉香另研一兩為末用麻子仁汁打糊為丸梧子大每服七十丸空心服益血潤腸丸熟地六兩杏仁炒去皮尖麻仁各三兩以上三味各杵膏枳殼橘紅各二兩半阿膠炒肉蓯蓉各一兩半蘇子荊芥各一兩當歸三兩末之以前三味膏同杵千餘下加煉蜜為丸如梧子大每服五六十丸空心白湯下五仁丸柏子仁半兩松子仁桃仁杏仁各一兩郁李仁一錢陳皮四兩另為末上將五仁另研如膏入陳皮末研勻煉蜜丸梧子大每服五十丸空心米飲下黃耆湯治老人虛閉綿黃耆陳皮去白各半兩上為末每服三錢用大麻仁一合研爛以水投取漿水一盞濾去滓於銀石器內煎後有乳起即入白蜜一大匙再煎令沸調藥末空心食前服閉甚者不過兩服愈實閉實閉者胃實而閉東垣所謂胃氣實者閉物胃氣虛者閉氣是也其人能食小便赤其脈沉實麻仁丸厚朴薑製枳實麩炒芍藥各八兩大黃蒸焙一斤麻仁別研五兩杏仁去皮尖炒五兩半上為末煉蜜和丸梧子大每服二十丸臨臥溫水下大便通利則止木香逐氣丸檳榔雞心者青皮去白陳皮去白各半兩南木香二錢半川巴豆肉一錢半研如泥漸入藥同研上件並末生薑自然汁調神麯末為糊丸麻子大每服十丸薑湯下如氣攻腹痛枳殼木瓜煎湯下按實閉有寒有熱熱實者宜寒下寒實者宜溫下麻仁丸厚朴三物湯治實而熱者逐氣丸溫脾湯治實而寒者也風閉風閉者風勝則干也由風搏肺臟傳於大腸津液燥澀傳化則難或其人素有風病者亦多有閉或腸胃積熱久而風從內生亦能成閉也皂角丸治大腸有風大便閉結皂角炙去子枳殼去瓤麩炒各等分上為末煉蜜丸梧子大每服七十丸空心米飲下或加麻仁杏仁防風陳皮亦得東垣潤腸丸當歸梢羌活大黃煨各半兩麻仁桃仁去皮尖各一兩蜜丸桐子大每服三五十丸白湯下冷閉冷閉者寒冷之氣橫於腸胃凝陰固結陽氣不行津液不通其人腸內氣攻喜熱惡冷其脈遲澀者是也半硫丸半夏湯洗七次焙乾為細末硫黃明淨好者研令極細用柳木捶子殺過上以生薑自然汁同熬入干蒸餅末攪和勻入臼內杵數百下丸如梧子大每服十五丸至二十丸無灰溫酒或生薑湯任下婦人醋湯下俱空心服準繩云熱藥多祕惟硫黃暖而能通冷藥多泄惟黃連肥腸而止泄熱閉熱閉者熱搏津液腸胃燥結傷寒熱邪傳裡及腸胃素有積熱者多有此疾其症面赤身熱腹中脹閉時欲喜冷或口舌生瘡大黃飲子治身熱煩躁大便不通大黃濕紙裹煨二錢杏仁炒去皮尖枳殼麩炒梔子仁生地黃各一錢半人參黃芩各七分川升麻一錢甘草炙五分上作一服水二盅薑五片豆豉二十一粒烏梅一枚煎至一盅不拘時服氣閉氣閉者氣內滯而物不行也其脈沉其人多噫心腹痞悶脅肋䐜脹此不可用藥通之雖或暫通而其閉益甚矣或迫之使通因而下血者惟當順氣氣順則便自通矣蘇子降氣湯加枳殼杏仁煎此藥流行肺氣見飲氣嗽門蘇感丸即蘇合四分感應六分研和別丸大凡腹痛而嘔欲利其大便諸藥皆令人吐惟蘇感丸用薑汁泡湯下最妙六磨湯治氣滯腹急大便祕澀沉香木香檳榔烏藥枳殼大黃各等分上六味熱湯磨服閉癃遺溺太無論小便不利三端一者大便瀉而小便澀為津液偏滲治宜分利而已二者熱搏下焦濕熱不行必通泄則愈三者脾胃氣澀不能通調水道下輸膀胱可順氣令施化而出然津液偏滲有脾肺之分濕熱不行亦有腎與膀胱之別更當參合脈症而分辨之東垣以小便不通皆邪熱為病分在氣在血而治之如渴而不利者熱在上焦氣分為肺熱不能生水是絶小便之源也宜淡味滲泄之藥以清肺泄火滋水之化源如不渴者熱在下焦血分為陰受熱邪閉塞其流宜氣味俱陰之藥以除其熱泄其閉塞也此以上下二焦分氣血言然在下焦亦有氣壅血汙之分即在上焦亦有氣虛氣窒之異不可不察也元珠論遺溺閉癃惟肝與督脈三焦膀胱主之經云肝足厥陰之脈環陰器所生病遺溺閉癃督脈者女子入系廷孔其孔溺孔之端也其男子循莖下至纂與女子等其生病癃痔遺溺三焦者足太陽少陰之所將太陽之別也上踝五寸別出貫踹腸出於委陽並太陽之正入絡膀胱約下焦實則閉癃虛則遺溺然刺灸之法但取厥陰督脈三焦俞穴而不及膀胱者以膀胱但藏溺耳其出溺皆從三焦及肝督脈也按經云腎開竅於二陰又云腎合膀胱余常見老醫以白通六味腎氣等藥辨陰陽虛實而治之其效捷於桴鼓而此論獨不主腎故當總統諸家而參考之則無遺義矣丹溪云小便不通有正治有隔二隔三之治如不因他故但膀胱有熱者則宜黃柏知母之屬瀉膀胱此正治也如因肺燥不能生水者則宜車前茯苓之屬清肺氣此隔二之治也如因脾濕不運而精不升以致肺不能生水者則當蒼朮白朮之屬燥脾利濕此隔三之治也但所謂清肺之法自宜外臺百合飲子之類清潤兼行庶幾得理若車前茯苓滲利之品以求其水益資其燥矣丹溪又謂不論氣虛血虛實熱痰閉皆宜吐之以提其氣氣升則水自降譬之滴水之器必使上竅通而後下竅之水出焉夫病在下取之上內經之旨也天地之氣不升則不降吐亦法之巧耳然必痰實氣閉者乃可用之未可以之概治氣虛血虛等症也元珠閉癃遺溺不禁之辨謂閉者小便不出塞而不通也癃者罷弱而氣不充淋淋瀝瀝點滴而出或澀而疼一日數十次俗名淋病者是也閉則是急病癃則是緩病遺溺睡夢中溺出醒而方知是也不禁者日夜無遍數頻頻而溺也小便不通有下焦蓄熱者內經所謂膀胱不利為癃也巢氏云膀胱與腎為表裡而俱主水熱氣太盛故令結澀小便不通腹脹氣急甚者水氣上逆令主腹痛嘔乃至於死其脈緊而滑直者是也廣濟方冬葵子滑石茯苓通草各三兩茅根四兩芒硝二兩湯成下水煮分溫三服相去如人行六七里若不得溺急悶欲絶者以鹽二升大鐺中熬以布綿裹臍下挼之小便當漸通也曾試有驗聖濟總録方獨顆大蒜一枚梔子仁三匕枚鹽花少許三味搗攤紙上貼臍良久即通未通塗陰囊上立通掩臍法連根蔥勿洗帶土生薑一塊淡豆豉二十一粒鹽二匙同研爛捍餅烘熱掩臍中以帛扎定良久氣透自通不然再換一劑有肺熱不降者東垣曰小便閉而不渴者熱在下焦血分真水不足膀胱乾涸乃無陰則陽無以化法宜苦寒之屬以補腎與膀胱使陰氣行而陽自化則小便自通其渴者熱在上焦氣分肺中伏火不能生水膀胱絶其化源宜氣味俱薄淡滲之藥以瀉肺火清肺金而滋水之化源百合飲子外臺桑白皮六分通草百合各八分白茅根一分水四升煮取二升去滓溫服有下焦陽虛不化者夫腎開竅於二陰腎中陽虛則二陰之竅閉閉則大小便俱不得出如重陰沍寒地道閉塞惟與白通湯多加蔥白陽氣一至二便立通矣白通湯蔥白四莖乾薑一兩附子一枚上三味以水三升煮取一升去滓分溫再服加入尿五合尤佳傷寒並用豬膽者所以從上焦格拒之陰此病獨加人尿者所以通陰中閉塞之陽也有下焦陰虛而陽不化者其狀腳膝軟弱無力陰汗陰痿足熱不能履地不渴而小便閉是不可以淡滲之劑利之利之則陰愈竭而水益不行矣宜苦寒之屬以補腎與膀胱所云使陰氣行而陽自化也滋腎丸黃柏酒洗焙二兩知母酒洗焙一兩肉桂一錢上為細末熟水丸芡實大每服百丸加至二百丸百沸湯空心下內經曰熱者寒之又云腎苦燥急食辛以潤之以黃柏之苦寒瀉熱補水潤燥故以為君以知母苦寒瀉腎火故以為佐肉桂辛熱寒因熱用也丹溪云諸淋皆屬於熱余每用滋腎丸每百丸可用四物湯加甘草梢杜牛膝木通桃仁滑石木香煎湯空心吞服兼灸三陰交如鼓應桴纍試纍驗有轉胞不得小便者由胞為熱所迫或強忍小便俱令水氣迫於胞屈闢不得充張外水應入不得入內水應出不得出小腹急痛不得小便不治害人亦有虛人下焦氣冷不治胞系了戾者宜分而治之滑石散寒水石二兩葵子一合滑石一兩亂髮灰車前子木通各一兩上銼散水一斗煮取五升時時服一劑即利八味丸治腎虛小便不通或過服涼藥而閉澀愈甚者及虛人下元冷胞轉不得小便膨急切痛經四五日困篤欲死者每服五十丸溫鹽湯下小便閉尿滿方小青菜子炒枳殼不拘分兩煎湯薰洗即通小便不禁有命門陽衰不能約束水液者經所謂水泉不止膀胱不藏乃失守之死候也急宜溫固腎氣多有生者濟生菟絲子丸菟絲子制二兩肉蓯蓉酒浸二兩牡蠣煅桑螵蛸酒炙五錢五味子鹿茸酒炙各二兩雞䏶胵炙乾五錢附子炮二兩上為末酒糊丸桐子大每服七十丸空心鹽湯溫酒任下有脾肺氣虛不能約束水道而病為不禁者金匱所謂上虛不能制下者也宜補中益氣之屬為主而以固澀之劑佐之張景嶽曰小便不禁古方多用固澀此亦治標之意而非塞源之道也蓋水雖主於腎而腎上連肺若肺氣無權則腎水終不能攝故治水者必先治氣治腎者必先治肺不然徒障狂瀾無益也又古方書論小便不禁有屬熱屬虛之辨不知不禁之謂乃以小水太利為言皆屬虛寒何有熱證若因熱而小便頻數則淋瀝點滴不能禁止而又出之不快或多痛澀非遺失不禁之謂矣倘以虛寒誤認為熱而妄投瀉火之劑豈不殆哉巢氏云人睡中尿出者是其素稟陰氣偏盛陽氣偏虛膀胱與腎氣俱冷不能制於水而夜臥陽氣衰狀不能制於陰陰氣獨盛則小便多或不禁而遺尿也治之方雄雞腸桂心二味等分搗為丸服如豆大一枚日三服交腸交腸者大小便易位而出由冷熱不調陰陽不順而氣亂於下也婦人多有此證加減四物湯四物五錢益元散二錢五分水酒各半煎空心溫服按此證前人有以五苓散為法者此又一法也一法以舊烏紗帽燒灰服者諸淋諸淋者由腎虛而膀胱熱也腎氣通於陰陰津液下流之道也膀胱與腎為表裡為津液之府腎虛則小便數膀胱熱則水下澀數而且澀則淋瀝不宣故謂之淋其狀小便數起少出少腹弦急痛引於臍有石淋勞淋血淋氣淋膏淋之異透格散硝石一兩不夾泥土雪白者生研為末每服二錢勞淋勞倦虛損小便不出小腹急痛葵子米煎湯下通後便須服補虛丸散血淋小便不出時下血疼痛滿急熱淋小便熱赤色臍下急痛並用冷水調下氣淋小腹滿急尿後常有餘瀝木通煎湯下石淋莖內痛尿不能出內引小腹膨脹急痛尿下沙石令人悶絶將藥末先入銚內隔紙炒至焦為度再研用溫水調下並空心調藥使消如水乃服之沈存中靈苑方淋症所感不一或因房勞或因忿怒或因醇酒厚味房勞者陰虛火動也忿怒者氣動生火也醇酒厚味者釀成濕熱也積熱既久熱結下焦所以淋瀝作痛初則熱淋血淋久則煎熬水液稠濁如膏如沙如石也夫散熱利小便只能治熱淋血淋而已其膏石沙淋必須開鬱行氣破血滋陰方可也古方用鬱金琥珀開鬱也青皮木香行氣也蒲黃牛膝破血也黃柏生地黃滋陰也東垣治小腹痛用青皮黃柏夫青皮疏肝黃柏滋腎蓋小腹乃肝腎部位也沙石淋沙石淋者膀胱結熱水液燥聚有如沙石隨溺而出其大者留礙水道痛引小腹令人悶絶也人參散方人參通草青鹽研海金砂別研各一錢莎草根炒去毛半兩上為散合研勻每服二錢空心米飲下海金沙散海金沙滑石石膏木通井泉石碎甘草炙上六味等分為散煎燈心湯調下二錢不拘時鱉甲散鱉甲燒存性搗羅為散每服三錢空心溫酒調下茅根湯茅根細切一斤葛花為末一兩露蜂房為末二兩上分三服每服以水三盞煎溫服三因石燕丸治石淋因憂鬱氣注下焦結所食鹹氣而成令人小便郁痛不可忍出沙石而後小便通石燕火燒通赤水中淬三次研極細水飛焙乾石韋去毛瞿麥穗滑石各一兩上為細末麵糊丸梧子大每服十丸食前用瞿麥燈心煎湯送下日二三服外臺療石淋方石首魚頭十四枚當歸等分二味杵散以水二升煮一升頓服立愈或單服魚頭石亦佳白茅湯治婦人産後諸淋無論膏石冷熱皆治之白茅根五錢瞿麥白茯苓各二錢半滑石七分人參各一錢二分半蒲黃桃膠葵子各七分甘草五分紫貝二個煅石首魚頭中骨四個煅上銼分二帖入薑三片燈心二十莖空心水煎服勞淋勞淋者勞傷腎氣內生虛熱熱傳膀胱氣不施化以致小便淋澀作痛此證勞倦即發故謂之勞淋其候小腹痛引莖中者是也菟絲子丸治腎勞虛損溲便不利淋瀝不已菟絲子酒浸別研人參黃耆芍藥滑石各一兩木通車前各一兩黃芩三分冬葵子一合炒上為末蜜丸梧子大每服二十丸食前溫酒或鹽湯下日二白芍藥丸治勞淋小腹痛小便不利白芍藥熟地黃當歸鹿茸各一兩上細末蜜丸梧桐子大每服三十丸阿膠湯下血淋血淋者熱在下焦令人淋閉不通熱盛則搏於血脈血得熱而流溢入於胞中與溲便俱下故為血淋也白茅根湯白茅根芍藥木通車前子各三兩滑石碎黃芩各一兩半亂髮燒灰半兩冬葵子微炒半兩上八味搗篩每服三錢水煎溫服日三雞蘇散雞蘇葉竹葉各二兩滑石木通各五兩小薊根一兩生地黃六兩每服五錢水煎溫服不拘時以利為度四汁飲葡萄汁生藕汁生地汁蜜五合上俱取自然汁與蜜和勻每服七分一盞銀石器內慢火煎沸溫服不拘時瞿麥湯治血淋尿血爛滑石赤芍瞿麥穗車前子生赤茯苓石韋去毛桑白皮炒阿膠炒黃芩生地黃洗焙甘草炙白茅根等分上為細末每服二錢人發灰一錢沸湯調下琥珀散琥珀為細末每服二錢燈芯一握腦荷少許煎湯調下茅根飲子張仲文方治胞絡中虛熱小便赤淋此心氣虛而熱氣乘之也茅根一升茯苓三兩人參乾地黃各二兩上四味以水五升煮取一升五合分溫五六服一日服盡驗又方陶氏苧根十枚水五升煮取二升一服血止神驗本事火府丹治心經蘊熱小便赤少五淋塞痛生乾地黃二兩黃芩一兩木通三兩上為末煉蜜丸桐子大每五十丸燈心湯下新定生地三錢麥冬二錢茅根五錢竹葉三錢滑石二錢葵子一錢川木通一錢黃芩一錢上作一服水煎服虛人用緩加甘草五分實人用急加川芒硝一錢牛膝膏治死血作淋牛膝四兩去蘆酒浸一宿桃仁去皮炒歸尾酒浸各一兩生地赤芍各一兩五錢川芎五錢上銼片用甜水十盅炭火慢慢煎至二盅入麝香少許分作四次空心服氣淋氣淋者氣閉不能化水病從肺而及於膀胱也其候小腹滿尿澀常有餘瀝許仁則云氣淋者氣壅小便不通遂成氣淋此病自須依前療水氣法然亦有氣熱不能化水者當以清肺金為主也瞿麥湯瞿麥桑白皮甘草炙各半兩木通赤茯苓陳皮去白各一兩滑石碎一兩半冬葵子炒一合上共八味搗篩每服三錢入蔥白二寸同煎溫服桑白皮湯治氣淋結澀溲便不利桑白皮一兩茅根二兩半木通干百合各二兩上搗篩每服三錢水煎溫服無時石韋散石韋去毛赤芍各半兩白茅根木通瞿麥川芒硝葵子各一兩木香一兩滑石二兩上㕮咀每服四錢水一盞煎至六分去滓食前溫服沉香散治氣淋多因五內鬱結氣不宣行陰滯於陽而致壅閉小腹脹滿便溺不通沉香石韋去毛滑石王不留行當歸各半兩葵子白芍各七錢半橘皮甘草各二錢半上為散每服二錢煎大麥湯下膏淋膏淋者小便肥濁色若脂膏故名膏淋亦曰肉淋磁石丸磁石火煅醋淬三七次肉蓯蓉酒浸切焙澤瀉滑石各一兩上為末蜜丸梧子大每服三十丸溫酒下不拘時如臍下妨悶加沉香一錢以行滯氣秋石丸此直指方也治濁氣干清精散而成膏淋黃白赤黯有如肥膏蜜油之狀白茯苓一兩桑螵蛸蜜炙鹿角膠搗碎炒黃秋石各半兩上研末糕糊丸梧子大每服五十丸人參煎湯下三因鹿角霜丸鹿角霜白茯苓秋石各等分上為細末糊丸梧子大每服五十丸米飲下疝症統論昔人論疝有專主厥陰經者有專主任脈者有兼言五臟者主厥陰者謂肝之脈環陰器抵少腹是厥陰之分乃受疝之處也主任脈者謂內經任脈為病男子內結七疝故任之脈為疝之源也兼五臟者謂內經心脈搏急為心疝肺脈沉搏為肺疝又太陰脈滑為脾風疝太陽脈滑為腎風疝少陽脈滑為肝風疝之類是也以愚觀之則疝病未有不本於肝者蓋任為陰脈之海其脈同足厥陰並行腹裡而五臟之疝其脈曰搏急曰滑夫搏急是肝脈滑則為病風氣通於肝故任脈諸臟雖皆有疝莫不連合肝經所謂有形如瓜有聲如蛙或上於腹或下於囊者方可謂之疝病其不與肝相干者則不得謂之疝矣至論疝病之因有主寒者有主濕熱者有火從寒化者要之疝病不離寒濕熱三者之邪寒則急熱則縱濕則腫而尤必以寒氣為之主其有熱者寒邪鬱熱於內非熱能病疝亦非熱能變寒也故曰熱為寒鬱則可熱從寒化則不可又疝者痛也不特睪丸腫痛為疝即腹中攻擊作痛控引上下者亦得名疝所以昔賢有腹中之疝與睪丸之疝之説戴人且謂婦人亦有疝凡血涸不月少腹有塊等症皆是要不離乎肝經為病蓋肝者藏血主筋而其氣暴且善攻衝也諸疝名狀巢氏戴人言之最詳巢氏辨列七疝曰厥曰癥曰寒曰氣曰盤曰胕曰狼其厥熱心痛吐食不下者名曰厥疝腹中氣乍滿心下盡痛氣積如臂者曰癥疝寒飲食即脅下腹中盡痛曰寒疝腹中乍滿乍減而痛曰氣疝腹中痛在臍旁曰盤疝腹中臍下有積聚曰胕疝小腹與陰相引而痛大便難曰狼疝此皆痛在心腹之疝也戴人亦分七疝曰寒曰水曰筋曰血曰氣曰狐曰㿗寒疝其狀囊氣冷結硬如石陰莖不舉連控睪丸而痛得之坐臥濕地及磚石或冬月涉水或風冷處使內過勞宜以溫劑下之久而無子水疝其狀腎囊腫痛陰汗時出或囊腫狀如水晶或囊癢搔出黃水或小腹按之作水聲得之飲水或醉酒使內過勞汗出而遇風寒濕之氣聚於囊中故水多令人為卒疝宜以逐水之劑下之筋疝其狀陰莖腫痛或潰或膿或裡急筋縮或莖中痛痛極則癢或挺縱不收或白物如精隨溲而下得之房室勞傷及邪術所使宜以降心火之藥下之血疝其狀如黃瓜在小腹兩旁橫骨兩端約中俗云便癰得之春夏重感大燠勞於使內氣血流溢滲入脬囊留而不去結成癰腫膿少血多宜以和血之劑下之氣疝其狀上連腎區下及陰囊或因號哭忿怒則鬱久而脹號哭怒罷則氣散者是也宜以散氣之劑下之狐疝其狀如瓦臥則入小腹行立則出腹入囊中狐晝出穴而溺夜入穴而不溺此疝出入上下往來正與狐相類亦與氣疝大同小異也宜以逐氣流經之藥下之㿗疝其狀陰囊腫縋如升如斗不癢不痛得之地氣卑濕所生故江淮之間湫溏之處多感此疾宜以去濕之藥下之此皆痛在睪丸之疝也溫劑之劑溫法有二外入之寒溫必兼散內生之寒溫必以補子和論疝多從勞內得之然並不立補法愚謂寒從外入者其病多實寒從內生者其病多虛設不能辨而概與散法難免虛虛之咎矣余採當歸萸肉等方以補子和之未備且遵仲景之舊法也和劑胡盧巴丸治疝氣偏墜痛不可忍甚則嘔吐悶亂胡盧巴炒一斤川楝子去核炒一斤二兩川烏炮去皮巴戟去心炒各六兩茴香鹽水炒十二兩吳茱萸洗炒十兩上為末酒糊丸如梧子大每服十五丸至二十丸空心溫酒下食前一方有黑牽牛烏頭桂枝湯仲景治寒疝腹中痛逆冷手足不仁烏頭上一味以蜜二斤煎減半去滓以桂枝湯五合解之得一升初服二合不知即服三分又不知復加至五合其知者如醉狀得吐者為中病桂枝湯和營衛散寒邪止痛烏頭直入厥陰逐寒氣用蜜煎者緩其毒也一方只用烏頭水煮去滓內蜜煎令水氣盡服之名烏頭煎當歸生薑羊肉湯當歸三兩生薑五兩羊肉一斤精者水八升煮取三升溫服七合日三服若寒多者加生薑十片痛多而嘔者加陳皮二兩白朮一兩金匱治寒疝腹中痛及脅痛裡急者當歸生薑羊肉湯主之衍義云服之無不應驗有一婦人産當寒月寒氣入産門臍以下脹滿手不欲犯此寒疝也師將與抵當湯謂有瘀血非其治也與仲景羊肉湯二服而愈海藏附子建中湯桂白芍甘草飴糖附子制白蜜生薑此溫養營血之劑亦有虛在氣分者丹溪云疝有挾虛而發者其脈不甚沉緊而豁大無力者是也然其痛亦輕唯覺重墜牽引耳當以參朮為君疏導藥佐之如桃仁川楝茱萸木香橘核之類是也逐水之劑醉後飲水過多脾氣不化則流入下焦或房勞汗出入水腎氣不治則滲入脬囊此水疝之源也子和以導水禹功治蔡參軍疝痛瀉水三十餘行腫痛立消蓋必決去其水而疝乃愈若雜進薑附水濕為燥熱所壅則三焦閉塞水道不行而腫痛益甚矣禹功散黑醜頭末四兩茴香炒一兩上為末以生薑自然汁調一二錢臨臥服宣胞丸治外腎腫痛黑牽牛半生半熱取頭末一兩川木通炒一兩青木香一兩用鹽蝥七枚同炒香上為細末酒糊為丸如梧子大每服三十丸溫酒下除濕之劑水濕同氣也然水汪洋而濕淹濡故水可逐而濕宜滲水成形而濕化氣故水無陽而濕有熱子和水疝㿗疝所由分也學者辨諸元戎加味五苓散術茯苓豬苓澤瀉肉桂川楝子上為末降心火之劑治疝降心火之説子和語焉而未詳戴氏有心火下降則腎水不患不溫之語然與子和之治不同子和所謂降心者治在筋疝莖腫痛潰膿血戴氏所謂降心者治在木腎頑痹結硬如石大抵子和主清降使心火下泄如加味通心散之類戴氏主咸降使心火下濟如海藻潰堅丸之類然而治法懸殊矣加味通心散治膀胱實熱小腸氣痛瞿麥穗木通去皮節梔子仁黃芩連翹甘草枳殼去瓤川楝去核各等分上銼散每服五錢水一盞半燈心二十莖車前草五莖同煎空心溫服海藻潰堅丸治木腎如斗結硬如石海藻昆布川楝實吳茱萸湯泡各一兩木香青皮小茴香荔枝核炒延胡索炒肉桂各五錢海帶橘核炒桃仁麩炒去皮炒各一兩木通七錢酒糊丸梧子大每服六十丸溫酒鹽湯主下和血之劑子和所謂血疝即今人所謂囊癰也睪丸腫痛潰出膿血以病在血分故名血疝血行則疝亦愈故當和血桃仁當歸湯治疝因瘀血作痛桃仁去皮二錢當歸梢酒洗延胡索各一錢半川芎生地黃赤芍藥吳茱萸青皮醋炒各一錢牡丹皮八分水二盅薑三片煎八分食前服散氣之劑氣聚則塞氣散則通是痛之休作由氣之聚散也故曰治疝必先治氣青木香丸黑牽牛二十兩炒香取末十二兩補骨脂炒蓽澄茄各四兩木香二兩檳榔用酸粟米飯裹濕紙包火中煨令紙焦去飯四兩上為細末清水滴為丸如緑豆大每服三十丸熟水下寒熱兼行之劑疝氣有寒束於外鬱熱在內攻刺急痛者法必寒熱兼行如倉卒散之類丹溪云用之無有不效蓋川烏頭治外束之寒山梔仁治內郁之熱也倉卒散山梔仁四十九個燒半過附子一枚炮上銼散每服二錢水一盞酒半盞煎七分入鹽一捻溫服即愈丹溪方山梔仁川烏吳茱萸橘核桃仁各等分上研水煎服逐氣流經之劑許學士云疝病多因虛而得之不可以虛而驟補邪之所湊其氣必虛留而不去其病則實故必滌去所畜之邪然後補之是以治疝諸藥多借巴豆氣者蓋為此也天台烏藥散東垣下同天台烏藥木香茴香炒青皮去白良薑炒各五分檳榔銼二枚川楝十個巴豆十四枚上八味先以巴豆打碎同楝實用麩炒候黑色去巴豆麩俱不用外為細末每服一錢溫酒調下川楝子散川楝子銼散用巴豆十四粒打破一處炒黃色去巴豆木香茴香鹽一匙炒黃去鹽各一兩上為細末每服二錢空心食前溫酒調下診候生死要法五臟者中之守也中臟盛滿氣勝傷恐者聲如從室中言是中氣之濕也言而微終日乃復言者此奪氣也衣被不斂言語善惡不避親疏者此神明之亂也倉廩不藏是門戶不要也水泉不止者是膀胱不藏也得守者生失守者死五臟者身之強也頭者精明之府頭傾視深精神將奪矣背者胸中之府背曲肩隨府將壞矣腰者腎之府轉搖不能腎將憊矣膝者筋之府屈伸不能行則僂附筋將憊矣骨者髓之府不能久立行則振掉骨將憊矣得強則生失強則死脈要精微論人一呼脈四動以上曰死脈絶不至曰死乍疏乍數曰死人無胃氣曰逆逆者死脈從陰陽病易已脈逆陽陽病難已脈得四時之順曰病無他脈反四時及不間藏曰難已春夏而脈瘦秋冬而脈浮大命曰逆四時也風熱而脈靜泄而脫血脈實病在中脈虛病在外脈澀堅者皆難治命曰反四時也水穀為本故人絶水穀則死脈無胃氣亦死所謂無胃氣者但得真臟脈不得胃氣也平心脈來纍纍如連珠如循琅玕曰心平夏以胃氣為本肺心脈來喘喘連屬其中微曲曰心病死心脈來前曲後居如操帶鉤曰心死平肺脈來厭厭聶聶如落榆莢曰肺平秋以胃氣為本病肺脈來不上不下如循雞羽曰肺病死肺脈來如物之浮如風吹毛曰肺死平肝脈來軟弱招招如揭長竿末梢曰肝平春以胃氣為本病肝脈來盈實而滑如循長竿曰肝病死肝脈來急益徑如新張弓弦曰肝死平脾脈來和柔相離如雞踐地曰脾平長夏以胃氣為本病脾脈來實而盈數如雞舉足曰脾病死脾脈來鋭堅如鳥之喙如鳥之距如屋之漏如水之流曰脾死平腎脈來喘喘纍纍如鉤按之而堅曰腎平冬以胃氣為本病腎脈來如引葛按之益堅曰腎病死腎脈來發如奪索辟辟如彈石曰腎死平人氣象論形氣相得謂之可治色澤以浮謂之易已脈從四時謂之可治脈弱以滑是有胃氣命曰易治取之以時形氣相失謂之難治色夭不澤謂之難已脈實以堅謂之益甚脈逆四時為不可治所謂逆四時者春得肺脈夏得腎脈秋得心脈冬得脾脈其至皆懸絶沉澀者名曰逆四時五實死五虛死脈盛皮熱腹脹前後不通悶瞀此為五實脈細皮寒氣少泄利前後飲食不入此謂五虛漿粥入胃泄注止則虛者活身汗得後利則實者活玉機真藏論形盛脈細少氣不足以息者危形瘦脈大胸中多氣者死形氣相得者生參伍不調者病三部九候皆相失者死上下左右之脈相應如參舂者病甚上下左右相失不可數者死中部之候雖獨調與衆臟相失者死中部之候相減者死目內陷者死脫肉身不去者死真臟脈見者死九候之脈皆沉細懸絶者為陰主冬故以夜半死盛躁喘數者為陽主夏故以日中死寒熱病者以平旦死熱中及熱病者以日中死病風者以日夕死病水者以夜半死其脈乍疏乍數乍遲乍疾者日乘四季死形肉已脫九候雖調猶死七症雖見九候皆從者不死脈不往來者死皮膚著者死瞳子高者太陽不足戴眼者太陽已絶此決死生之要也三部九候論乳子而病熱脈懸小者手足溫則生寒則死乳子中風熱喘鳴肩息者脈實大也緩則生急則死腸澼便血身熱則死寒則生脈澼下白沫脈沉則生浮則死腸澼下膿血脈懸絶則死滑大則生腸澼之屬身不熱脈不懸絶者滑大者曰生懸澀者曰死癲疾脈搏大滑久自已脈小堅急死不治癲疾之脈虛則可治實則死消疸虛實脈懸小堅病久不可治脈實大病久可治通評虛實論陽從左陰從右老從上少從下是以春夏歸陽為生歸秋冬為死反之則歸秋冬為生一上一下寒厥到膝少者秋冬死老者秋冬生形弱氣虛死形氣有餘脈氣不足死脈氣有餘形氣不足生方盛衰論得守者生失守者死得神者昌失神者亡本病論平人而氣勝形者壽病而形肉脫氣勝形者死形勝氣者危壽夭剛柔篇熱病七八日脈微小病者溲血口中乾一日半死脈代者一日死熱病已得汗出而脈尚躁喘且復熱喘甚者死熱病七八日脈不躁躁不數散後三日中有汗三日不汗四日死熱病不知所痛耳聾不能自收口乾陽熱甚陰頗有寒者熱在髓死不可治熱病已得汗而脈尚躁盛此陰脈之極也死其得汗而脈靜者生熱病脈盛躁而不得汗者此陽脈之極也死脈盛躁得汗靜者生熱病不可刺者有九一曰汗不出大顴發赤噦者死二曰泄而腹滿盛者死三曰目不明熱不已者死四曰老人嬰兒熱而腹滿者死五曰汗不出嘔下血者死六曰舌本爛熱不止者死七曰咳而衄汗不出出不至足者死八曰髓熱者死九曰熱而痙者死腰折瘛瘲齒噤齘也凡此九者不可刺也熱病篇熱病脈靜汗出已脈盛躁是一逆也病泄脈洪大是二逆也著痹不移䐃肉破身熱脈偏絶是三逆也淫而奪形身熱色夭然白及後下後血衃血衃篤重是四逆也寒熱奪形脈堅搏是謂五逆也脈一呼再至曰平三至曰離經四至曰奪精五至曰死六至曰命絶此至之脈也一呼一至曰離經再呼一至曰奪精三呼一至曰死四呼一至曰絶命此損之脈也損之為病一損損於皮毛皮聚而毛落二損損於血脈血脈虛少不能榮於五臟六腑三損損於肌肉肌肉消瘦飲食不能為肌膚四損損於筋筋緩不能自收持五損損於骨骨痿不能起於床反此者至脈之病也從上下者骨痿不能起於床者死從下上者皮聚而毛落者死按脈來一呼再至一吸再至不大不小曰平一呼三至一吸三至為適得病前大後小即頭痛目眩前小後大即胸滿短氣一呼四至一吸四至病欲甚脈洪大者苦煩滿沉細者腹中痛滑者傷熱澀者中霧露一呼五至一吸五至其人當困沉細夜加浮大晝加不大不小雖困可治其有大小者難治一呼六至一吸六至為死脈也沉細夜死浮大晝死一呼一至一吸一至名曰損人雖能行猶當著床所以然者血氣皆不足故也再呼一至再吸一至名曰無魂無魂者當死也人雖能行名曰行尸上部有脈下部無脈其人當吐不吐者死上部無脈下部有脈雖困無能為害所以然者人之有尺譬如樹之有根枝葉雖枯稿根本將自生脈有根本人有元氣故知不死扁鵲云筋絶不治九日死手足爪甲青黑呼罵口不息也
