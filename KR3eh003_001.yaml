芩射干大黃蓋熱毒非苦寒不能瀉而去之而熱傷陰氣者又須甘寒以滋益之至於攻走骨節則獨活牛蒡根尤有專長也白花蛇散白花蛇酒浸去皮骨二兩何首烏去黑皮蔓荊實牛膝酒浸各四兩威靈仙荊芥穗旋覆花各二兩上七味搗末每服一錢溫酒調下空心臨臥服牛膝湯牛膝酒浸當歸赤芍各一兩虎骨酥炙令黃二兩芒硝別研芎藭各半兩桃仁去皮光雙仁勿用二兩上七味為散每服空心溫酒調下一錢至二錢抵聖散虎脛骨不計多少打破酒浸蘸酒旋炙令黃脆為度上一味為散每服半錢入薄荷末一錢人參末半錢煎乳香酒調下仁齋云虎骨酥炙黃捶碎如米每骨一升以酒三升浸五日空心服一盞冷則暖之麝香丸治白虎歷節諸風疼痛遊走無定狀如蟲齧晝靜夜劇及一切手足不測疼痛大川烏八角者三個生用全蠍三十一個生用黑豆二十一粒生用地龍去土五錢生用上為細末入麝香半字約三分同研勻糯米飲糊丸如緑豆大每服七丸甚者十丸夜臥令膈空溫酒下微出冷汗一身便瘥許叔微云豫得此方凡是歷節及不測疼痛一二服便瘥在歙州日有一貴家婦人遍身走注疼痛至夜則發如蟲齧其肌多作鬼邪治豫曰此正歷節痛三服愈鶴膝風蛜𧌴丸蛜𧌴一條頭尾全者白附子阿魏桂心白芷各一兩乳香三分當歸芍藥北漏蘆威靈仙地骨皮牛膝羌活安息香桃仁各一兩生同安息香研沒藥三分上十六味蛜𧌴桃仁白附阿魏桂心白芷安息香乳香沒藥九味同童子小便並酒二升炒熟冷後入余藥為丸蜜丸如彈子大空心溫酒化下一丸蛜𧌴即全蠍也氣味甘辛平有毒主諸風癮疹及中風半身不遂口眼歪斜語澀手足抽掣風緩風緩即攤緩其候四肢不舉筋脈關節無力不可收攝者謂之攤其四肢雖能舉動而肢節緩弱憑物不能運用者謂之緩或以左為攤右為緩則非也但以左得之病在左右得之病在右耳推其所自皆由氣血虛耗肝腎經虛陰陽偏廢而得之或有始因他病服吐下之藥過度亦使真氣內傷營衛失守一身無所稟養而然也聖濟風緩者風邪深入而手足為之弛緩也夫脾主肌肉四肢胃為水穀之海所以流布水穀之氣周養一身脾胃既虛肢體失其所養於是風邪襲虛由腠理而入肌肉由肌肉而入脾胃安得不為之緩廢乎又人之一身筋骨為壯肝主筋腎主骨肝腎氣虛風邪襲之亦有肢體緩弱之症是當先祛風而後益之仁齋天麻浸酒方治癱緩風不計深淺久在床枕天麻龍骨虎骨骨碎補烏蛇酒浸去皮骨白花蛇同上羌活獨活惡實根牛膝各半兩松節銼敗龜板酥炙干熟地黃當歸川芎茄根附子一枚泡去皮臍大麻仁原蠶砂炒各一兩共十九味㕮咀如麻豆大用酒二斗浸密封春夏三日秋冬七日每服一盞不拘時溫服四斤丸治風寒濕毒與氣血相搏筋骨緩弱四肢痠疼癢痹宣木瓜去穰切焙天麻牛膝焙蓯蓉洗切焙上四味各一斤用好酒浸春秋五日夏三日冬十日取出焙乾為末外用熟附子虎骨酥炙各二兩為末用浸藥酒調曲糊丸桐子大每服三四十丸食前溫酒或豆淋酒下一方加當歸三兩乳香沒藥五靈脂各半兩麝香一錢名大四斤丸新定人參一兩半黃耆一兩半白朮何首烏肉蓯蓉菟絲子牛膝各四兩白茯苓三兩川萆薢三兩骨碎補三兩狗脊三兩川附子三兩川烏羌活防風地龍全蠍各一兩上為末酒糊丸梧子大每服五十丸溫酒下風瘙癢風瘙癢者表虛衛氣不足風邪乘之血脈留滯中外鼓作變而生熱熱即瘙癢久不瘥淫邪散溢搔之則成瘡也防風湯淋洗方防風苦參益母草各三兩白蒺藜五兩炒荊芥穗蔓荊實枳殼各二兩每用三兩方一斗煎至八升乘熱淋洗患處松葉酒方松葉一斤酒一斗煮三升日夜服出汗胡麻散治脾肺風毒攻注皮膚瘙癢手足生瘡及遍身㾦㿔發赤黑靨子肌熱疼痛胡麻炒令香熟枳殼各二兩防風蔓荊實威靈仙苦參川芎荊芥穗何首烏米泔浸透去黑皮炒乾甘草炙各一兩薄荷半兩上為散每服二錢溫酒下或煉蜜丸梧子大每服三十丸洗方思永堂松年大伯常用此方治遍身㾦㿔作癢以之浴身後先父用之無不效紫背浮萍半碗豨蘞草一握蛇床子五錢蒼耳子一兩防風五兩煎湯熏洗數次無不愈者諸濕統論溫氣不一有天之濕霧露雨是也天本乎氣故先中表之營衛有地之濕水泥是也地本乎形故先傷皮肉筋骨血脈有飲食之濕酒水乳酪之類是也傷於脾胃有汗液之濕汗液亦濕也止感於外有人氣之濕太陰濕土之所化也乃動於中天之濕汗之地之濕滲之飲食之濕在上吐之在中奪之在下者引而竭之汗液之濕亦以汗取之人氣之濕屬太陰所化在氣交之分土兼四氣寒熱溫涼升降浮沉備在其中當分上下中外而治以兼化四氣淫佚上下中外無處不到也大率在上則病頭重胸滿嘔吐在外則身重腫脹在下則足脛跗腫在中則腹脹中滿痞塞其所用藥亦兼寒熱濕涼以為佐使而治之濕之為病有自外入者有自內生者必審其方土之病本東南地下多陰雨地濕凡受必從外入多自下起是以重腿腳氣者多治當汗散久者宜疏通滲泄西北地高人食生冷濕面或飲酒後寒氣怫鬱濕不能越或腹皮脹疼甚則中滿水蠱或周身浮腫如泥按之不起此皆自內而生者也審其元氣多少而通利其二便責其根在內者也然方土內外亦互相有之但多少不同須對症施治不可執一也中濕與風寒氣合者為痹其寒多者為痛為浮腫非朮附桂不能去也其風多者為煩劇為流走非麻黃薏苡烏頭不能散也其濕多者為堅滿為氣閉非甘遂葶藶枳術不能泄也散濕之劑麻黃加朮湯金匱云濕家身煩疼可與麻黃加朮湯發其汗為宜慎不可以火攻之麻黃三兩去節桂枝二兩去皮甘草一兩炙白朮四兩杏仁七十枚去皮尖水九升先煮麻黃減二升去上沫內諸藥煮取二升半去滓溫服八合覆取微汗按此治寒濕在表之劑也寒固當汗而濕在表者亦非汗不解故以麻黃散寒以白朮除濕取微汗者汗大出則濕反不去也麻黃杏仁薏苡甘草湯治風濕一身盡疼發熱日晡所劇此病傷於汗出當風或久傷取冷所致也方詳金匱茲不贅羌活勝濕湯東垣治濕氣在表脈浮身重不能轉側自汗或額上多汗此為風濕羌活獨活各一錢川芎藁本防風炙草各五分蔓荊子三分如腰痛中冷沉沉然者有寒濕也加酒洗漢防己附子各五分按此治風濕在腠理及關節之劑吳鶴皋云無竅不入惟風藥為能故凡關節之疾病非羌活獨活等不能致也滲利之劑五苓散通治諸濕腫滿嘔逆泄瀉痰飲濕瘧身痛身重豬苓茯苓白朮澤瀉桂上為末每服三錢服後多飲熱水汗出愈腎著湯三因治傷濕身重腰冷如坐水中乾薑炮茯苓各四兩甘草炙白朮生用各二兩上每服四錢水一盞煎七分空心溫服以上溫利之劑濕兼寒者宜之清熱滲濕湯黃柏鹽水炒二錢黃連茯苓澤瀉各一錢蒼朮白朮各一錢半甘草五分上七味水二蠱煎至八分服此清滲之劑濕而熱者宜之下濕之劑舟車神佑丸治水腫水脹形氣俱實者甘遂芫花大戟各一兩並醋炒大黃二兩酒浸青皮陳皮木香檳榔各半兩黑牽牛頭末四兩輕粉一錢取蟲加蕪荑半兩上為末水丸空心服治法服法詳載準繩痰飲門青木香丸方見疝症上下分消之劑除濕湯百一治傷濕發熱惡寒身重自汗骨節疼痛小便閉大便溏腰腳痹冷皆因坐臥卑濕或冒雨露或著濕衣所致生白朮藿香葉橘紅白茯苓各一兩炙甘草七錢半夏曲炒厚朴薑刺蒼朮米泔浸炒各二兩上㕮咀每服四錢薑七片棗一枚水煎食前溫服升陽除濕湯治傷濕腫瀉腸鳴腹痛升麻柴胡羌活防風半夏益智仁神麯澤瀉各五分麥糵面陳皮豬苓甘草各三分蒼朮一錢上作一服生薑三片棗二枚水煎去滓空心服東垣云雖有治濕必利小便之説若濕從外來而入里用滲利之劑以除之是降之又降重竭其陽而復益其陰也故用升陽風藥即瘥大法云濕淫所勝必助風以平之也愚謂濕病用風藥者是助升浮之氣以行沉滯之濕非以風勝之之謂也又濕在上在表者多挾風氣非汗不能去也荊防羌麻祛風之品豈能行濕之事哉瘟疫大法瘟疫之病近代諸家多與溫病同論以其聲稱之同與病形之似也然而瘟疫者天地之厲氣也最為惡毒感之而病者往往致死其甚者致於滅門若冬春間之溫病苟調治得理則未必致死亦必不傳染多人故其方法宜應別論且也歲運有太過不及之殊天時有恆雨恆暘之異是以疫癘之行亦有表裡寒溫熱濕之分其可以一概論哉約而言之計有三門若其表裡俱病而盛於表者則用東垣普濟消毒之法若其病不在表又不在裡而獨行中道者則用吳又可達原飲之法若其表熱既盛里證復急治表治里救療不及者則用陶尚文三黃石膏湯之法此瘟疫入手法門也亦有邪氣獨盛於表而里無熱症者則活人敗毒散之治也亦有寒濕獨行而病在肌皮胸膈者則東坡聖散子之證也合前三法共為五法以余所見則未有不兼里者而有寒濕而無蓄熱亦十中未得其一二也然而法不可不備惟用之者得其當耳因並録五方於下以見瘟疫之端如此其病稍久或六七日或十餘日熱深不解者則同傷寒溫熱治之普濟消毒飲子東垣黃芩酒製炒黃連酒炒各五分人參三錢陳皮元參各二錢甘草連翹板藍根馬勃牛蒡子各一錢殭蠶升麻各一錢柴胡五分桔梗三分泰和二年四月民多疫癘初覺憎寒壯熱體重次傳頭面腫盛目不能開上喘咽喉不利口燥舌乾俗云大頭傷寒諸藥雜治終莫愈漸至危篤東垣曰身半以上天之氣也邪熱客於心肺之間上攻頭目而為腫耳須用芩連等藥共為細末半用湯調時時稍熱服之半用蜜丸噙化服盡良愈活者甚衆如大便硬加酒蒸大黃一錢或二錢以利之腫勢甚者以砭針刺之或加防風川芎薄荷當歸各五錢水煎時時服之達原飲檳榔二錢草果五分厚朴一錢芍藥一錢甘草五分黃芩一錢知母一錢上七味以水二蠱煎八分服吳又可曰疫癘之邪由口鼻而入舍於伏脊之內去表不遠附胃亦近乃表裡之分界即內經瘧論所謂橫連膜原是也感之淺者或俟有觸而發感之深者中而即病其始陽格於內營衛運行之機阻遏於表遂覺凜凜惡寒甚則四肢厥逆至陽氣困鬱而通厥回而中外皆熱昏昧不爽壯熱自汗此時邪伏膜原縱使有汗熱不得解必俟伏邪已潰表氣潛行於內精氣自內達表表裡相通振栗大汗邪方外出此名戰汗脈靜身涼而愈也若伏邪未盡必復發熱其熱有久有淺因所感之輕重與元氣之盛衰也要皆始先惡寒即而發熱至於發出方顯變症其症或從外解或從內陷外解則易內陷則險更有先後表裡不同有先表后里者有先里後表者有但表而不復里者有但里而不復表者有表而里再表者有里而表再里者有表裡分傳者有表多於里者有里多於表者此為九傳從外解者或發斑或戰汗自汗從內陷者胸膈痞悶心下脹滿腹痛燥結便閉熱結旁流協熱下利或嘔吐噁心譫語舌黃及黑苔芒刺等症因症用治脈不浮不沉而數晝夜皆熱日晡益甚頭疼身痛不可用辛熱藥汗之又不可下宜用達原飲以透膜原之邪為當也若見各經加入引各經藥不可執滯感之輕者舌苔亦薄脈亦不甚數如此者必從汗解如不能得汗邪氣盤錯於膜原表裡不相通達未可強汗衣被逼汗湯火劫汗也感之重者舌上苔如粉膩藥後反從內陷舌根先黃漸至中央此邪漸入胃也前方加大黃下之若脈長洪而數汗多大渴此邪氣適離膜原欲表未表白虎湯證也如舌上純黃色兼見里症此邪已入胃乃承氣湯證也有兩三日即離膜原者有半月十日不傳者有初得之四五日厭厭聶聶至五六日陡然勢張者凡元氣勝者毒易傳化元氣薄者邪不易化即不易傳不傳則邪不去淹留日久愈沉愈伏時師誤認怯症因進參耆愈壅愈固不死不休矣三黃石膏湯治瘟疫大熱無汗發狂不識人石膏三錢黃芩黃連黃柏各一錢五分豆豉半合麻黃一錢梔子五枚上作一服水二盞煎至一盞三分連進三五劑而愈按疫邪充斥內外為頭痛身熱為煩渴悶亂發狂不識人欲表之則里已急欲里之則表不退此方清裡解外合為一方譬之大軍壓境孤城四面受圍雖欲不潰不可得矣或千金雪煎或古今録驗麥奴丸並佳稍輕者大青消毒湯又時病表裡大熱欲死方大黃寒水石芒硝石膏升麻麻黃葛根紫葛各等分上為末方寸匕水服日二聖散子東坡治一切山嵐瘴氣時行瘟疫傷寒風濕等疾有非常之功如李待詔所謂內寒外熱上實下虛者此藥尤效通神宋嘉佑中黃州民病疫瘴大行得此藥痊活者不可勝記蘇東坡勒石以廣其傳聖散子之功益著徽州鄭尚書在金陵用此治傷寒活人甚衆故知其大能散寒濕驅除瘴瘧實有超凡之效也蒼朮制防風厚朴薑製豬苓澤瀉煨各二兩白芷川芎赤芍藿香柴胡各半兩麻黃升麻羌活獨活枳殼細辛吳茱萸泡藁本茯苓各七錢石菖蒲草豆蔻良薑炙甘草各二兩半大附子一枚上為粗末每服三錢水二蠱棗一枚煎八分稍熱服活人敗毒散羌活獨活前胡柴胡枳殼白茯苓桔梗人參各一兩川芎一兩甘草半兩上為細末每服二錢水二盞入生薑二片煎至七分溫服或沸湯點亦得
