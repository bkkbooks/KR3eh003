body:
  text: 卷一中風統論中風之病昔人有真類之分蓋以賊風邪氣所中者為真痰火食氣所發者為類也以愚觀之人之為病有外感之風亦有內生之風而天人之氣恆相感召真邪之動往往相因故無論賊風邪氣從外來者必先有肝風為之內應即痰火食氣從內發者亦必有肝風為之始基設無肝風亦只為他病已耳寧有卒倒偏枯歪僻牽引等症哉經云風氣通於肝又云諸風掉眩皆屬於肝諸濕腫滿皆屬於脾諸寒收引皆屬於腎由此觀之則中風之病其本在肝猶中濕之屬於脾中寒之屬於腎也雖五臟各有中風之症然風在他臟則又顯他臟之證矣豈如今人之所謂中風哉而其為病則有臟腑經絡淺深之異口眼歪斜絡病也其邪淺而易治手足不遂身體重痛經病也邪差深矣故多從倒僕後見之卒中昏厥語言錯亂腑病也其邪為尤深矣大抵倒僕之候經腑皆能有之其倒後神清識人者在經神昏不識人者在腑耳至於唇緩失音耳聾目瞀遺尿聲鼾等症則為中臟病之最深者也然其間經病兼腑者有之臟病連經者有之腑臟經絡齊病者有之要在臨病詳察也至於真邪虛實之故治法通塞之宜苟不預為講求何以應斯倉卒哉夫邪氣所觸者邪風暴至真氣反陷經絡腑臟卒然不得貫通不相維繫內經所謂邪風之至疾如風雨是也臟邪所發者臟氣內虛肝風獨勝卒然上攻九竅旁溢四肢如火之發如泉之達而不可驟止肝象木而應風而其氣又暴故也又邪氣所觸者風自外來其氣多實肝病所發者風從內出其氣多虛病虛者氣多脫病實者氣多閉脫者欲其收不收則死閉者欲其通不通亦死約言治要蓋有八法茲用條列於後神而明之存乎其人耳又五臟中風分治之方余見古方龐雜失旨不適於用謹刪正五方並録出以備檢用云卒中八法夫醫之治病猶將之禦敵宰之治民也禦敵有法奇正虛實隨機應變不知法則不足以禦敵矣治民有道刑政教化以時而施不明道則不足以臨民矣病有陰陽表里虛實緩急之殊醫有寒溫汗下補瀉輕重之異不知此則不足以臨病矣故立中風八法以應倉卒之變至於隨證緩調另詳其法於後蓋病千變藥亦千變凡病皆然不獨中風余於此首言之者亦一隅三反之意爾一曰開關卒然口噤目張兩手握固痰壅氣塞無門下藥此為閉證閉則宜開不開則死搐鼻揩齒探吐皆開法也白礬散聖濟治急中風口閉涎止欲垂死者白礬二兩生生薑一兩連皮搗水二升煎取一升二合上二味合研濾分三服旋旋灌之須臾吐出痰毒眼開風退方可服諸湯散救治若氣衰力弱不宜吐之又方白礬如拇指大一塊為末巴豆一粒去皮膜上將二味於新瓦上煅令焦赤為度煉蜜丸芡實大每用一丸綿裹放患人口中近喉處良久吐痰立愈一方加牙皂一錢煅研取三分吹鼻中急救稀涎散本事治中風涎潮口噤氣閉不通豬牙皂角四梗肥實不蛀者去黑皮晉礬光明者一兩上為細末和勻輕者半錢重者一錢匕溫水調灌下不大嘔吐但微微冷涎出一二升便得醒次緩緩調治大服亦恐過傷人孫兆方勝金丸本事治同前生薄荷半兩豬牙皂角二兩捶碎水一升二味同浸杵汁慢火熬成膏瓜蒂末藜蘆末各一兩硃砂半兩研上將硃砂末一分與二味末研勻用膏子搜和丸如龍眼大以余硃砂為衣溫酒化一丸甚者二丸以吐為度得吐即省不省者不可治二曰固脫猝然之候但見目合口開遺尿自汗者無論有邪無邪總屬脫症脫則宜固急在元氣也元氣固然後可以圖邪氣參附湯人參製附子用人參鬚倍於附子或等分不拘五錢或一兩酌宜用之薑水煎服有痰加竹瀝三曰泄大邪昔人謂南方無真中風病多是痰火氣虛所致是以近世罕有議解散者然其間賊風邪氣亦間有之設遇此等豈清熱益氣理痰所能愈哉續命諸方所以不可竟廢也俟大邪既泄然後從而調之小續命湯千金河間云中風面加五色有表症脈浮而惡寒拘急不仁此中風也宜以加減續命隨症治之古今録驗麻黃桂枝杏仁芍藥甘草人參川芎防己黃芩各一兩附子半兩制防風一兩半上為粗末每服五七錢水一盞半生薑五片煎至一盞去滓稍熱服食前加減法無汗惡寒加麻黃防風杏仁有汗惡風加桂枝芍藥杏仁無汗身熱不惡風加葛根二兩桂枝黃芩各依本方加一倍有汗身熱不惡寒加石膏知母各二兩甘草一兩無汗身寒加附子半兩乾薑二兩甘草三兩有汗無熱加桂枝附子甘草各依本方加一倍肢節攣痛或木不仁加羌活四兩連翹六兩凡中風不審六經之加減雖治之不能去其病也戴氏加減法多怒加羚羊角熱而渴去附子加秦艽恍惚錯語加茯神遠志不得睡加棗仁不能言加竹瀝神虛無力去麻黃加人參又云歧子加減見準繩類方三化湯潔古河間云中風外有六經之形證先以加減續命湯隨症汗之內有便溺之阻隔復以三化湯下之厚朴枳實大黃羌活各等分上銼如麻豆大每服三兩水三升煎至一升半終日服之以微利為度經云脾胃太過則令人四肢不舉又曰土太過則敦阜阜高也敦厚也既厚而又高則令除去此真膏粱之疾非肝腎經虛之候也何以明之經云三陰三陽發病為偏枯痿易王注云三陰不足則發偏枯三陽有餘則為痿易易謂變易常用而痿弱無力也其治宜三化湯瀉令氣弱陽衰土平而愈若脾虛則四肢亦不用也經云土不及則卑監卑者下也監者陷也坑也四肢皆稟氣於胃而不得至經必因於脾乃得稟也今脾不能為胃行其津液四肢不得稟水穀氣日以益衰脈道不利筋骨肌肉皆無氣以生故不用焉其治則宜十全散加減四物去邪留正也按續命三化並攻泄大邪之劑人壯氣實者宜之若氣弱無力者不可用也余故録肘後等方於後以備參用蓋醫者法必求備而用必極慎也肘後紫方療中風脊強身痙如弓雞屎二升大豆一升防風三兩水二升先煮防風取三合汁豆雞屎二味熬令黃赤色用酒二升淋之去滓然後入防風汁和勻分再服相去人行六七里覆取汗避風荊芥散治中風口噤四肢搐搦或角弓反張荊芥一味略炒為末酒服二錢賈似道云此方出曾公談藝録前後用之甚驗其子名順者病此已革服之立定真再生丹也華他愈風散治婦人産後中風口噤手足瘛瘲如角弓或産後血暈不省人事四肢強直或心眼倒築吐瀉欲死者亦只此一味微炒為末每服三錢豆淋酒調服或童子小便服之口噤則抉齒灌下藥下如神王貺指迷方加當歸等分水煎服豆淋酒法黑豆二升熬令聲絶酒二升納鐺中急攪以絹濾取清頓服取汗續命煮散復營衛卻風邪桂枝七分白芍甘草防風獨活人參熟地黃當歸川芎荊芥穗細辛乾葛遠志去心半夏各五分上銼作一帖入薑三片水煎服四曰轉大氣大氣不息之真氣也不轉則息矣故不特氣厥類中即真中風邪亦以轉氣為先經云大氣一轉邪氣乃散此之謂也八味順氣散嚴氏凡患中風者先服此順養真氣次進治風藥人參白朮茯苓陳皮青皮台州烏藥香白芷各一兩甘草半兩上㕮咀每服三錢水一盞煎七分溫服勻氣散良方即順風勻氣散白朮烏藥人參天麻各一錢沉香青皮白芷木瓜紫蘇甘草各五分上銼作一帖薑三片水煎服五曰逐痰涎或因風而動痰或因痰而致風或邪風多附頑痰或痰病有如風病是以掉搖眩暈倒僕昏迷等症風固有之痰亦能然要在有表無表脈浮脈滑為辨耳風病兼治痰則可痰病兼治風則不可滌痰湯治中風痰迷心竅舌強不能言南星制半夏泡七次枳實麩炒茯苓各二錢橘紅一錢半石菖蒲人參各一錢竹茹七分水一盅半生薑五片煎八分食後服清心散治風痰不開薄荷青黛硼砂各二錢牛黃冰片各三分上為細末先以蜜水洗舌後以薑汁擦舌將藥末蜜水調稀搽舌本上六曰除熱風內風之氣多從熱化昔人所謂風從火出者是也是證不可治風惟宜治熱內經云風淫於內治以甘涼外臺云中風多從熱起宜先服竹瀝湯河間云熱盛而生風或熱微風甚即兼治風也或風微熱甚但治其熱即風亦自消也竹瀝湯治熱風心中煩悶言語蹇澀竹瀝荊瀝各五合生薑汁三合上三味相和溫服三合以酒調服良一方竹瀝荊瀝梨汁各二合陳醬汁半合相合微煎一二沸濾清細細灌入口中治中風不語昏沉不識人一方竹瀝五合人乳汁二合三年陳醬汁半合三味相和分三服治熱風舌強不得語心神煩悶一方竹瀝二升生葛汁一升生薑汁三合三味相和溫分三服日夜各一服地黃煎千金治熱風心煩悶及脾胃間熱不下食生地汁枸杞根汁各二升生薑汁一升酥三升荊瀝竹瀝各五升梔子仁大黃各四兩茯苓六兩天冬人參各八兩上先煎地黃等汁成膏餘五物為散內攪調每服一匕日再漸加至三匕覺利減之七曰通竅隧風邪中人與痰氣相搏閉其經隧神暴昏脈暴絶者急與蘇合至寶之屬以通之蓋惟香藥為能達經隧通神明也蘇合香丸白朮硃砂研烏犀角屑青木香香附訶子煨取肉白檀香各二兩龍腦研五錢薰陸香安息香另末無灰酒一升熬膏蘇合香油入安息香膏內各一兩麝香研七錢半沉香丁香蓽茇各二兩上為細末入藥研勻用安息香膏並煉白蜜和劑每服旋丸如梧桐子大清晨取井花水溫冷任意化服四丸溫酒亦得空心服至寶丹方詳準繩茲不贅八曰灸腧穴中風卒倒者邪氣暴加真氣反陷表裡氣不相通故也灸之不特散邪抑以通表裡之氣又真氣暴虛陽絶於里陰陽二氣不相維繫藥石卒不能救者亦惟灸法為能通引絶陽之氣也灸風中腑手足不遂等症百會一穴在頂中央旋毛中陷可容豆許髮際是兩耳前兩穴肩髃二穴在肩端兩骨間陷者宛宛中舉臂取之曲池二穴在肘外輔屈肘曲骨中以手拱胸取之橫紋頭陷中是風市二穴在膝外兩筋間平立舒下手著腿當中指頭盡處陷者宛宛中足三里二穴在膝眼下三寸胻外廉兩筋間絶骨二穴在足外踝上三寸當骨尖前動脈中尋按取之灸風中臟氣塞涎潮不語昏危者下火立效百會一穴大椎一穴一名百勞在項後第一椎上陷中風池二穴在顳顬後髮際陷中肩井二穴在肩上陷解中缺盆上大骨前一寸半以三指按取之當其中指下陷者中是曲池二穴間使二穴在掌後三寸兩筋間陷中足三里二穴灸風中脈口眼歪斜聽會二穴在耳前陷中張口得之動脈應手頰車二穴在耳下八分地侖二穴在俠口吻旁四分近下有脈微動者是凡喎向右者為左邊脈中風而緩也宜灸左喎陷中二七壯喎向左者為右邊脈中風而緩也宜灸右喎陷中二七壯艾炷大如麥粒頻頻灸之以取盡風氣口眼正為度灸中風卒厥危急等症神闕用淨鹽炒乾納臍中令滿上加厚薑一片蓋之灸百壯至五百壯愈多愈妙薑焦則易之丹田臍下三寸氣海臍下一寸五分二穴俱連命門為生氣之海經脈之本灸之皆有大效凡灸法炷如蒼耳大必須大實其艾又須大熟初得風之時當依此次第灸之火下即定千金翼云愈風之法火艾特有奇能針石湯藥皆所不及也灸法頭面上炷艾宜小不宜大手足上乃可粗也又須自上而下不可先灸下後灸上趙氏曰口之喎灸以地倉目之斜灸以承泣苟不效則灸人迎夫氣虛風實而為偏上不得出下不得泄真氣為風邪所陷故宜灸經云陷下則灸之是也範子默記崇寧中凡兩中風始則口眼歪斜次則涎潮閉塞左右共灸十二穴得通氣十二穴者聽會頰車地倉百會肩髃曲池風市足三里絶骨髮際大椎風池也依而用之無不立效羅謙甫云凡治風莫如續命湯之類然此可以扶持疾病要收全功必須艾火為良以上八法不過約言治要耳而風氣善行數變證狀不一茲更備舉諸風條列如下學者習而通